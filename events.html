<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会一覧 | MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .event-group-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .event-group {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .event-group-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border: none;
      background: rgba(255,255,255,0.025);
      color: var(--accent);
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .event-group-toggle:hover {
      background: rgba(255,255,255,0.05);
    }

    .event-group-left {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .event-group-name {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.4;
      color: var(--accent);
      word-break: break-word;
    }

    .event-group-count {
      font-size: 0.84rem;
      color: var(--muted);
    }

    .event-group-icon {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.95rem;
      transition: transform 0.18s ease;
    }

    .event-group.is-open .event-group-icon {
      transform: rotate(180deg);
    }

    .event-group-body {
      display: none;
      padding: 0 12px 12px;
    }

    .event-group.is-open .event-group-body {
      display: block;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .event-row {
      display: block;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.025);
      text-decoration: none;
    }

    .event-row:hover {
      background: rgba(255,255,255,0.045);
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .event-date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .event-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.5;
      word-break: break-word;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 640px) {
      .event-group-toggle {
        padding: 13px 14px;
      }

      .event-group-body {
        padding: 0 10px 10px;
      }

      .event-row {
        padding: 12px;
      }

      .event-group-name {
        font-size: 0.97rem;
      }

      .event-name {
        font-size: 0.96rem;
      }
    }
  </style>
</head>
<body>
  <div class="events-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <h1>大会一覧</h1>

    <div id="event-list" class="event-group-list"></div>
    <p id="status" class="status">読み込み中…</p>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function escapeHtml(v){
      return String(v ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDate(v){
      if(!v) return "";
      const d = new Date(v);
      if(isNaN(d)) return v;
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    }

    function getName(e){
      return e.event_name_full || e.event_name || "";
    }

    function getCategory(e){
      return String(e.event_category || "").trim() || "その他";
    }

    function getDateValue(v) {
      if (!v) return null;
      const d = new Date(v);
      return isNaN(d) ? null : d;
    }

    function compareEventsByDateDesc(a, b) {
      const da = getDateValue(a.event_date);
      const db = getDateValue(b.event_date);

      if (da && db) return db - da;
      if (da) return -1;
      if (db) return 1;

      return String(getName(a)).localeCompare(String(getName(b)), "ja");
    }

    function groupEvents(events) {
      const map = new Map();

      events.forEach(event => {
        const category = getCategory(event);
        if (!map.has(category)) {
          map.set(category, []);
        }
        map.get(category).push(event);
      });

      const groups = Array.from(map.entries()).map(([category, items]) => {
        const sortedItems = items.slice().sort(compareEventsByDateDesc);

        let newestDate = null;
        sortedItems.forEach(item => {
          const d = getDateValue(item.event_date);
          if (d && (!newestDate || d > newestDate)) newestDate = d;
        });

        return {
          category,
          items: sortedItems,
          newestDate
        };
      });

      groups.sort((a, b) => {
        if (a.newestDate && b.newestDate) return b.newestDate - a.newestDate;
        if (a.newestDate) return -1;
        if (b.newestDate) return 1;
        return a.category.localeCompare(b.category, "ja");
      });

      return groups;
    }

    function jsonp(url){
      return new Promise((resolve,reject)=>{
        const cb = "__cb_"+Math.random().toString(36).slice(2);
        const script = document.createElement("script");

        window[cb] = data=>{
          delete window[cb];
          script.remove();
          resolve(data);
        };

        script.onerror = ()=>{
          delete window[cb];
          script.remove();
          reject();
        };

        script.src = url + (url.includes("?")?"&":"?") + "callback=" + cb;
        document.body.appendChild(script);
      });
    }

    function buildEventRow(e) {
      const id = e.event_id || "";
      const name = getName(e);
      const date = formatDate(e.event_date);

      return `
        <a class="event-row" href="event.html?event_id=${encodeURIComponent(id)}">
          <div class="event-date">${escapeHtml(date)}</div>
          <div class="event-name">${escapeHtml(name)}</div>
        </a>
      `;
    }

    function attachAccordionEvents() {
      const toggles = document.querySelectorAll(".event-group-toggle");
      toggles.forEach(btn => {
        btn.addEventListener("click", () => {
          const group = btn.closest(".event-group");
          if (!group) return;
          group.classList.toggle("is-open");

          const expanded = group.classList.contains("is-open");
          btn.setAttribute("aria-expanded", expanded ? "true" : "false");
        });
      });
    }

    async function load(){
      const listEl = document.getElementById("event-list");
      const statusEl = document.getElementById("status");

      try{
        const res = await jsonp(API_URL + "?mode=events");

        if(res.error) throw new Error();

        const events = Array.isArray(res.events) ? res.events : [];

        if(!events.length){
          statusEl.textContent = "大会がありません";
          return;
        }

        const groups = groupEvents(events);

        listEl.innerHTML = groups.map((group, index) => {
          const bodyId = `event-group-body-${index}`;
          const rows = group.items.map(buildEventRow).join("");

          return `
            <section class="event-group">
              <button
                class="event-group-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="${bodyId}"
              >
                <span class="event-group-left">
                  <span class="event-group-name">${escapeHtml(group.category)}</span>
                  <span class="event-group-count">${group.items.length}大会</span>
                </span>
                <span class="event-group-icon">▼</span>
              </button>
              <div id="${bodyId}" class="event-group-body">
                <div class="event-list">
                  ${rows}
                </div>
              </div>
            </section>
          `;
        }).join("");

        attachAccordionEvents();
        statusEl.textContent = "";

      }catch(e){
        statusEl.textContent = "大会一覧の取得に失敗しました";
        statusEl.classList.add("error");
      }
    }

    load();
  </script>
</body>
</html>
