<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会一覧 | MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .events-page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 16px 72px;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .event-row {
      display: block;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.025);
      text-decoration: none;
    }

    .event-row:hover {
      background: rgba(255,255,255,0.045);
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .event-date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .event-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.5;
      word-break: break-word;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="events-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <h1>大会一覧</h1>

    <div id="event-list" class="event-list"></div>
    <p id="status" class="status">読み込み中…</p>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function escapeHtml(v){
      return String(v ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
    }

    function formatDate(v){
      if(!v) return "";
      const d = new Date(v);
      if(isNaN(d)) return v;
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    }

    function getName(e){
      return e.event_name_full || e.event_name || "";
    }

    function jsonp(url){
      return new Promise((resolve,reject)=>{
        const cb = "__cb_"+Math.random().toString(36).slice(2);
        const script = document.createElement("script");

        window[cb] = data=>{
          delete window[cb];
          script.remove();
          resolve(data);
        };

        script.onerror = ()=>{
          delete window[cb];
          script.remove();
          reject();
        };

        script.src = url + (url.includes("?")?"&":"?") + "callback=" + cb;
        document.body.appendChild(script);
      });
    }

    async function load(){
      const listEl = document.getElementById("event-list");
      const statusEl = document.getElementById("status");

      try{
        const res = await jsonp(API_URL + "?mode=events");

        if(res.error) throw new Error();

        const events = Array.isArray(res.events) ? res.events : [];

        if(!events.length){
          statusEl.textContent = "大会がありません";
          return;
        }

        listEl.innerHTML = events.map(e=>{
          const id = e.event_id || "";
          const name = getName(e);
          const date = formatDate(e.event_date);

          return `
            <a class="event-row" href="event.html?event_id=${encodeURIComponent(id)}">
              <div class="event-date">${escapeHtml(date)}</div>
              <div class="event-name">${escapeHtml(name)}</div>
            </a>
          `;
        }).join("");

        statusEl.textContent = "";

      }catch(e){
        statusEl.textContent = "大会一覧の取得に失敗しました";
        statusEl.classList.add("error");
      }
    }

    load();
  </script>
</body>
</html>
