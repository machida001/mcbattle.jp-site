<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>賞金ランキング | MCバトル賞金ランキング | MCBattle.jp</title>
  <meta name="description" content="国内MCバトルの獲得賞金ランキングページです。優勝賞金の累計をもとに、各MCの賞金順位を掲載しています。">
  <link rel="stylesheet" href="style.css" />
  <style>
    .top3-wrap {
      margin-bottom: 18px;
    }

    .top3-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .top3-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .top3-row + .top3-row {
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .top3-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      font-size: 1.12rem;
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.01em;
    }

    .top3-medal {
      flex: 0 0 auto;
      font-size: 0.96em;
      line-height: 1;
    }

    .top3-name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top3-name a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .top3-name a:hover {
      opacity: 0.85;
    }

    .top3-amount {
      color: var(--accent);
      font-weight: 800;
      font-size: 1.08rem;
      line-height: 1;
      letter-spacing: -0.02em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .prize-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .prize-table-wrap {
      overflow-x: visible;
      width: 100%;
    }

    table.prize-table {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: collapse;
      margin-top: 0;
    }

    table.prize-table col:nth-child(1) {
      width: 58px;
    }

    table.prize-table col:nth-child(2) {
      width: auto;
    }

    table.prize-table col:nth-child(3) {
      width: 168px;
    }

    table.prize-table td {
      padding: 10px 8px;
      vertical-align: middle;
    }

    table.prize-table td:nth-child(1) {
      text-align: right;
      white-space: nowrap;
    }

    table.prize-table td:nth-child(2) {
      text-align: left;
      min-width: 0;
    }

    table.prize-table td:nth-child(3) {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    table.prize-table tbody tr + tr {
      border-top: 1px solid rgba(214,178,95,0.26);
    }

    .prize-rank {
      color: #ffffff;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .prize-name-link,
    .prize-name-text {
      display: block;
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.35;
    }

    .prize-name-link:hover {
      opacity: 0.85;
    }

    .prize-amount {
      color: #ffffff;
      font-weight: 500;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    @media (max-width: 640px) {
      .top3-row {
        gap: 10px;
        padding: 10px 0;
      }

      .top3-left {
        gap: 7px;
        font-size: 0.98rem;
      }

      .top3-medal {
        font-size: 0.92em;
      }

      .top3-amount {
        font-size: 0.98rem;
      }

      .prize-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      table.prize-table col:nth-child(1) {
        width: 42px;
      }

      table.prize-table col:nth-child(3) {
        width: 116px;
      }

      table.prize-table td {
        padding: 8px 4px;
        font-size: 0.9rem;
      }

      .prize-name-link,
      .prize-name-text {
        line-height: 1.28;
      }

      .prize-amount {
        font-size: 0.94rem;
      }
    }
  </style>
</head>
<body>
  <div class="rankings-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="list_event.html">大会一覧</a>
        <a class="page-nav-pill" href="list_mc.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="score_ranking.html">スコアランキング</a>
        <a class="page-nav-pill" href="simulation.html">大会シミュレーション</a>
      </nav>

      <div class="page-header-block">
        <h1>賞金ランキング</h1>
      </div>
    </div>

    <div class="top3-wrap">
      <div id="top3" class="top3-list"></div>
    </div>

    <section class="card">
      <div class="prize-card-inner">
        <p id="prize-status" class="muted"></p>

        <div class="prize-table-wrap">
          <table class="prize-table">
            <colgroup>
              <col />
              <col />
              <col />
            </colgroup>
            <tbody id="prize-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const PRIZE_JSON_URL = "./data/prize_rankings.json";

    async function loadPrizeJson() {
      const res = await fetch(PRIZE_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function toNumber(v) {
      if (v === null || v === undefined || v === "") return NaN;
      if (typeof v === "number") return Number.isFinite(v) ? v : NaN;
      const cleaned = String(v).replace(/[^\d.-]/g, "");
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : NaN;
    }

    function formatMoney(v) {
      const n = toNumber(v);
      return "¥" + (Number.isFinite(n) ? n : 0).toLocaleString("ja-JP");
    }

    function getPrizeAmount(item) {
      const candidates = [
        item.total_prize_money,
        item.total_prize,
        item.prize_total,
        item.total_amount,
        item.amount,
        item.prize,
        item.prize_money,
        item.totalPrize,
        item.totalPrizeAmount,
        item.winning_amount,
        item.money,
        item.賞金,
        item.総賞金
      ];

      for (const value of candidates) {
        const n = toNumber(value);
        if (Number.isFinite(n)) return n;
      }
      return 0;
    }

    function medalEmoji(rank) {
      if (rank === 1) return "🥇";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return "";
    }

    function normalizeItems(data) {
      const source =
        Array.isArray(data.rankings) ? data.rankings :
        Array.isArray(data.items) ? data.items :
        Array.isArray(data.data) ? data.data :
        Array.isArray(data) ? data : [];

      return source
        .map((item, index) => ({
          rank: Number(item.rank) || (index + 1),
          mc_id: item.mc_id || "",
          mc_name: item.mc_name || item.name || "名前不明",
          amount: getPrizeAmount(item)
        }))
        .filter(item => item.mc_name)
        .sort((a, b) => {
          if (b.amount !== a.amount) return b.amount - a.amount;
          return a.rank - b.rank;
        })
        .map((item, index) => ({
          ...item,
          rank: index + 1
        }));
    }

    function buildTop3(items) {
      return items.map(item => {
        const wrapper = document.createElement("div");
        wrapper.className = "top3-row";

        const left = document.createElement("div");
        left.className = "top3-left";

        const medal = document.createElement("span");
        medal.className = "top3-medal";
        medal.setAttribute("aria-hidden", "true");
        medal.textContent = medalEmoji(item.rank);

        const nameWrap = document.createElement("span");
        nameWrap.className = "top3-name";

        if (item.mc_id) {
          const a = document.createElement("a");
          a.href = `detail_mc.html?mc_id=${encodeURIComponent(item.mc_id)}`;
          a.textContent = item.mc_name;
          a.title = item.mc_name;
          nameWrap.appendChild(a);
        } else {
          nameWrap.textContent = item.mc_name;
          nameWrap.title = item.mc_name;
        }

        const amount = document.createElement("div");
        amount.className = "top3-amount";
        amount.textContent = formatMoney(item.amount);

        left.appendChild(medal);
        left.appendChild(nameWrap);
        wrapper.appendChild(left);
        wrapper.appendChild(amount);

        return wrapper;
      });
    }

    function loadPrizePage() {
      const statusEl = document.getElementById("prize-status");
      const top3El = document.getElementById("top3");
      const bodyEl = document.getElementById("prize-body");

      loadPrizeJson()
        .then((data) => {
          console.log("prize rankings page:", data);

          top3El.innerHTML = "";
          bodyEl.innerHTML = "";
          statusEl.classList.remove("error");

          try {
            if (data.error) {
              statusEl.textContent = "賞金ランキングの取得に失敗しました: " + (data.message || "");
              statusEl.classList.add("error");
              return;
            }

            const items = normalizeItems(data);
            const top3 = items.slice(0, 3);
            const rest = items.slice(3);

            buildTop3(top3).forEach(node => top3El.appendChild(node));

            rest.forEach((item) => {
              const tr = document.createElement("tr");

              const rankTd = document.createElement("td");
              const nameTd = document.createElement("td");
              const amountTd = document.createElement("td");

              rankTd.textContent = item.rank;
              rankTd.className = "prize-rank";

              if (item.mc_id) {
                const a = document.createElement("a");
                a.href = `detail_mc.html?mc_id=${encodeURIComponent(item.mc_id)}`;
                a.textContent = item.mc_name;
                a.className = "prize-name-link";
                nameTd.appendChild(a);
              } else {
                const span = document.createElement("span");
                span.textContent = item.mc_name;
                span.className = "prize-name-text";
                nameTd.appendChild(span);
              }

              amountTd.textContent = formatMoney(item.amount);
              amountTd.className = "prize-amount";

              tr.appendChild(rankTd);
              tr.appendChild(nameTd);
              tr.appendChild(amountTd);

              bodyEl.appendChild(tr);
            });

            statusEl.textContent = "";
          } catch (err) {
            console.error(err);
            statusEl.textContent = "賞金ランキングの描画に失敗しました";
            statusEl.classList.add("error");
          }
        })
        .catch((err) => {
          console.error(err);
          statusEl.textContent = "賞金ランキングの読み込みに失敗しました";
          statusEl.classList.add("error");
        });
    }

    loadPrizePage();
  </script>
</body>
</html>
