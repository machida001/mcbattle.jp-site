name: Generate static MC pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'detail_mc/**'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate MC pages
        run: node scripts/generate-mcs.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add detail_mc
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate static MC pages"
            git push
          fi