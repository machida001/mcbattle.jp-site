<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/favicon-180x180.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問い合わせフォーム | MCBattle.jp</title>
  <meta name="description" content="MCBattle.jpへの問い合わせフォームです。" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9C8VGD3THB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-9C8VGD3THB');
  </script>

  <link rel="stylesheet" href="style.css" />
  <style>
    .contact-page{
      overflow-x:hidden;
    }

    .home-header{
      position:relative;
      margin-bottom:18px;
      padding:26px 0 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,.035), rgba(255,255,255,.012)),
        radial-gradient(circle at 96% 0%, rgba(216,180,106,.07), transparent 34%);
      border-bottom:1px solid rgba(255,255,255,.14);
      z-index:40;
    }

    .home-header-inner{
      width:min(calc(100% - (var(--page-gutter) * 2)), var(--content-max));
      margin-left:auto;
      margin-right:auto;
    }

    .home-logo{
      margin:0 0 6px;
      font-family:"Times New Roman", Georgia, serif;
      font-style:italic;
      font-size:clamp(2.08rem, 7.8vw, 3.15rem);
      font-weight:800;
      line-height:.95;
      letter-spacing:-.055em;
      color:var(--accent);
      text-shadow:0 10px 26px rgba(0,0,0,.18);
    }

    .home-logo a{
      color:inherit;
      text-decoration:none !important;
    }

    .home-lead{
      margin:0 0 13px;
      color:#f0f2f6;
      font-size:1rem;
      font-weight:700;
      line-height:1.48;
      letter-spacing:-.02em;
    }

    .home-tabs{
      position:relative;
      display:flex;
      align-items:center;
      gap:0;
      width:100%;
      border-top:1px solid rgba(255,255,255,.13);
      border-bottom:1px solid rgba(255,255,255,.13);
      overflow:visible;
      z-index:50;
    }

    .home-tab,
    .home-menu-summary{
      position:relative;
      flex:1 1 0;
      min-width:0;
      padding:11px 8px 12px;
      color:#f3f4f6;
      font-size:.96rem;
      font-weight:800;
      line-height:1.1;
      text-align:center;
      white-space:nowrap;
      opacity:.96;
      transition:color .18s ease, opacity .18s ease;
      cursor:pointer;
      text-decoration:none !important;
    }

    .home-tab:hover,
    .home-menu-summary:hover{
      color:#fff7e8;
      opacity:1;
      text-decoration:none !important;
    }

    .home-tab.is-active,
    .home-menu.is-current .home-menu-summary{
      color:var(--accent);
    }

    .home-tab.is-active::after,
    .home-menu.is-current .home-menu-summary::before,
    .home-menu[open] .home-menu-summary::before{
      content:"";
      position:absolute;
      left:12px;
      right:12px;
      bottom:-1px;
      height:3px;
      border-radius:999px 999px 0 0;
      background:var(--accent);
      box-shadow:0 0 18px rgba(216,180,106,.28);
    }

    .home-menu{
      position:relative;
      flex:1 1 0;
      min-width:0;
    }

    .home-menu summary{
      list-style:none;
    }

    .home-menu summary::-webkit-details-marker{
      display:none;
    }

    .home-menu-summary::after{
      content:"";
      display:inline-block;
      width:0;
      height:0;
      margin-left:5px;
      border-left:4px solid transparent;
      border-right:4px solid transparent;
      border-top:5px solid currentColor;
      transform:translateY(-1px);
      opacity:.75;
    }

    .home-menu[open] .home-menu-summary{
      color:var(--accent);
    }

    .home-submenu{
      position:absolute;
      top:calc(100% + 8px);
      left:50%;
      z-index:80;
      min-width:176px;
      padding:8px;
      border:1px solid rgba(216,180,106,.24);
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.018)),
        rgba(18,21,30,.98);
      box-shadow:
        0 16px 34px rgba(0,0,0,.34),
        0 0 0 1px rgba(255,255,255,.018) inset;
      transform:translateX(-50%);
    }

    .home-submenu a{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:38px;
      padding:0 12px;
      border-radius:10px;
      color:#f3f4f6;
      font-size:.9rem;
      font-weight:800;
      line-height:1;
      white-space:nowrap;
      text-decoration:none !important;
      transition:
        background-color .18s ease,
        color .18s ease,
        opacity .18s ease;
    }

    .home-submenu a::after{
      content:"›";
      color:var(--accent);
      font-size:1.15rem;
      line-height:1;
      opacity:.8;
    }

    .home-submenu a:hover{
      background:rgba(216,180,106,.1);
      color:#fff7e8;
      text-decoration:none !important;
    }

    .page-top{
      margin-bottom:14px;
    }

    .page-header-block{
      margin-bottom:14px;
    }

    .page-header-block h1{
      margin:0;
      text-wrap:balance;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    .contact-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%),
        linear-gradient(180deg, var(--panel) 0%, rgba(14, 18, 28, 0.98) 100%);
      box-shadow:var(--shadow);
      padding:16px;
    }

    .contact-lead{
      margin:0 0 12px;
      color:var(--muted);
      line-height:1.62;
      font-size:0.9rem;
    }

    .contact-form{
      display:flex;
      flex-direction:column;
      gap:11px;
    }

    .contact-field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .contact-label{
      color:var(--accent);
      font-weight:700;
      line-height:1.35;
      font-size:0.9rem;
    }

    .contact-input,
    .contact-select,
    .contact-textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(255,255,255,0.04);
      color:var(--text);
      font:inherit;
      outline:none;
      box-sizing:border-box;
      transition:
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background-color 0.18s ease;
    }

    .contact-input,
    .contact-select{
      min-height:42px;
      padding:0 12px;
      font-size:0.94rem;
    }

    .contact-textarea{
      min-height:128px;
      padding:10px 12px;
      resize:vertical;
      line-height:1.58;
      font-size:0.94rem;
    }

    .contact-input:focus,
    .contact-select:focus,
    .contact-textarea:focus{
      border-color:var(--line-strong);
      box-shadow:0 0 0 3px rgba(216, 180, 106, 0.08);
      background:rgba(255,255,255,0.05);
    }

    .contact-help{
      margin:0;
      color:var(--muted);
      font-size:0.86rem;
      line-height:1.58;
    }

    .contact-actions{
      display:flex;
      flex-direction:column;
      gap:9px;
      margin-top:2px;
    }

    .contact-submit{
      width:100%;
      min-height:44px;
      border:1px solid rgba(216,180,106,.26);
      border-radius:999px;
      background:rgba(216,180,106,.10);
      color:var(--text);
      font:inherit;
      font-weight:800;
      font-size:0.96rem;
      cursor:pointer;
      transition:
        transform 0.18s ease,
        opacity 0.18s ease,
        box-shadow 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease;
    }

    .contact-submit:hover{
      transform:translateY(-1px);
      background:rgba(216,180,106,.14);
      border-color:rgba(216,180,106,.34);
      box-shadow:0 0 14px rgba(216,180,106,.10);
    }

    .contact-submit:disabled{
      opacity:.65;
      cursor:default;
      transform:none;
    }

    .contact-alert{
      margin:0;
      line-height:1.58;
      font-size:0.88rem;
    }

    .contact-alert.success{
      color:#e07a7a;
    }

    .contact-alert.error{
      color:#f0caca;
    }

    .honeypot{
      display:none !important;
    }

    .contact-iframe{
      display:none;
      width:0;
      height:0;
      border:0;
    }

    @media (min-width: 1024px){
      .home-header-inner{
        width:min(1040px, calc(100% - var(--pc-left-gutter) - var(--page-gutter)));
        margin-left:var(--pc-left-gutter);
        margin-right:auto;
      }

      .home-logo{
        font-size:3rem;
      }

      .home-lead{
        white-space:nowrap;
      }
    }

    @media (max-width: 640px) {
      .home-header{
        margin-bottom:14px;
        padding:38px 0 0;
      }

      .home-header-inner{
        width:calc(100% - 24px);
      }

      .home-logo{
        margin-bottom:5px;
        font-size:2.42rem;
      }

      .home-lead{
        margin-bottom:12px;
        font-size:.96rem;
        line-height:1.42;
        letter-spacing:-.025em;
      }

      .home-tabs{
        margin-left:-1px;
        margin-right:-1px;
      }

      .home-tab,
      .home-menu-summary{
        padding:10px 5px 11px;
        font-size:.9rem;
      }

      .home-tab.is-active::after,
      .home-menu.is-current .home-menu-summary::before,
      .home-menu[open] .home-menu-summary::before{
        left:8px;
        right:8px;
        height:3px;
      }

      .home-submenu{
        min-width:158px;
        top:calc(100% + 7px);
      }

      .home-menu[data-menu="data"] .home-submenu{
        left:0;
        transform:none;
      }

      .home-submenu a{
        min-height:37px;
        font-size:.86rem;
      }

      .page-top{
        margin-bottom:12px;
      }

      .page-header-block{
        margin-bottom:12px;
      }

      .page-header-block h1{
        font-size:clamp(1.5rem, 5.3vw, 1.95rem);
        line-height:1.12;
      }

      .contact-card{
        padding:14px;
        border-radius:16px;
      }

      .contact-lead{
        font-size:0.84rem;
        line-height:1.5;
      }

      .contact-label{
        font-size:0.85rem;
      }

      .contact-input,
      .contact-select{
        min-height:40px;
        font-size:0.9rem;
      }

      .contact-textarea{
        min-height:120px;
        font-size:0.9rem;
        line-height:1.5;
      }

      .contact-help{
        font-size:0.8rem;
        line-height:1.5;
      }

      .contact-alert{
        font-size:0.84rem;
        line-height:1.5;
      }

      .contact-submit{
        min-height:42px;
        font-size:0.92rem;
      }
    }

    @media (max-width: 390px){
      .home-header-inner{
        width:calc(100% - 20px);
      }

      .home-logo{
        font-size:2.32rem;
      }

      .home-lead{
        font-size:.92rem;
      }

      .home-tab,
      .home-menu-summary{
        padding-left:4px;
        padding-right:4px;
        font-size:.84rem;
      }
    }
  </style>
</head>
<body>
  <header class="home-header">
    <div class="home-header-inner">
      <h1 class="home-logo"><a href="./">MCBattle.jp</a></h1>
      <p class="home-lead">日本一情報量の多いMCバトルポータル。<br>大会記録・戦績・独自スコアをまとめています。</p>

      <nav class="home-tabs" aria-label="主要メニュー">
        <details class="home-menu" data-menu="data">
          <summary class="home-menu-summary">Data</summary>
          <div class="home-submenu">
            <a href="list_mc.html">MC一覧</a>
            <a href="list_event.html">大会一覧</a>
          </div>
        </details>

        <details class="home-menu" data-menu="ranking">
          <summary class="home-menu-summary">Ranking</summary>
          <div class="home-submenu">
            <a href="score_ranking.html">スコアランキング</a>
            <a href="prize_ranking.html">賞金ランキング</a>
            <a href="score_spec.html">スコアリング仕様</a>
          </div>
        </details>

        <a class="home-tab" href="simulation.html">Simulation</a>
        <a class="home-tab" href="articles.html">Reading</a>
      </nav>
    </div>
  </header>

  <div class="page contact-page">
    <div class="page-top">
      <div class="page-header-block">
        <h1>問い合わせフォーム</h1>
      </div>
    </div>

    <section class="contact-card">
      <p class="contact-lead">
        ご意見、ご指摘、ご要望がありましたら、お気軽にご連絡下さい。
      </p>

      <form
        id="contact-form"
        class="contact-form"
        method="post"
        action="https://script.google.com/macros/s/AKfycbzhHrTz16hM0AtyXw1tr8Z63veK24Q-DJvQk2jOXUJ1tde2YwKKf1xj9OHe0bawfYgkeg/exec"
        target="contact-submit-target"
      >
        <div class="contact-field">
          <label class="contact-label" for="contact-title">タイトル</label>
          <select id="contact-title" name="title" class="contact-select" required>
            <option value="">選択してください</option>
            <option value="スコアリング仕様のご意見">スコアリング仕様のご意見</option>
            <option value="試合結果等のご意見">試合結果等のご意見</option>
            <option value="MCデータのご意見">MCデータのご意見</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-email">メールアドレス（任意）</label>
          <input
            id="contact-email"
            name="email"
            type="email"
            class="contact-input"
            placeholder="yourmail@example.com"
          />
        </div>

        <div class="contact-field">
          <label class="contact-label" for="contact-message">本文</label>
          <textarea
            id="contact-message"
            name="message"
            class="contact-textarea"
            placeholder="内容を入力してください"
            required
          ></textarea>
        </div>

        <input id="contact-context-type" type="hidden" name="context_type" value="" />
        <input id="contact-context-name" type="hidden" name="context_name" value="" />
        <input type="text" name="website" class="honeypot" tabindex="-1" autocomplete="off" />

        <input type="hidden" name="redirect_success" value="https://mcbattle.jp/contact.html?sent=1" />
        <input type="hidden" name="redirect_error" value="https://mcbattle.jp/contact.html?error=1" />

        <p class="contact-help">
          内容は必ず確認いたしますが、内容により返信ができない場合があります。ご了承下さい。
        </p>

        <div class="contact-actions">
          <button id="contact-submit" class="contact-submit" type="submit">送信する</button>
          <p id="contact-alert-success" class="contact-alert success honeypot">送信しました。ありがとうございます。</p>
          <p id="contact-alert-error" class="contact-alert error honeypot">送信に失敗しました。時間をおいてもう一度お試しください。</p>
        </div>
      </form>

      <iframe
        id="contact-submit-target"
        name="contact-submit-target"
        class="contact-iframe"
        title="contact submit target"
      ></iframe>
    </section>
  </div>

  <script>
    (function () {
      function closeOtherMenus(currentMenu) {
        const menus = document.querySelectorAll(".home-menu");
        menus.forEach((menu) => {
          if (menu !== currentMenu) {
            menu.removeAttribute("open");
          }
        });
      }

      function setupHeaderMenus() {
        const menus = document.querySelectorAll(".home-menu");

        menus.forEach((menu) => {
          menu.addEventListener("toggle", () => {
            if (menu.open) {
              closeOtherMenus(menu);
            }
          });
        });

        document.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof Element)) return;
          if (target.closest(".home-menu")) return;

          menus.forEach((menu) => {
            menu.removeAttribute("open");
          });
        });
      }

      const params = new URLSearchParams(window.location.search);
      const successEl = document.getElementById("contact-alert-success");
      const errorEl = document.getElementById("contact-alert-error");
      const titleEl = document.getElementById("contact-title");
      const emailEl = document.getElementById("contact-email");
      const messageEl = document.getElementById("contact-message");
      const contextTypeEl = document.getElementById("contact-context-type");
      const contextNameEl = document.getElementById("contact-context-name");
      const formEl = document.getElementById("contact-form");
      const submitEl = document.getElementById("contact-submit");
      const iframeEl = document.getElementById("contact-submit-target");

      const type = params.get("type") || "";
      const eventName = params.get("event_name") || "";
      const mcName = params.get("mc_name") || "";
      const sent = params.get("sent") || "";
      const error = params.get("error") || "";

      let submitting = false;

      function hideAlerts() {
        successEl.classList.add("honeypot");
        errorEl.classList.add("honeypot");
      }

      function blurAllInputs() {
        if (document.activeElement && typeof document.activeElement.blur === "function") {
          document.activeElement.blur();
        }
        titleEl.blur();
        emailEl.blur();
        messageEl.blur();
        submitEl.blur();
      }

      function setMessageIfEmpty(text) {
        if (!messageEl.value.trim()) {
          messageEl.value = text;
        }
      }

      setupHeaderMenus();

      if (sent === "1") {
        successEl.classList.remove("honeypot");
      }

      if (error === "1") {
        errorEl.classList.remove("honeypot");
      }

      if (type === "event" && eventName) {
        titleEl.value = "試合結果等のご意見";
        contextTypeEl.value = "event";
        contextNameEl.value = eventName;
        setMessageIfEmpty(`【対象大会】${eventName}\n\n`);
      }

      if (type === "mc" && mcName) {
        titleEl.value = "MCデータのご意見";
        contextTypeEl.value = "mc";
        contextNameEl.value = mcName;
        setMessageIfEmpty(`【対象MC】${mcName}\n\n`);
      }

      formEl.addEventListener("submit", function () {
        hideAlerts();
        blurAllInputs();
        submitting = true;
        submitEl.disabled = true;
        submitEl.textContent = "送信中…";
      });

      iframeEl.addEventListener("load", function () {
        if (!submitting) return;

        submitting = false;
        submitEl.disabled = false;
        submitEl.textContent = "送信する";

        blurAllInputs();

        successEl.classList.remove("honeypot");
        errorEl.classList.add("honeypot");

        formEl.reset();
        contextTypeEl.value = "";
        contextNameEl.value = "";

        if (type === "event" && eventName) {
          titleEl.value = "試合結果等のご意見";
          contextTypeEl.value = "event";
          contextNameEl.value = eventName;
          messageEl.value = `【対象大会】${eventName}\n\n`;
        }

        if (type === "mc" && mcName) {
          titleEl.value = "MCデータのご意見";
          contextTypeEl.value = "mc";
          contextNameEl.value = mcName;
          messageEl.value = `【対象MC】${mcName}\n\n`;
        }

        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      });

      if (window.location.search) {
        window.history.replaceState({}, document.title, "/contact.html");
      }
    })();
  </script>
</body>
</html>
