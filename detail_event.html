<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>大会詳細ページへ移動中 | MCBattle.jp</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://mcbattle.jp/list_event.html" />

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const eventId = String(params.get("event_id") || "").trim();

      if (eventId) {
        location.replace("/detail_event/" + encodeURIComponent(eventId) + ".html");
        return;
      }

      location.replace("/list_event.html");
    })();
  </script>
</head>
<body>
  <p>新しい大会詳細ページへ移動しています。</p>
  <p><a href="/list_event.html">大会一覧へ移動する</a></p>
</body>
</html>
