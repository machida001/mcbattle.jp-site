<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会詳細 | MCBattle.jp</title>
  <meta name="description" content="国内MCバトル大会の開催日、優勝者、試合結果を掲載する大会詳細ページです。">
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-top{
      margin-bottom: 18px;
    }

    .page-mini-logo{
      margin: 0 0 10px;
    }

    .page-mini-logo .site-mini-logo{
      text-decoration: none;
    }

    .page-nav-pills{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
      max-width: 100%;
    }

    .page-nav-pill{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.93rem;
      font-weight: 700;
      line-height: 1.2;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .page-nav-pill:hover{
      text-decoration: none;
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
      border-color: var(--line-strong);
      box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
      opacity: 1;
    }

    .page-nav-break{
      flex-basis: 100%;
      height: 0;
    }

    .page-header-block{
      margin-bottom: 14px;
    }

    .page-header-block h1{
      margin: 0;
      text-wrap: balance;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .event-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .event-card-inner .muted {
      margin-bottom: 9px;
      font-size: 0.92rem;
      line-height: 1.48;
    }

    .result-block {
      display: block;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .result-line {
      display: block;
      color: var(--text);
    }

    .result-line + .result-line {
      margin-top: 1px;
    }

    .result-line a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .result-line.is-sub {
      color: var(--text);
    }

    .result-line.is-sub a {
      color: inherit;
    }

    .event-info-link{
      display: block;
      margin-top: 12px;
      text-decoration: none !important;
      color: inherit;
    }

    .event-info-link:hover,
    .event-info-link:focus,
    .event-info-link:active,
    .event-info-link:visited{
      text-decoration: none !important;
      color: inherit;
    }

    .event-info-card{
      display: block;
      padding: 13px 14px;
      border: 1px solid rgba(216,180,106,0.44);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(216,180,106,0.22) 0%, rgba(216,180,106,0.10) 100%),
        rgba(255,255,255,0.04);
      color: #f1f4fb;
      line-height: 1.58;
      font-size: 0.92rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 14px 28px rgba(0,0,0,0.18);
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .event-info-link:hover .event-info-card,
    .event-info-link:focus-visible .event-info-card{
      transform: translateY(-2px);
      border-color: rgba(216,180,106,0.78);
      background:
        linear-gradient(180deg, rgba(216,180,106,0.34) 0%, rgba(216,180,106,0.16) 100%),
        rgba(255,255,255,0.07);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 18px 34px rgba(0,0,0,0.24),
        0 0 26px rgba(216,180,106,0.16);
      opacity: 1;
    }

    .event-info-link:focus-visible{
      outline: none;
    }

    @media (max-width: 640px) {
      .page-top{
        margin-bottom: 14px;
      }

      .page-mini-logo{
        margin-bottom: 8px;
      }

      .page-nav-pills{
        gap: 7px;
        margin-bottom: 12px;
      }

      .page-nav-pill{
        min-height: 34px;
        padding: 0 12px;
        font-size: 0.86rem;
      }

      .page-header-block{
        margin-bottom: 10px;
      }

      .page-header-block h1{
        font-size: clamp(1.5rem, 5.3vw, 1.95rem);
        line-height: 1.12;
      }

      .event-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      .event-card-inner h2{
        margin-bottom: 10px;
        font-size: 1.08rem;
        line-height: 1.2;
      }

      .event-card-inner .muted {
        margin-bottom: 7px;
        font-size: 0.82rem;
        line-height: 1.38;
      }

      .result-block {
        line-height: 1.38;
        font-size: 0.84rem;
      }

      .result-line + .result-line {
        margin-top: 0;
      }

      .event-info-link{
        margin-top: 10px;
      }

      .event-info-card{
        padding: 11px 12px;
        font-size: 0.85rem;
        line-height: 1.46;
        border-radius: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="event-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
      </nav>

      <div class="page-header-block">
        <h1 id="event-title">大会情報を読み込み中...</h1>
      </div>
    </div>

    <section class="card">
      <div class="event-card-inner">
        <h2>大会情報</h2>
        <ul id="event-info-list" class="meta-list"></ul>
      </div>
    </section>

    <section class="card">
      <div class="event-card-inner">
        <h2>試合結果</h2>
        <p id="matches-status" class="muted">読み込み中...</p>
        <div id="matches-list"></div>

        <a id="event-info-link" class="event-info-link is-hidden" href="contact.html" target="_blank" rel="noopener noreferrer" aria-label="大会情報の情報提供フォームを新しいタブで開く">
          <div class="event-info-card">
            大会情報、試合結果に誤りを見つけた場合は、情報提供をお願いします。
          </div>
        </a>
      </div>
    </section>
  </div>

  <script>
    async function loadEventDetailsAllJson() {
      const res = await fetch("./data/event_details_all.json", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    }

    function getEventIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("event_id");
    }

    function setMetaDescription(content) {
      let meta = document.querySelector('meta[name="description"]');
      if (!meta) {
        meta = document.createElement("meta");
        meta.setAttribute("name", "description");
        document.head.appendChild(meta);
      }
      meta.setAttribute("content", content);
    }

    function formatNumberWithComma(value) {
      if (value === null || value === undefined || value === "") return "";
      const normalized = String(value).replace(/,/g, "").trim();
      if (!/^\d+$/.test(normalized)) return String(value);
      return Number(normalized).toLocaleString("ja-JP");
    }

    function formatPrizeYen(value) {
      const formatted = formatNumberWithComma(value);
      if (!formatted) return "";
      return "¥" + formatted;
    }

    function formatDateJP(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMcLink(name, mcId) {
      const safeName = escapeHtml(name || "");
      const safeId = String(mcId || "").trim();

      if (!safeName) return "";
      if (!safeId) return `<span>${safeName}</span>`;
      return `<a href="./mc.html?mc_id=${encodeURIComponent(safeId)}">${safeName}</a>`;
    }

    function normalizeRoundLabel(roundName) {
      const name = String(roundName || "").trim();
      if (!name) return "";

      if (/^final$/i.test(name) || name === "決勝") return "Final";
      if (/^best\s*4$/i.test(name) || name === "準決勝" || name === "ベスト4") return "Best4";
      if (/^best\s*8$/i.test(name) || name === "準々決勝" || name === "ベスト8") return "Best8";
      if (/^best\s*16$/i.test(name) || name === "ベスト16") return "Best16";
      if (/^best\s*24$/i.test(name) || name === "ベスト24") return "Best24";
      if (/^best\s*32$/i.test(name) || name === "ベスト32") return "Best32";
      if (/^best\s*36$/i.test(name) || name === "ベスト36") return "Best36";
      if (/^best\s*48$/i.test(name) || name === "ベスト48") return "Best48";
      if (/^best\s*64$/i.test(name) || name === "ベスト64") return "Best64";

      const jaBest = name.match(/^ベスト\s*(\d+)$/);
      if (jaBest) return `Best${jaBest[1]}`;

      const enBest = name.match(/^best\s*(\d+)$/i);
      if (enBest) return `Best${enBest[1]}`;

      return name;
    }

    function getRoundSortValue(roundName) {
      const normalized = normalizeRoundLabel(roundName);

      if (!normalized) return 999999;
      if (normalized === "Final") return 0;

      const bestMatch = normalized.match(/^Best(\d+)$/i);
      if (bestMatch) {
        return Number(bestMatch[1]);
      }

      return 999999;
    }

    function isTwoColumnRound(roundName) {
      const normalized = normalizeRoundLabel(roundName);
      if (!normalized || normalized === "Final") return false;
      return /^Best\d+$/i.test(normalized);
    }

    function getRoundMatches(groupedMatches, roundLabel) {
      const group = groupedMatches.find((g) => normalizeRoundLabel(g.round_name) === roundLabel);
      return group && Array.isArray(group.matches) ? group.matches : [];
    }

    function buildResultsHtml(event, groupedMatches) {
      const finalMatches = getRoundMatches(groupedMatches, "Final");
      const semiMatches = getRoundMatches(groupedMatches, "Best4");

      const winnerName = event.winner_name || (finalMatches[0] ? finalMatches[0].winner_name : "");
      const winnerMcId = event.winner_mc_id || (finalMatches[0] ? finalMatches[0].winner_mc_id : "");

      const runnerUpName = event.runner_up_name || (finalMatches[0] ? finalMatches[0].loser_name : "");
      const runnerUpMcId = event.runner_up_mc_id || (finalMatches[0] ? finalMatches[0].loser_mc_id : "");

      const best4List = semiMatches
        .map(match => {
          const name = match.loser_name || "";
          const mcId = match.loser_mc_id || "";
          if (!name) return "";
          return `🥉 ${renderMcLink(name, mcId)}`;
        })
        .filter(Boolean);

      const lines = [];

      if (winnerName) lines.push(`<span class="result-line">🥇 ${renderMcLink(winnerName, winnerMcId)}</span>`);
      if (runnerUpName) lines.push(`<span class="result-line is-sub">🥈 ${renderMcLink(runnerUpName, runnerUpMcId)}</span>`);
      best4List.forEach(line => lines.push(`<span class="result-line is-sub">${line}</span>`));

      if (!lines.length) return "−";
      return `<span class="result-block">${lines.join("")}</span>`;
    }

    function setContactLink(eventTitle) {
      const linkEl = document.getElementById("event-info-link");
      if (!linkEl || !eventTitle) return;

      const params = new URLSearchParams();
      params.set("type", "event");
      params.set("event_name", eventTitle);

      linkEl.href = `contact.html?${params.toString()}`;
      linkEl.classList.remove("is-hidden");
    }

    function ensureMatchRowStyles() {
      if (document.getElementById("event-match-row-style")) return;

      const style = document.createElement("style");
      style.id = "event-match-row-style";
      style.textContent = `
        .meta-list {
          margin: 0;
          padding: 0;
          list-style: none;
        }
        .meta-list li {
          display: flex;
          align-items: flex-start;
          gap: 10px;
          padding: 13px 0;
          border-bottom: 1px solid rgba(255,255,255,0.12);
          font-size: 0.97rem;
          line-height: 1.46;
        }
        .meta-list li:last-child {
          border-bottom: none;
          padding-bottom: 1px;
        }
        .meta-label {
          flex: 0 0 auto;
          min-width: 5.9em;
          color: #c7cedc;
          font-weight: 700;
          letter-spacing: 0.01em;
        }
        .meta-list li > span:last-child {
          flex: 1 1 auto;
          min-width: 0;
          color: var(--text);
          overflow-wrap: anywhere;
          word-break: break-word;
        }

        .round-block {
          margin-top: 18px;
        }
        .round-heading {
          margin: 0 0 8px;
        }
        .match-list {
          list-style: none;
          padding: 0;
          margin: 0;
        }
        .match-list > li {
          margin: 0 0 8px 0;
          padding: 0;
          background: transparent;
          border: none;
          color: inherit;
        }
        .match-list.is-two-column {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px 10px;
        }
        .match-list.is-two-column > li {
          margin: 0;
        }
        .match-row-wrap {
          display: block;
        }
        .match-row-box {
          display: block;
          max-width: 100%;
          padding: 9px 12px;
          border-radius: 12px;
          background: rgba(255,255,255,0.025);
          border: 1px solid rgba(255,255,255,0.14);
          color: inherit;
          box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
          min-height: 100%;
        }
        .match-single-line {
          display: flex;
          align-items: center;
          gap: 7px;
          min-width: 0;
          line-height: 1.42;
          font-size: 0.98rem;
        }
        .match-name {
          min-width: 0;
          overflow-wrap: anywhere;
          word-break: break-word;
          display: flex;
          align-items: center;
          min-height: 100%;
        }
        .match-name.is-winner {
          color: var(--text);
          font-weight: 700;
          flex: 0 1 auto;
        }
        .match-name.is-loser {
          color: #7f8798;
          font-weight: 600;
          flex: 1 1 auto;
        }
        .match-separator {
          flex: 0 0 auto;
          color: var(--muted);
          opacity: 0.9;
          display: flex;
          align-items: center;
          align-self: stretch;
        }
        .match-name a,
        .meta-list a {
          color: inherit;
          text-decoration: underline;
          text-underline-offset: 0.15em;
        }

        @media (max-width: 640px) {
          .meta-list li {
            gap: 7px;
            padding: 8px 0;
            font-size: 0.87rem;
            line-height: 1.34;
          }
          .meta-list li:last-child {
            padding-bottom: 0;
          }
          .meta-label {
            min-width: 4.95em;
            font-size: 0.85rem;
          }

          .round-block {
            margin-top: 14px;
          }
          .round-heading {
            margin-bottom: 6px;
          }
          .match-list > li {
            margin-bottom: 6px;
          }
          .match-list.is-two-column {
            display: block;
          }
          .match-row-box {
            padding: 6px 9px;
            border-radius: 10px;
          }
          .match-single-line {
            gap: 6px;
            font-size: clamp(0.72rem, 2.35vw, 0.9rem);
            line-height: 1.3;
          }
          .match-name.is-winner {
            font-weight: 700;
            flex: 0 1 44%;
          }
          .match-name.is-loser {
            color: #737b8c;
            font-weight: 600;
            flex: 1 1 56%;
          }
        }
      `;
      document.head.appendChild(style);
    }

    async function loadEventDetail() {
      const eventId = getEventIdFromQuery();

      const titleEl = document.getElementById("event-title");
      const infoListEl = document.getElementById("event-info-list");
      const matchesStatusEl = document.getElementById("matches-status");
      const matchesListEl = document.getElementById("matches-list");

      ensureMatchRowStyles();

      if (!eventId) {
        titleEl.textContent = "大会IDが指定されていません";
        document.title = "大会詳細 | MCBattle.jp";
        setMetaDescription("国内MCバトル大会の開催日、優勝者、試合結果を掲載する大会詳細ページです。");
        matchesStatusEl.textContent = "event_id が見つかりませんでした。";
        matchesStatusEl.classList.add("error");
        return;
      }

      try {
        const allData = await loadEventDetailsAllJson();
        const detailMap = allData && allData.event_details ? allData.event_details : {};
        const data = detailMap[eventId] || null;

        infoListEl.innerHTML = "";
        matchesListEl.innerHTML = "";
        matchesStatusEl.classList.remove("error");

        if (!data) {
          titleEl.textContent = "大会情報の取得に失敗しました";
          document.title = "大会詳細 | MCBattle.jp";
          setMetaDescription("国内MCバトル大会の開催日、優勝者、試合結果を掲載する大会詳細ページです。");
          matchesStatusEl.textContent = "指定された大会データが見つかりません";
          matchesStatusEl.classList.add("error");
          return;
        }

        const event = data.event || {};
        const groupedMatches = Array.isArray(data.grouped_matches) ? data.grouped_matches.slice() : [];
        groupedMatches.sort((a, b) => getRoundSortValue(a.round_name) - getRoundSortValue(b.round_name));

        const totalMatches = Number(data.total_matches || 0);
        const formattedWinnerPrize = formatPrizeYen(event.prize_money_winner);
        const formattedLocation = String(event.location || "").trim();
        const resultsHtml = buildResultsHtml(event, groupedMatches);

        const eventTitle = event.event_name_full || event.event_name || "大会名不明";
        const eventDateText = formatDateJP(event.event_date || "");
        const winnerName = event.winner_name || "";
        titleEl.textContent = eventTitle;
        document.title = `${eventTitle} | 大会結果・試合結果 | MCBattle.jp`;

        const descriptionParts = [
          `${eventTitle}の大会詳細ページです。`,
          eventDateText ? `開催日は${eventDateText}。` : "",
          winnerName ? `優勝者は${winnerName}。` : "",
          "試合結果を掲載しています。"
        ].filter(Boolean);
        setMetaDescription(descriptionParts.join(" "));

        setContactLink(eventTitle);

        const infoItems = [
          { label: "開催日", html: escapeHtml(formatDateJP(event.event_date || "")) },
          { label: "場所", html: escapeHtml(formattedLocation) },
          { label: "結果", html: resultsHtml },
          { label: "優勝賞金", html: escapeHtml(formattedWinnerPrize || "") }
        ].filter((item) => item.html !== "");

        infoItems.forEach((item) => {
          const li = document.createElement("li");
          const labelEl = document.createElement("span");
          labelEl.className = "meta-label";
          labelEl.textContent = item.label + "：";

          const valueEl = document.createElement("span");
          valueEl.innerHTML = item.html || "";

          li.appendChild(labelEl);
          li.appendChild(valueEl);
          infoListEl.appendChild(li);
        });

        groupedMatches.forEach((group) => {
          const roundName = normalizeRoundLabel(group.round_name) || "ラウンド不明";

          const block = document.createElement("div");
          block.className = "round-block";

          const heading = document.createElement("h3");
          heading.className = "round-heading";
          heading.textContent = roundName;
          block.appendChild(heading);

          const ul = document.createElement("ul");
          ul.className = "match-list" + (isTwoColumnRound(roundName) ? " is-two-column" : "");

          const matches = Array.isArray(group.matches) ? group.matches : [];

          matches.forEach((match) => {
            const li = document.createElement("li");
            li.className = "match-row-wrap";

            const winnerHtml = renderMcLink(match.winner_name || "不明", match.winner_mc_id || "");
            const loserHtml = renderMcLink(match.loser_name || "不明", match.loser_mc_id || "");

            li.innerHTML = `
              <div class="match-row-box">
                <div class="match-single-line">
                  <span class="match-name is-winner">${winnerHtml}</span>
                  <span class="match-separator">/</span>
                  <span class="match-name is-loser">${loserHtml}</span>
                </div>
              </div>
            `;
            ul.appendChild(li);
          });

          block.appendChild(ul);
          matchesListEl.appendChild(block);
        });

        matchesStatusEl.textContent = totalMatches === 0 ? "試合結果がありません" : "";
      } catch (err) {
        console.error(err);
        titleEl.textContent = "大会情報の読み込みに失敗しました";
        document.title = "大会詳細 | MCBattle.jp";
        setMetaDescription("国内MCバトル大会の開催日、優勝者、試合結果を掲載する大会詳細ページです。");
        matchesStatusEl.textContent = `読み込み失敗: ${err && err.message ? err.message : err}`;
        matchesStatusEl.classList.add("error");
      }
    }

    loadEventDetail();
  </script>
</body>
</html>
