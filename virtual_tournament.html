<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>仮想MCバトルシミュレーション | MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-top{
      margin-bottom:18px;
    }

    .page-mini-logo{
      margin:0 0 10px;
    }

    .page-mini-logo .site-mini-logo{
      text-decoration:none;
    }

    .page-nav-pills{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0 0 16px;
      max-width:100%;
    }

    .page-nav-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.04);
      color:var(--accent);
      text-decoration:none;
      font-size:.93rem;
      font-weight:700;
      line-height:1.2;
      transition:
        transform .18s ease,
        background-color .18s ease,
        border-color .18s ease,
        box-shadow .18s ease,
        opacity .18s ease;
    }

    .page-nav-pill:hover{
      text-decoration:none;
      transform:translateY(-1px);
      background:rgba(255,255,255,0.07);
      border-color:var(--line-strong);
      box-shadow:0 0 18px rgba(135,164,255,.08);
      opacity:1;
    }

    .page-nav-break{
      flex-basis:100%;
      height:0;
    }

    .vt-page{
      max-width:var(--content-max);
      margin:0 auto;
    }

    .vt-hero{
      padding:6px 0 10px;
      border-top:1px solid transparent;
    }

    .vt-title{
      margin:0 0 10px;
      color:#5a86ff;
      line-height:1.2;
    }

    .vt-lead{
      margin:0;
      color:var(--muted);
      font-size:1rem;
      line-height:1.75;
      max-width:820px;
    }

    .vt-stack{
      display:flex;
      flex-direction:column;
      gap:18px;
      margin-top:18px;
    }

    .vt-panel{
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:18px 18px 16px;
      box-shadow:0 18px 48px rgba(0,0,0,.22);
    }

    .vt-panel-select{
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(64,116,76,.22), rgba(40,77,58,.18));
    }

    .vt-panel-result{
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(84,66,104,.22), rgba(55,45,79,.18));
    }

    .vt-panel-title{
      margin:0 0 14px;
      font-size:1.9rem;
      line-height:1.2;
      color:#5a86ff;
    }

    .vt-step-label{
      display:block;
      margin:0 0 10px;
      font-size:1.05rem;
      font-weight:800;
      color:#5a86ff;
      letter-spacing:.01em;
    }

    .vt-helper{
      margin:8px 0 0;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.7;
    }

    .vt-search-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 88px;
      gap:14px;
      align-items:center;
      margin-top:10px;
    }

    .vt-search-box{
      width:100%;
      min-height:72px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(13,17,28,.68);
      color:var(--text);
      padding:0 20px;
      font:inherit;
      font-size:1.05rem;
      outline:none;
    }

    .vt-search-box::placeholder{
      color:#9ea7ba;
    }

    .vt-count-badge{
      min-height:72px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.45rem;
      font-weight:800;
      color:#d7deef;
    }

    .vt-search-note{
      margin:8px 0 0;
      color:#95a0b4;
      font-size:.9rem;
      line-height:1.55;
    }

    .vt-action-stack{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:14px;
    }

    .vt-main-button,
    .vt-sub-button{
      width:100%;
      min-height:72px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.68);
      background:transparent;
      color:var(--text);
      font:inherit;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      transition:
        transform .18s ease,
        background-color .18s ease,
        border-color .18s ease,
        box-shadow .18s ease,
        opacity .18s ease;
    }

    .vt-main-button:hover,
    .vt-sub-button:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.04);
      box-shadow:0 0 20px rgba(255,255,255,.06);
    }

    .vt-sub-button{
      min-height:60px;
      border-width:1px;
      border-color:rgba(255,255,255,.34);
      color:#d4dbea;
      font-size:.94rem;
      font-weight:700;
    }

    .vt-selected-wrap{
      margin-top:18px;
    }

    .vt-selected-title{
      margin:0 0 6px;
      font-size:1.7rem;
      line-height:1.25;
    }

    .vt-selected-note{
      margin:0 0 12px;
      color:var(--muted);
      line-height:1.7;
      font-size:.96rem;
    }

    .vt-selected-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px 10px;
    }

    .vt-selected-item{
      display:grid;
      grid-template-columns:minmax(0,1fr) 28px;
      align-items:center;
      gap:10px;
      min-width:0;
      min-height:68px;
      padding:0 16px;
      border-radius:22px;
      border:2px solid rgba(255,255,255,.78);
      background:rgba(13,17,28,.22);
      box-sizing:border-box;
    }

    .vt-selected-name{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:1rem;
      font-weight:800;
      color:var(--text);
    }

    .vt-remove-btn{
      border:none;
      background:transparent;
      color:#dbe1ed;
      font:inherit;
      font-size:1.8rem;
      line-height:1;
      cursor:pointer;
      padding:0;
      width:28px;
      height:28px;
    }

    .vt-candidates{
      margin-top:16px;
    }

    .vt-candidate-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .vt-candidate-btn{
      width:100%;
      min-height:58px;
      padding:0 16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.03);
      color:var(--text);
      font:inherit;
      font-size:1rem;
      font-weight:700;
      text-align:left;
      cursor:pointer;
    }

    .vt-candidate-btn:hover{
      background:rgba(255,255,255,.06);
    }

    .vt-run-area{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .vt-hero-result{
      padding:18px 18px 16px;
      border-radius:24px;
      border:1px solid rgba(110,125,255,.14);
      background:linear-gradient(180deg, rgba(106,110,218,.2), rgba(70,56,138,.18));
    }

    .vt-hero-result-label{
      display:block;
      color:var(--muted);
      font-size:1.05rem;
      line-height:1.5;
      margin-bottom:8px;
    }

    .vt-hero-result-name{
      display:block;
      font-size:2rem;
      line-height:1.2;
      font-weight:900;
    }

    .vt-summary-card{
      padding:18px 18px 16px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.025);
    }

    .vt-summary-title,
    .vt-table-title{
      margin:0 0 12px;
      color:#5a86ff;
      font-size:1.65rem;
      line-height:1.2;
    }

    .vt-summary-lines{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .vt-summary-lines p{
      margin:0;
      color:var(--text);
      line-height:1.75;
      font-size:1rem;
    }

    .vt-dist-table-wrap{
      overflow-x:visible;
    }

    .vt-dist-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    .vt-dist-table th,
    .vt-dist-table td{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:middle;
    }

    .vt-dist-table th:last-child,
    .vt-dist-table td:last-child{
      text-align:right;
      width:110px;
      white-space:nowrap;
      font-variant-numeric:tabular-nums;
    }

    .vt-dist-table th{
      color:#b8bfd0;
      font-size:.95rem;
      font-weight:800;
      background:rgba(255,255,255,.03);
    }

    .vt-dist-table td{
      font-size:1rem;
      line-height:1.45;
    }

    .vt-footnote{
      display:none;
    }

    @media (max-width: 640px){
      .page-top{
        margin-bottom:14px;
      }

      .page-mini-logo{
        margin-bottom:8px;
      }

      .page-nav-pills{
        gap:7px;
        margin-bottom:12px;
      }

      .page-nav-pill{
        min-height:34px;
        padding:0 12px;
        font-size:.86rem;
      }

      .vt-title{
        margin-bottom:8px;
        font-size:clamp(2.05rem, 10vw, 3rem);
      }

      .vt-lead{
        font-size:.95rem;
        line-height:1.72;
      }

      .vt-stack{
        gap:14px;
        margin-top:14px;
      }

      .vt-panel{
        padding:16px 14px 14px;
        border-radius:22px;
      }

      .vt-panel-title{
        margin-bottom:12px;
        font-size:1.55rem;
      }

      .vt-step-label{
        margin-bottom:8px;
        font-size:1rem;
      }

      .vt-helper{
        font-size:.9rem;
        margin-top:6px;
      }

      .vt-search-row{
        grid-template-columns:minmax(0,1fr) 74px;
        gap:10px;
      }

      .vt-search-box{
        min-height:64px;
        border-radius:20px;
        padding:0 16px;
        font-size:.98rem;
      }

      .vt-count-badge{
        min-height:64px;
        border-radius:20px;
        font-size:1.22rem;
      }

      .vt-search-note{
        font-size:.86rem;
        margin-top:6px;
      }

      .vt-main-button{
        min-height:64px;
        font-size:.95rem;
      }

      .vt-sub-button{
        min-height:52px;
        font-size:.9rem;
      }

      .vt-selected-wrap{
        margin-top:16px;
      }

      .vt-selected-title{
        font-size:1.55rem;
        margin-bottom:6px;
      }

      .vt-selected-note{
        margin-bottom:10px;
        font-size:.9rem;
      }

      .vt-selected-grid{
        gap:8px;
      }

      .vt-selected-item{
        min-height:58px;
        padding:0 12px;
        border-radius:18px;
        gap:8px;
      }

      .vt-selected-name{
        font-size:.95rem;
      }

      .vt-remove-btn{
        font-size:1.55rem;
        width:24px;
        height:24px;
      }

      .vt-candidate-list{
        gap:8px;
      }

      .vt-candidate-btn{
        min-height:52px;
        padding:0 14px;
        border-radius:16px;
        font-size:.95rem;
      }

      .vt-hero-result{
        padding:16px 14px 14px;
        border-radius:20px;
      }

      .vt-hero-result-label{
        font-size:.95rem;
        margin-bottom:6px;
      }

      .vt-hero-result-name{
        font-size:1.7rem;
      }

      .vt-summary-card{
        padding:16px 14px 14px;
        border-radius:20px;
      }

      .vt-summary-title,
      .vt-table-title{
        margin-bottom:10px;
        font-size:1.35rem;
      }

      .vt-summary-lines{
        gap:8px;
      }

      .vt-summary-lines p{
        font-size:.95rem;
        line-height:1.7;
      }

      .vt-dist-table th,
      .vt-dist-table td{
        padding:12px 14px;
      }

      .vt-dist-table th:last-child,
      .vt-dist-table td:last-child{
        width:88px;
      }

      .vt-dist-table th{
        font-size:.9rem;
      }

      .vt-dist-table td{
        font-size:.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="vt-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
      </nav>
    </div>

    <section class="vt-hero">
      <h1 class="vt-title">仮想MCバトルシミュレーション</h1>
      <p class="vt-lead">直近3年の本戦実績をもとに、8人の優勝分布を100回シミュレーションします。</p>
    </section>

    <div class="vt-stack">
      <section class="vt-panel vt-panel-select">
        <span class="vt-step-label">①MCを選ぶ</span>

        <div class="vt-search-row">
          <input id="mc-search-input" class="vt-search-box" type="text" placeholder="MC名またはよみがなで検索" autocomplete="off" />
          <div id="selected-count-badge" class="vt-count-badge">0/8</div>
        </div>

        <p class="vt-search-note">2文字以上で候補表示</p>

        <div class="vt-action-stack">
          <button id="fill-random-btn" class="vt-sub-button" type="button">残りを上位100位からランダム入力</button>
          <button id="clear-selected-btn" class="vt-sub-button" type="button">全クリア</button>
        </div>

        <div class="vt-selected-wrap">
          <h2 class="vt-selected-title">選択中の8人</h2>
          <p class="vt-selected-note">直近3年で対象大会に出場しているMCのみ候補に表示しています</p>
          <div id="selected-grid" class="vt-selected-grid"></div>
        </div>

        <div id="candidate-area" class="vt-candidates">
          <div id="candidate-list" class="vt-candidate-list"></div>
          <p id="candidate-empty" class="vt-helper is-hidden">候補がありません。</p>
        </div>
      </section>

      <section class="vt-panel vt-panel-result">
        <span class="vt-step-label">②結果</span>

        <div class="vt-run-area">
          <button id="run-sim-btn" class="vt-main-button" type="button">100回シミュレーションする</button>

          <div id="top-result-card" class="vt-hero-result is-hidden">
            <span class="vt-hero-result-label">最も優勝確率が高いMC</span>
            <span id="top-result-name" class="vt-hero-result-name">-</span>
          </div>

          <div id="summary-card" class="vt-summary-card is-hidden">
            <h2 class="vt-summary-title">結果サマリー</h2>
            <div id="summary-lines" class="vt-summary-lines"></div>
          </div>

          <div id="dist-card" class="vt-summary-card is-hidden">
            <h2 class="vt-table-title">全体分布</h2>
            <div class="vt-dist-table-wrap">
              <table class="vt-dist-table">
                <thead>
                  <tr>
                    <th>MC</th>
                    <th>優勝率</th>
                  </tr>
                </thead>
                <tbody id="dist-body"></tbody>
              </table>
            </div>
          </div>

          <p id="sim-status" class="vt-helper">8人選ぶとシミュレーションできます。</p>
        </div>
      </section>
    </div>
  </div>

  <script>
    const CANDIDATES_URL = "./data/mcs.json";
    const STRENGTHS_URL = "./data/rankings.json";
    const MAX_SELECTED = 8;

    let allCandidates = [];
    let strengthMap = {};
    let selectedMcs = [];
    let filteredCandidates = [];

    async function loadJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[ァ-ヶ]/g, function(ch) {
          return String.fromCharCode(ch.charCodeAt(0) - 0x60);
        })
        .replace(/\s+/g, "")
        .trim();
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getTop100Pool() {
      const rankingOrder = Object.values(strengthMap)
        .filter(item => item && item.mc_id && item.mc_name)
        .sort((a, b) => (b.current_score || 0) - (a.current_score || 0))
        .slice(0, 100)
        .map(item => item.mc_id);

      const pool = rankingOrder
        .map(mcId => allCandidates.find(mc => mc.mc_id === mcId))
        .filter(Boolean);

      return pool;
    }

    function renderSelected() {
      const grid = document.getElementById("selected-grid");
      const badge = document.getElementById("selected-count-badge");

      badge.textContent = `${selectedMcs.length}/${MAX_SELECTED}`;

      if (selectedMcs.length === 0) {
        grid.innerHTML = "";
        return;
      }

      grid.innerHTML = selectedMcs.map(mc => `
        <div class="vt-selected-item">
          <div class="vt-selected-name">${escapeHtml(mc.mc_name)}</div>
          <button class="vt-remove-btn" type="button" data-remove-id="${escapeHtml(mc.mc_id)}">×</button>
        </div>
      `).join("");

      grid.querySelectorAll(".vt-remove-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const mcId = btn.getAttribute("data-remove-id");
          selectedMcs = selectedMcs.filter(mc => mc.mc_id !== mcId);
          renderSelected();
          renderCandidates();
          updateSimReadyState();
        });
      });
    }

    function renderCandidates() {
      const list = document.getElementById("candidate-list");
      const empty = document.getElementById("candidate-empty");
      const keyword = normalizeText(document.getElementById("mc-search-input").value);

      if (keyword.length < 2) {
        list.innerHTML = "";
        empty.classList.add("is-hidden");
        return;
      }

      const selectedIds = new Set(selectedMcs.map(mc => mc.mc_id));

      filteredCandidates = allCandidates.filter(mc => {
        if (selectedIds.has(mc.mc_id)) return false;
        const name = normalizeText(mc.mc_name);
        const yomi = normalizeText(mc.mc_yomi);
        return name.includes(keyword) || yomi.includes(keyword);
      }).slice(0, 20);

      if (filteredCandidates.length === 0) {
        list.innerHTML = "";
        empty.classList.remove("is-hidden");
        return;
      }

      empty.classList.add("is-hidden");
      list.innerHTML = filteredCandidates.map(mc => `
        <button class="vt-candidate-btn" type="button" data-add-id="${escapeHtml(mc.mc_id)}">
          ${escapeHtml(mc.mc_name)}
        </button>
      `).join("");

      list.querySelectorAll(".vt-candidate-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          if (selectedMcs.length >= MAX_SELECTED) return;
          const mcId = btn.getAttribute("data-add-id");
          const mc = allCandidates.find(item => item.mc_id === mcId);
          if (!mc) return;
          selectedMcs.push(mc);
          document.getElementById("mc-search-input").value = "";
          renderSelected();
          renderCandidates();
          updateSimReadyState();
        });
      });
    }

    function updateSimReadyState() {
      const status = document.getElementById("sim-status");
      const runBtn = document.getElementById("run-sim-btn");

      if (selectedMcs.length === MAX_SELECTED) {
        status.textContent = "8人そろいました。シミュレーションできます。";
        runBtn.disabled = false;
        runBtn.style.opacity = "1";
      } else {
        status.textContent = `あと${MAX_SELECTED - selectedMcs.length}人選んでください。`;
        runBtn.disabled = true;
        runBtn.style.opacity = "0.55";
      }
    }

    function simulateTournamentOnce(participants) {
      function playMatch(a, b) {
        const scoreA = strengthMap[a.mc_id]?.current_score ?? 1500;
        const scoreB = strengthMap[b.mc_id]?.current_score ?? 1500;
        const diff = scoreA - scoreB;
        const pA = 1 / (1 + Math.pow(10, -diff / 120));
        return Math.random() < pA ? a : b;
      }

      let round = [...participants];
      while (round.length > 1) {
        const nextRound = [];
        for (let i = 0; i < round.length; i += 2) {
          nextRound.push(playMatch(round[i], round[i + 1]));
        }
        round = nextRound;
      }
      return round[0];
    }

    function buildSummaryLines(sortedResults) {
      const top = sortedResults[0];
      const second = sortedResults[1];
      const third = sortedResults[2];
      const lines = [];

      if (top) {
        lines.push(`${top.mc_name} が最有力で、優勝率は${top.winRate}%でした。`);
      }

      const rivals = [second, third].filter(Boolean);
      if (rivals.length > 0) {
        const rivalText = rivals.map(item => `${item.mc_name} ${item.winRate}%`).join("、");
        lines.push(`次点は ${rivalText} です。`);
      }

      if (top) {
        if (top.winRate >= 50) {
          lines.push(`今回は ${top.mc_name} 優勢の結果です。`);
        } else if (top.winRate >= 30) {
          lines.push(`今回は ${top.mc_name} が一歩リードしています。`);
        } else {
          lines.push(`大本命がいない、混戦寄りの結果です。`);
        }
      }

      return lines;
    }

    function renderSimulationResults(results) {
      const topCard = document.getElementById("top-result-card");
      const topName = document.getElementById("top-result-name");
      const summaryCard = document.getElementById("summary-card");
      const summaryLines = document.getElementById("summary-lines");
      const distCard = document.getElementById("dist-card");
      const distBody = document.getElementById("dist-body");

      const sortedResults = Object.values(results)
        .sort((a, b) => b.winRate - a.winRate || a.mc_name.localeCompare(b.mc_name, "ja"));

      if (sortedResults.length === 0) return;

      topName.textContent = sortedResults[0].mc_name;
      topCard.classList.remove("is-hidden");

      const lines = buildSummaryLines(sortedResults);
      summaryLines.innerHTML = lines.map(line => `<p>${escapeHtml(line)}</p>`).join("");
      summaryCard.classList.remove("is-hidden");

      distBody.innerHTML = sortedResults.map(item => `
        <tr>
          <td>${escapeHtml(item.mc_name)}</td>
          <td>${item.winRate}%</td>
        </tr>
      `).join("");
      distCard.classList.remove("is-hidden");
    }

    function runSimulation() {
      if (selectedMcs.length !== MAX_SELECTED) return;

      const status = document.getElementById("sim-status");
      status.textContent = "シミュレーション中...";

      document.getElementById("top-result-card").classList.add("is-hidden");
      document.getElementById("summary-card").classList.add("is-hidden");
      document.getElementById("dist-card").classList.add("is-hidden");

      const results = {};
      selectedMcs.forEach(mc => {
        results[mc.mc_id] = {
          mc_id: mc.mc_id,
          mc_name: mc.mc_name,
          wins: 0,
          winRate: 0
        };
      });

      for (let i = 0; i < 100; i++) {
        const shuffled = shuffleArray(selectedMcs);
        const winner = simulateTournamentOnce(shuffled);
        results[winner.mc_id].wins += 1;
      }

      Object.values(results).forEach(item => {
        item.winRate = Math.round(item.wins);
      });

      renderSimulationResults(results);
      status.textContent = "シミュレーション結果を表示しています。";
    }

    async function initPage() {
      try {
        const [mcsData, rankingsData] = await Promise.all([
          loadJson(CANDIDATES_URL),
          loadJson(STRENGTHS_URL)
        ]);

        allCandidates = Array.isArray(mcsData.mcs) ? mcsData.mcs : [];

        const rankings = Array.isArray(rankingsData.rankings) ? rankingsData.rankings : [];
        strengthMap = {};
        rankings.forEach(item => {
          strengthMap[item.mc_id] = {
            mc_id: item.mc_id,
            mc_name: item.mc_name,
            current_score: Number(item.current_score ?? item.score ?? 1500)
          };
        });

        renderSelected();
        renderCandidates();
        updateSimReadyState();

        document.getElementById("mc-search-input").addEventListener("input", renderCandidates);

        document.getElementById("fill-random-btn").addEventListener("click", () => {
          const selectedIds = new Set(selectedMcs.map(mc => mc.mc_id));
          const pool = getTop100Pool().filter(mc => !selectedIds.has(mc.mc_id));
          const shuffled = shuffleArray(pool);

          while (selectedMcs.length < MAX_SELECTED && shuffled.length > 0) {
            selectedMcs.push(shuffled.shift());
          }

          renderSelected();
          renderCandidates();
          updateSimReadyState();
        });

        document.getElementById("clear-selected-btn").addEventListener("click", () => {
          selectedMcs = [];
          renderSelected();
          renderCandidates();
          updateSimReadyState();

          document.getElementById("top-result-card").classList.add("is-hidden");
          document.getElementById("summary-card").classList.add("is-hidden");
          document.getElementById("dist-card").classList.add("is-hidden");
          document.getElementById("sim-status").textContent = "8人選ぶとシミュレーションできます。";
        });

        document.getElementById("run-sim-btn").addEventListener("click", runSimulation);
      } catch (err) {
        console.error(err);
        document.getElementById("sim-status").textContent = "データの読み込みに失敗しました。";
      }
    }

    initPage();
  </script>
</body>
</html>
