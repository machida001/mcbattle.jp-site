<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Battle DB</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 64px;
      line-height: 1.6;
      color: #111;
    }
    h1, h2 {
      margin-top: 0;
    }
    section {
      margin-top: 40px;
    }
    ul, ol {
      padding-left: 20px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
    }
    .ranking-list li {
      margin-bottom: 6px;
    }
    .nav-links a {
      display: inline-block;
      margin-right: 16px;
      margin-bottom: 8px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>MC Battle DB</h1>
    <p>国内主要MCバトルの本戦結果をもとにした記録・ランキングDB</p>
    <p class="muted">現在は構築中のテスト表示です。</p>
  </header>

  <section>
    <h2>直近の大会</h2>
    <div class="card">
<p id="events-status" class="muted">読み込み中...</p>
<ul id="recent-events-list"></ul>
    </div>
  </section>

  <section>
    <h2>ランキングの決定仕様</h2>
    <div class="card">
      <p>
        1on1本戦の試合結果をもとに、対戦相手の強さ・ラウンド・大会強度などを加味して
        スコアを算出しています。詳細仕様は今後このページ上でも確認できるようにします。
      </p>
    </div>
  </section>

  <section>
    <h2>ランキング Top20</h2>
    <div class="card">
      <p id="ranking-status" class="muted">読み込み中...</p>
      <ol id="ranking-list" class="ranking-list"></ol>
      <p><a href="#">100位まで見る</a></p>
    </div>
  </section>

  <section>
    <h2>記録を見る</h2>
    <div class="card nav-links">
      <a href="#">大会一覧から記録を見る</a>
      <a href="#">MC一覧から記録を見る</a>
    </div>
  </section>

  <script>
  const RANKING_API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

  function loadRankingsJsonp() {
    const callbackName = "mcBattleRankingCallback";
    const statusEl = document.getElementById("ranking-status");
    const listEl = document.getElementById("ranking-list");

    window[callbackName] = function(data) {
      try {
        const rankings = (data.rankings || []).slice(0, 20);
        listEl.innerHTML = "";

        rankings.forEach((item, index) => {
          const li = document.createElement("li");

          const mcName =
            item.mc_name ||
            item.MC ||
            item.name ||
            item.Name ||
            "名前不明";

          const scoreRaw =
            item.current_strength_score_v2 ??
            item.current_strength_score ??
            item.score ??
            item.Score ??
            "";

          const score =
            scoreRaw !== "" && !isNaN(Number(scoreRaw))
              ? Number(scoreRaw).toFixed(2)
              : scoreRaw;

            li.textContent = `${mcName} — ${score}`;
          listEl.appendChild(li);
        });

        statusEl.textContent = `最終取得: ${new Date().toLocaleString("ja-JP")}`;
      } catch (e) {
        statusEl.textContent = "ランキングの描画に失敗しました。";
        statusEl.classList.add("error");
        console.error(e);
      }
    };

    const script = document.createElement("script");
    script.src = `${RANKING_API_URL}?callback=${callbackName}`;
    script.onerror = function() {
      statusEl.textContent = "ランキングの読み込みに失敗しました。";
      statusEl.classList.add("error");
    };

    document.body.appendChild(script);
  }

  loadRankingsJsonp();
</script>
</body>
</html>
