<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    const SITE_OPEN = true;
    if (!SITE_OPEN) {
      location.replace('./maintenance.html');
    }
  </script>
<meta name="description" content="国内MCバトルの大会記録、試合結果、MCごとの戦績、優勝歴、独自スコアを掲載するデータベースサイトです。">
<title>MCBattle.jp | 国内MCバトル大会・MC・戦績データベース</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root{
      --panel:#171922;
      --panel-2:#1c1f2a;
      --line:#2a3040;
      --text:#f4f5f7;
      --muted:#b2b8c7;
      --accent:#d8b46a;
      --accent-2:#8fb3ff;
      --danger:#d97f7f;
      --shadow:0 18px 48px rgba(0,0,0,.28);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:
        radial-gradient(circle at top, rgba(216,180,106,.08), transparent 28%),
        linear-gradient(180deg, #11131a 0%, #0c0d12 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      line-height:1.65;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .container{
      width:min(calc(100% - (var(--page-gutter) * 2)), var(--content-max));
      margin-left:auto;
      margin-right:auto;
    }

    .page-top{
      margin-bottom:5px;
    }

    .page-mini-logo{
      margin:0 0 4px;
    }

    .site-header-copy{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
      align-items:flex-start;
    }

    .header-message{
      margin:0;
      font-size:15px;
      font-weight:600;
      line-height:1.5;
      color:var(--text);
      text-align:left;
    }

    .header-spec-link,
    .header-spec-link:hover,
    .sim-card,
    .sim-card:hover,
    .link-card,
    .link-card:hover,
    .list-row,
    .list-row:hover,
    .list-row-static,
    .header-spec-link *,
    .header-spec-link:hover *,
    .sim-card *,
    .sim-card:hover *,
    .link-card *,
    .link-card:hover *,
    .list-row *,
    .list-row:hover *,
    .list-row-static * {
      text-decoration: none !important;
    }

    .header-spec-link{
      display:inline-block;
      width:fit-content;
      max-width:100%;
      padding:7px 12px;
      border-radius:14px;
      border:1px solid rgba(216,180,106,.34);
      background:linear-gradient(180deg, rgba(216,180,106,.12), rgba(216,180,106,.05));
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        color .18s ease,
        box-shadow .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .header-spec-link:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,106,.52);
      background:linear-gradient(180deg, rgba(216,180,106,.18), rgba(216,180,106,.08));
      color:#fff4dc;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .hero{
      padding:2px 0 7px;
    }

    .hero-stack{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .sim-card{
      display:block;
      padding:12px 15px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(143,179,255,.16), rgba(143,179,255,.06));
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .sim-card:hover{
      transform:translateY(-1px);
      border-color:rgba(143,179,255,.48);
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(143,179,255,.22), rgba(143,179,255,.09));
      box-shadow:0 14px 28px rgba(0,0,0,.18);
    }

    .sim-title{
      margin:0;
      font-size:16px;
      font-weight:800;
      line-height:1.32;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-title{
      color:#e8f0ff;
    }

    .sim-sub{
      display:none;
      margin:0;
      color:var(--muted);
      font-size:13px;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-sub{
      color:#d1d9e8;
    }

    .sim-kicker{
      display:block;
      margin-bottom:1px;
      color:#c7d8ff;
      font-size:12px;
      letter-spacing:.03em;
      font-weight:700;
      line-height:1.32;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-kicker{
      color:#e2ebff;
    }

    .link-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:8px;
    }

    .link-card{
      min-height:62px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px 12px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, #242936, #1c202b);
      font-weight:700;
      font-size:15px;
      line-height:1.24;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .link-card:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.26);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        linear-gradient(180deg, #2a3040, #222734);
      color:#ffffff;
      box-shadow:0 14px 28px rgba(0,0,0,.18);
    }

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .dashboard{
      padding:2px 0 28px;
    }

    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
      align-items:start;
    }

    .dashboard-card{
      padding:16px 16px 9px;
      min-width:0;
    }

    .dashboard-title{
      margin:0 0 8px;
      font-size:17px;
      font-weight:800;
      letter-spacing:.02em;
      line-height:1.3;
    }

    .dashboard-list{
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .list-row,
    .list-row-static{
      display:block;
      padding:9px 10px 8px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.025);
      min-width:0;
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .list-row{
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
    }

    .list-row:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.24);
      background:rgba(255,255,255,.05);
      box-shadow:0 12px 24px rgba(0,0,0,.14);
    }

    .event-date{
      display:block;
      color:var(--accent);
      font-size:12px;
      font-weight:700;
      letter-spacing:.04em;
      margin-bottom:2px;
      line-height:1.25;
      transition:color .18s ease;
    }

    .list-row:hover .event-date{
      color:#f0cd87;
    }

    .event-name{
      display:block;
      font-size:14px;
      font-weight:700;
      line-height:1.34;
      word-break:break-word;
      transition:color .18s ease;
    }

    .list-row:hover .event-name{
      color:#ffffff;
    }

    .event-stage{
      display:block;
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
      line-height:1.34;
      word-break:break-word;
    }

    .rank-row{
      display:grid;
      grid-template-columns:42px minmax(0,1fr) auto;
      gap:10px;
      align-items:center;
    }

    .rank-num{
      font-family:"Times New Roman",Georgia,serif;
      font-style:italic;
      font-size:20px;
      color:var(--accent);
      text-align:center;
      line-height:1;
      transition:color .18s ease;
    }

    .list-row:hover .rank-num{
      color:#f0cd87;
    }

    .rank-name{
      min-width:0;
      font-size:16px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.24;
      transition:color .18s ease;
    }

    .list-row:hover .rank-name{
      color:#ffffff;
    }

    .rank-score{
      color:var(--muted);
      font-size:14px;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      line-height:1.24;
      transition:color .18s ease;
    }

    .list-row:hover .rank-score{
      color:#d7dee9;
    }

    .status{
      color:var(--muted);
      font-size:13px;
      padding:2px 2px 0;
    }

    .status.error{
      color:var(--danger);
    }

    .status.hidden{
      display:none;
    }

    .footer-space{
      height:14px;
    }

    .dashboard-card.is-empty{
      padding-bottom:6px;
    }

    .dashboard-card.is-empty .dashboard-list{
      display:none;
    }

    .dashboard-card.is-empty .status{
      padding-top:0;
      padding-bottom:0;
      line-height:1.35;
    }

    @media (min-width: 1024px){
      .container{
        width:min(var(--content-max), calc(100% - var(--pc-left-gutter) - var(--page-gutter)));
        margin-left:var(--pc-left-gutter);
        margin-right:auto;
      }
    }

    @media (max-width:980px){
      .dashboard-grid{
        grid-template-columns:1fr;
      }

      .link-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width:640px){
      .page-top{
        margin-bottom:5px;
      }

      .page-mini-logo{
        margin-bottom:4px;
      }

      .site-header-copy{
        gap:4px;
      }

      .header-message{
        font-size:13px;
        line-height:1.36;
      }

      .header-spec-link{
        width:100%;
        white-space:normal;
        padding:6px 10px;
        min-height:0;
        border-radius:13px;
        font-size:12px;
      }

      .hero{
        padding:0 0 5px;
      }

      .hero-stack{
        gap:6px;
      }

      .sim-card{
        padding:9px 11px;
        border-radius:15px;
      }

      .sim-kicker{
        margin-bottom:1px;
        font-size:11px;
        line-height:1.24;
      }

      .sim-title{
        font-size:14px;
        line-height:1.18;
      }

      .link-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:6px;
      }

      .link-card{
        min-height:50px;
        padding:7px 8px;
        border-radius:15px;
        font-size:13px;
        line-height:1.18;
        overflow-wrap:anywhere;
        word-break:break-word;
      }

      .dashboard{
        padding:0 0 22px;
      }

      .dashboard-grid{
        gap:7px;
      }

      .dashboard-card{
        padding:11px 10px 7px;
        border-radius:18px;
      }

      .dashboard-title{
        margin:0 0 6px;
        font-size:15px;
        line-height:1.22;
      }

      .dashboard-list{
        gap:6px;
      }

      .list-row,
      .list-row-static{
        padding:7px 8px 6px;
        border-radius:13px;
        box-shadow:0 0 0 1px rgba(255,255,255,.015) inset;
      }

      .event-date{
        font-size:11px;
        margin-bottom:1px;
      }

      .event-name{
        font-size:13px;
        line-height:1.22;
      }

      .event-stage{
        font-size:11px;
        margin-top:1px;
        line-height:1.24;
      }

      .rank-row{
        grid-template-columns:28px minmax(0,1fr) auto;
        gap:8px;
      }

      .rank-num{
        font-size:17px;
      }

      .rank-name{
        font-size:14px;
      }

      .rank-score{
        font-size:12px;
      }

      .status{
        font-size:12px;
        padding:1px 1px 0;
      }

      .dashboard-card.is-empty{
        padding-bottom:6px;
      }

      .footer-space{
        height:10px;
      }
    }
  </style>
</head>
<body>
  <header class="container page-top">
    <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>
    <div class="site-header-copy">
      <p class="header-message">日本一情報量の多いMCバトルポータル。<br>大会記録・戦績・独自スコアをまとめています。</p>
      <a class="header-spec-link" href="score_spec.html">スコアリング仕様を見る</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-stack">
          <a class="sim-card" href="simulation.html">
            <span class="sim-kicker">現役勢の8人を選んで戦わせる</span>
            <h3 class="sim-title">仮想MCバトルシミュレーション</h3>
            <p class="sim-sub"></p>
          </a>

          <div class="link-grid">
            <a class="link-card" href="score_ranking.html">スコアランキング</a>
            <a class="link-card" href="prize_ranking.html">賞金ランキング</a>
            <a class="link-card" href="list_event.html">大会一覧</a>
            <a class="link-card" href="list_mc.html">MC一覧</a>
          </div>
        </div>
      </div>
    </section>

    <section class="dashboard">
      <div class="container">
        <div class="dashboard-grid">
          <section id="future-events-card" class="panel dashboard-card">
            <h2 class="dashboard-title">今後開催予定の大会</h2>
            <div id="future-events" class="dashboard-list"></div>
            <div id="future-events-status" class="status">読み込み中…</div>
          </section>

          <section class="panel dashboard-card">
            <h2 class="dashboard-title">直近開催された大会</h2>
            <div id="recent-events" class="dashboard-list"></div>
            <div id="recent-events-status" class="status">読み込み中…</div>
          </section>

          <section class="panel dashboard-card">
            <h2 class="dashboard-title">スコアランキング</h2>
            <div id="score-ranking" class="dashboard-list"></div>
            <div id="score-ranking-status" class="status">読み込み中…</div>
          </section>

          <section class="panel dashboard-card">
            <h2 class="dashboard-title">賞金ランキング</h2>
            <div id="prize-ranking" class="dashboard-list"></div>
            <div id="prize-ranking-status" class="status">読み込み中…</div>
          </section>
        </div>
      </div>
    </section>

    <div class="footer-space"></div>
  </main>

  <script>
    const TOP_JSON_URL = "./data/top.json";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDateJP(raw) {
      if (!raw) return "";
      const s = String(raw).trim();

      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        const [y, m, d] = s.split("-");
        return `${y}.${m}.${d}`;
      }

      if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)) {
        const [y, m, d] = s.split("/");
        return `${y}.${String(m).padStart(2, "0")}.${String(d).padStart(2, "0")}`;
      }

      const date = new Date(s);
      if (!Number.isNaN(date.getTime())) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}.${m}.${d}`;
      }

      return s;
    }

    function getEventId(event) {
      return event.event_id || event.id || event.eventId || "";
    }

    function getEventName(event) {
      return event.event_name || event.name || event.title || "";
    }

    function getEventDate(event) {
      return event.event_date || event.date || event.EventDate || "";
    }

    function getEventStage(event) {
      return event.event_stage || event.stage || "";
    }

    function getEventLocation(event) {
      return event.location || "";
    }

    function getUpcomingSubText(event) {
      const location = String(getEventLocation(event) || "").trim();
      if (location) return location;

      const stage = String(getEventStage(event) || "").trim();
      if (stage) return stage;

      return "";
    }

    function getMcId(item) {
      return item.mc_id || item.id || item.mcId || "";
    }

    function getMcName(item) {
      return item.mc_name || item.name || item.mc || "";
    }

    function getRank(item, index) {
      return item.rank || item.ranking || item.position || (index + 1);
    }

    function getScore(item) {
      const raw =
        item.current_strength_score_v2 ??
        item.score ??
        item.current_score ??
        item.current_strength_score ??
        item.rating ??
        "";
      const num = Number(raw);
      if (Number.isFinite(num)) return num.toFixed(2);
      return raw ? String(raw) : "";
    }

    function getPrize(item) {
      const raw =
        item.total_prize_money ??
        item.prize_money ??
        item.prize ??
        item.total ??
        "";
      const num = Number(raw);
      if (Number.isFinite(num)) return "¥" + num.toLocaleString("ja-JP");
      return raw ? String(raw) : "";
    }

    function setStatus(id, message, isError = false) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = message;
      el.classList.toggle("error", !!isError);
      el.classList.toggle("hidden", !message);
    }

    function setEmptyCard(cardId, isEmpty) {
      const card = document.getElementById(cardId);
      if (!card) return;
      card.classList.toggle("is-empty", !!isEmpty);
    }

    async function loadTopJson() {
      const res = await fetch(TOP_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function renderRecentEventList(containerId, items, emptyMessage) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = items.map((event) => {
        const eventId = getEventId(event);
        const name = getEventName(event);
        const date = formatDateJP(getEventDate(event));
        const href = eventId ? `detail_event.html?event_id=${encodeURIComponent(eventId)}` : "list_event.html";

        return `
          <a class="list-row" href="${href}">
            <span class="event-date">${escapeHtml(date)}</span>
            <span class="event-name">${escapeHtml(name)}</span>
          </a>
        `;
      }).join("");
    }

    function renderUpcomingEventList(containerId, items, emptyMessage) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = items.map((event) => {
        const name = getEventName(event);
        const date = formatDateJP(getEventDate(event));
        const subText = getUpcomingSubText(event);

        return `
          <div class="list-row-static">
            <span class="event-date">${escapeHtml(date)}</span>
            <span class="event-name">${escapeHtml(name)}</span>
            ${subText ? `<span class="event-stage">${escapeHtml(subText)}</span>` : ""}
          </div>
        `;
      }).join("");
    }

    function renderScoreRanking(containerId, items, emptyMessage) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = items.map((item, index) => {
        const mcId = getMcId(item);
        const name = getMcName(item);
        const rank = getRank(item, index);
        const score = getScore(item);
        const href = mcId ? `detail_mc.html?mc_id=${encodeURIComponent(mcId)}` : "list_mc.html";

        return `
          <a class="list-row" href="${href}">
            <div class="rank-row">
              <div class="rank-num">${escapeHtml(rank)}</div>
              <div class="rank-name">${escapeHtml(name)}</div>
              <div class="rank-score">${escapeHtml(score)}</div>
            </div>
          </a>
        `;
      }).join("");
    }

    function renderPrizeRanking(containerId, items, emptyMessage) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = items.map((item, index) => {
        const mcId = getMcId(item);
        const name = getMcName(item);
        const rank = getRank(item, index);
        const prize = getPrize(item);
        const href = mcId ? `detail_mc.html?mc_id=${encodeURIComponent(mcId)}` : "list_mc.html";

        return `
          <a class="list-row" href="${href}">
            <div class="rank-row">
              <div class="rank-num">${escapeHtml(rank)}</div>
              <div class="rank-name">${escapeHtml(name)}</div>
              <div class="rank-score">${escapeHtml(prize)}</div>
            </div>
          </a>
        `;
      }).join("");
    }

    async function loadIndexData() {
      try {
        const payload = await loadTopJson();
        if (payload?.error) throw new Error(payload.message || "top data error");

        const recentEvents = Array.isArray(payload?.recent_events) ? payload.recent_events.slice(0, 5) : [];
        const upcomingEvents = Array.isArray(payload?.upcoming_events) ? payload.upcoming_events.slice(0, 5) : [];
        const scoreRankings = Array.isArray(payload?.score_rankings) ? payload.score_rankings.slice(0, 10) : [];
        const prizeRankings = Array.isArray(payload?.prize_rankings) ? payload.prize_rankings.slice(0, 10) : [];

        renderRecentEventList("recent-events", recentEvents, "データがありません");
        setStatus("recent-events-status", recentEvents.length ? "" : "データがありません");

        renderUpcomingEventList("future-events", upcomingEvents, "今後開催予定の大会はありません");
        setStatus("future-events-status", upcomingEvents.length ? "" : "今後開催予定の大会はありません");
        setEmptyCard("future-events-card", upcomingEvents.length === 0);

        renderScoreRanking("score-ranking", scoreRankings, "データがありません");
        setStatus("score-ranking-status", scoreRankings.length ? "" : "データがありません");

        renderPrizeRanking("prize-ranking", prizeRankings, "データがありません");
        setStatus("prize-ranking-status", prizeRankings.length ? "" : "データがありません");
      } catch (error) {
        console.error(error);
        setStatus("recent-events-status", "直近大会の読み込みに失敗しました。", true);
        setStatus("future-events-status", "今後開催予定の大会の読み込みに失敗しました。", true);
        setStatus("score-ranking-status", "スコアランキングの読み込みに失敗しました。", true);
        setStatus("prize-ranking-status", "賞金ランキングの読み込みに失敗しました。", true);
        setEmptyCard("future-events-card", false);
      }
    }

    loadIndexData();
  </script>
</body>
</html>
