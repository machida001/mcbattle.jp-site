  <style>
    :root{
      --panel:#171922;
      --panel-2:#1c1f2a;
      --line:#2a3040;
      --line-soft:rgba(255,255,255,.105);
      --text:#f4f5f7;
      --muted:#aeb5c4;
      --accent:#d8b46a;

      --accent-dark:#9b7940;
      --danger:#d97f7f;
      --shadow:0 16px 42px rgba(0,0,0,.25);

    }

    *{ box-sizing:border-box; }

    html,
    body{
      margin:0;
      padding:0;
    }

    body{
      background:
        radial-gradient(circle at 74% 6%, rgba(216,180,106,.07), transparent 30%),
        radial-gradient(circle at 16% 18%, rgba(143,179,255,.05), transparent 25%),
        linear-gradient(180deg, #11131a 0%, #0c0d12 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      line-height:1.6;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .container{
      width:min(calc(100% - (var(--page-gutter, 24px) * 2)), var(--content-max, 800px));
      margin-left:auto;
      margin-right:auto;
    }

    .site-shell{
      padding-top:0;
      padding-bottom:28px;
    }

    .main-stack{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .dashboard-two-grid{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .home-card{
      border:1px solid rgba(255,255,255,.13);
      border-radius:19px;
      background:
        linear-gradient(110deg, rgba(255,255,255,.045), rgba(255,255,255,.016)),
        radial-gradient(circle at 100% 0%, rgba(216,180,106,.08), transparent 32%),
        rgba(24,28,39,.82);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.02) inset,
        0 16px 38px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .home-card-inner{
      padding:14px 16px 16px;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:0 0 10px;
    }

    .section-title{
      display:flex;
      align-items:center;
      min-width:0;
      gap:8px;
      margin:0;
      color:var(--accent-strong);
      font-size:1.12rem;
      font-weight:900;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .section-title-label{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .section-more{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:5px;
      color:#e6e9f0;
      font-size:.86rem;
      font-weight:800;
      line-height:1;
      opacity:.92;
    }

    .section-more::after{
      content:"›";
      font-size:1.35rem;
      line-height:.75;
      transform:translateY(-1px);
    }

    .section-more:hover{
      color:#fff7e8;
      opacity:1;
    }

    .hot-mc-card{ display:none; }
    .hot-mc-card.is-visible{ display:block; }

    .hot-mc-list{
      display:flex;
      flex-wrap:wrap;
      gap:7px 8px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .hot-mc-list li{
      margin:0;
      padding:0;
    }

    .hot-mc-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:35px;
      padding:0 14px;
      border:1px solid rgba(216,180,106,.32);
      border-radius:999px;
      background:rgba(15,17,24,.36);
      color:#f4f5f7;
      font-size:.9rem;
      font-weight:900;
      line-height:1;
      letter-spacing:.01em;
      white-space:nowrap;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
    }

    .hot-mc-link:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,106,.55);
      background:rgba(216,180,106,.1);
      color:#fff7e8;
    }

    .event-list,
    .ranking-list{
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .event-row{
      display:grid;
      grid-template-columns:112px minmax(0, 1fr) 26px;
      align-items:center;
      min-height:64px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      border-radius:15px;
      background:rgba(13,16,25,.36);
      box-shadow:0 0 0 1px rgba(255,255,255,.014) inset;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease;
    }

    .event-row:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,106,.35);
      background:rgba(18,22,33,.55);
      box-shadow:0 10px 22px rgba(0,0,0,.18);
    }

    .event-row.is-static{
      cursor:default;
    }

    .event-row.is-static:hover{
      transform:none;
      border-color:rgba(255,255,255,.12);
      background:rgba(13,16,25,.36);
      box-shadow:0 0 0 1px rgba(255,255,255,.014) inset;
    }

    .event-date-box{
      align-self:stretch;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      border-right:1px solid rgba(255,255,255,.13);
      color:var(--accent-strong);
      font-weight:900;
      line-height:1.12;
      letter-spacing:.025em;
      font-variant-numeric:tabular-nums;
    }

    .event-date-main{
      display:block;
      font-size:.95rem;
      white-space:nowrap;
    }

    .event-date-dow{
      display:block;
      margin-top:5px;
      font-size:.75rem;
      letter-spacing:.14em;
      opacity:.96;
    }

    .event-body{
      min-width:0;
      padding:9px 10px 8px 14px;
    }

    .event-name{
      display:block;
      color:#f7f8fb;
      font-size:.98rem;
      font-weight:900;
      line-height:1.25;
      letter-spacing:-.028em;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .event-sub{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:.82rem;
      font-weight:700;
      line-height:1.25;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .event-winner{
      display:block;
      margin-top:3px;
      color:#d6dbea;
      font-size:.82rem;
      font-weight:800;
      line-height:1.25;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .event-arrow{
      display:flex;
      align-items:center;
      justify-content:center;
      color:#e7ebf4;
      font-size:1.55rem;
      font-weight:800;
      line-height:1;
      opacity:.9;
      transform:translateY(-1px);
    }

    .event-row.is-static .event-arrow{
      display:none;
    }

    .ranking-row{
      display:grid;
      grid-template-columns:44px minmax(0, 1fr) auto;
      align-items:center;
      gap:8px;
      min-height:56px;
      padding:0 14px;
      border:1px solid rgba(255,255,255,.115);
      border-radius:15px;
      background:rgba(13,16,25,.33);
      box-shadow:0 0 0 1px rgba(255,255,255,.014) inset;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease;
    }

    .ranking-row:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,106,.35);
      background:rgba(18,22,33,.55);
      box-shadow:0 10px 22px rgba(0,0,0,.18);
    }

    .rank-num{
      color:var(--accent);
      font-family:"Times New Roman", Georgia, serif;
      font-style:italic;
      font-size:1.12rem;
      font-weight:800;
      line-height:1;
      text-align:center;
      font-variant-numeric:tabular-nums;
    }

    .rank-name{
      min-width:0;
      color:#f7f8fb;
      font-size:.96rem;
      font-weight:900;
      line-height:1.2;
      letter-spacing:-.025em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rank-value{
      color:#c6ccda;
      font-size:.88rem;
      font-weight:900;
      line-height:1.2;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      text-align:right;
    }

    .status{
      color:var(--muted);
      font-size:.82rem;
      font-weight:700;
      padding:2px 2px 0;
    }

    .status.error{ color:var(--danger); }
    .status.hidden{ display:none; }

    .home-card.is-empty .event-list,
    .home-card.is-empty .ranking-list{
      display:none;
    }

    .home-card.is-empty .status{
      padding-top:0;
      line-height:1.35;
    }

    .footer-space{ height:16px; }

    @media (min-width: 1024px){

        width:min(var(--home-content-max), calc(100% - var(--pc-left-gutter, 72px) - var(--page-gutter, 24px)));

      .dashboard-two-grid{

      .dashboard-two-grid .home-card-inner{

      .event-row:hover,

        background:
          linear-gradient(110deg, rgba(216,180,106,.105), rgba(255,255,255,.028)),
          rgba(24,28,39,.82);
        box-shadow:

    }

    @media (max-width: 800px){

      .home-card-inner{ padding:13px 14px 14px; }

      .section-head{ margin-bottom:9px; }

      .section-title{
        gap:7px;
        font-size:1.04rem;
      }

      .section-more{ font-size:.8rem; }

      .hot-mc-list{ gap:7px; }

      .event-list,

        border-radius:14px;
      }

      .event-date-main{ font-size:.84rem; }

      .event-date-dow{
        margin-top:4px;

      }

  </style>

  <script>
    const TOP_JSON_URL = "./data/top.json";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDateJP(raw) {
      if (!raw) return "";
      const s = String(raw).trim();

      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        const [y, m, d] = s.split("-");
        return `${y}.${m}.${d}`;
      }

      if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)) {
        const [y, m, d] = s.split("/");
        return `${y}.${String(m).padStart(2, "0")}.${String(d).padStart(2, "0")}`;
      }

      const date = new Date(s);
      if (!Number.isNaN(date.getTime())) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}.${m}.${d}`;
      }

      return s;
    }

    function getDayOfWeekJP(raw) {
      if (!raw) return "";
      const s = String(raw).trim();
      let date = null;

      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        date = new Date(`${s}T00:00:00`);
      } else if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)) {
        const [y, m, d] = s.split("/");
        date = new Date(Number(y), Number(m) - 1, Number(d));
      } else {
        const parsed = new Date(s);
        if (!Number.isNaN(parsed.getTime())) date = parsed;
      }

      if (!date || Number.isNaN(date.getTime())) return "";

      const labels = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
      return labels[date.getDay()] || "";
    }

    function getEventId(event) {
      return event.event_id || event.id || event.eventId || "";
    }

    function getEventName(event) {
      return event.event_name || event.event_name_full || event.event_name_simple || event.name || event.title || "";
    }

    function getEventDate(event) {
      return event.event_date || event.date || event.EventDate || "";
    }

    function getEventStage(event) {
      return event.event_stage || event.stage || "";
    }

    function getEventLocation(event) {
      return event.location || "";
    }

    function getEventWinner(event) {
      return event.winner_name || event.winner_team_name || event.champion || event.winner || "";
    }

    function getEventSubText(event) {
      const location = String(getEventLocation(event) || "").trim();
      if (location) return location;

      const stage = String(getEventStage(event) || "").trim();
      if (stage) return stage;

      return "";
    }

    function getMcId(item) {
      return item.mc_id || item.id || item.mcId || "";
    }

    function getMcName(item) {
      return item.mc_name || item.name || item.mc || "";
    }

    function getRank(item, index) {
      return item.rank || item.ranking || item.position || (index + 1);
    }

    function getScore(item) {
      const raw =
        item.current_strength_score_v2 ??
        item.score ??
        item.current_score ??
        item.current_strength_score ??
        item.rating ??
        "";

      const num = Number(raw);
      if (Number.isFinite(num)) return num.toFixed(2);

      return raw ? String(raw) : "";
    }

    function getPrize(item) {
      const raw =
        item.total_prize_money ??
        item.prize_money ??
        item.prize ??
        item.total ??
        "";

      const num = Number(raw);
      if (Number.isFinite(num)) {
        const rounded = Math.round(num);
        return "¥" + rounded.toLocaleString("ja-JP");
      }

      return raw ? String(raw) : "";
    }

    function setStatus(id, message, isError = false) {
      const el = document.getElementById(id);
      if (!el) return;

      el.textContent = message;
      el.classList.toggle("error", !!isError);
      el.classList.toggle("hidden", !message);
    }

    function setEmptyCard(cardId, isEmpty) {
      const card = document.getElementById(cardId);
      if (!card) return;

      card.classList.toggle("is-empty", !!isEmpty);
    }

    function shuffleArray(items) {
      const result = [...items];

      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = result[i];
        result[i] = result[j];
        result[j] = temp;
      }

      return result;
    }

    async function loadTopJson() {
      const res = await fetch(TOP_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function renderEventList(containerId, items, emptyMessage, options = {}) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      const limit = Number(options.limit || items.length);
      const source = items.slice(0, limit);

      container.innerHTML = source.map((event) => {
        const eventId = getEventId(event);
        const name = getEventName(event);
        const rawDate = getEventDate(event);
        const date = formatDateJP(rawDate);
        const day = getDayOfWeekJP(rawDate);
        const subText = getEventSubText(event);
        const winner = getEventWinner(event);

        const href = options.linkEvents === false
          ? ""
          : eventId
            ? `detail_event/${encodeURIComponent(eventId)}.html`
            : "list_event.html";

        const winnerHtml = options.showWinner && winner
          ? `<span class="event-winner">優勝：${escapeHtml(winner)}</span>`
          : "";

        const inner = `
          <span class="event-date-box">
            <span class="event-date-main">${escapeHtml(date)}</span>
            ${day ? `<span class="event-date-dow">${escapeHtml(day)}</span>` : ""}
          </span>
          <span class="event-body">
            <span class="event-name">${escapeHtml(name)}</span>
            ${subText ? `<span class="event-sub">${escapeHtml(subText)}</span>` : ""}
            ${winnerHtml}
          </span>
          <span class="event-arrow" aria-hidden="true">›</span>
        `;

        if (href) {
          return `<a class="event-row" href="${href}">${inner}</a>`;
        }

        return `<div class="event-row is-static">${inner}</div>`;
      }).join("");
    }

    function renderRanking(containerId, items, emptyMessage, options = {}) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      const limit = Number(options.limit || items.length);
      const source = items.slice(0, limit);

      container.innerHTML = source.map((item, index) => {
        const mcId = getMcId(item);
        const name = getMcName(item);
        const rank = getRank(item, index);
        const value = options.type === "prize" ? getPrize(item) : getScore(item);
        const href = mcId ? `detail_mc/${encodeURIComponent(mcId)}.html` : "list_mc.html";

        return `
          <a class="ranking-row" href="${href}">
            <span class="rank-num">${escapeHtml(rank)}</span>
            <span class="rank-name">${escapeHtml(name)}</span>
            <span class="rank-value">${escapeHtml(value)}</span>
          </a>
        `;
      }).join("");
    }

    function renderHotMcs(items) {
      const card = document.getElementById("hot-mc-card");
      const list = document.getElementById("hot-mc-list");
      if (!card || !list) return;

      const hotMcs = Array.isArray(items) ? shuffleArray(items).slice(0, 10) : [];

      if (!hotMcs.length) {
        card.classList.remove("is-visible");
        list.innerHTML = "";
        return;
      }

      list.innerHTML = hotMcs.map((item) => {
        const mcId = getMcId(item);
        const name = getMcName(item);
        const href = mcId ? `detail_mc/${encodeURIComponent(mcId)}.html` : "list_mc.html";

        return `
          <li>
            <a class="hot-mc-link" href="${href}">${escapeHtml(name)}</a>
          </li>
        `;
      }).join("");

      card.classList.add("is-visible");
    }

    async function loadIndexData() {
      try {
        const payload = await loadTopJson();
        if (payload?.error) throw new Error(payload.message || "top data error");

        const recentEvents = Array.isArray(payload?.recent_events) ? payload.recent_events.slice(0, 5) : [];
        const upcomingEvents = Array.isArray(payload?.upcoming_events) ? payload.upcoming_events.slice(0, 5) : [];
        const scoreRankings = Array.isArray(payload?.score_rankings) ? payload.score_rankings.slice(0, 5) : [];
        const prizeRankings = Array.isArray(payload?.prize_rankings) ? payload.prize_rankings.slice(0, 5) : [];
        const hotMcs = Array.isArray(payload?.hot_mcs) ? payload.hot_mcs : [];

        renderHotMcs(hotMcs);

        renderEventList("future-events", upcomingEvents, "今後開催予定の大会はありません", {
          limit: 2,
          linkEvents: false,
          showWinner: false
        });
        setStatus("future-events-status", upcomingEvents.length ? "" : "今後開催予定の大会はありません");
        setEmptyCard("future-events-card", upcomingEvents.length === 0);

        renderEventList("recent-events", recentEvents, "データがありません", {
          limit: 3,
          linkEvents: true,
          showWinner: true
        });
        setStatus("recent-events-status", recentEvents.length ? "" : "データがありません");

        renderRanking("score-ranking", scoreRankings, "データがありません", {
          type: "score",
          limit: 5
        });
        setStatus("score-ranking-status", scoreRankings.length ? "" : "データがありません");

        renderRanking("prize-ranking", prizeRankings, "データがありません", {
          type: "prize",
          limit: 5
        });
        setStatus("prize-ranking-status", prizeRankings.length ? "" : "データがありません");
      } catch (error) {
        console.error(error);
        setStatus("future-events-status", "今後開催予定の大会の読み込みに失敗しました。", true);
        setStatus("recent-events-status", "直近大会の読み込みに失敗しました。", true);
        setStatus("score-ranking-status", "スコアランキングの読み込みに失敗しました。", true);
        setStatus("prize-ranking-status", "賞金ランキングの読み込みに失敗しました。", true);
        setEmptyCard("future-events-card", false);
      }
    }

    loadIndexData();
  </script>
  <script src="site-header.js"></script>
</body>
</html>
