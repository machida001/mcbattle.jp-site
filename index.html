<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Battle DB</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 64px;
      line-height: 1.6;
      color: #111;
    }
    h1, h2 {
      margin-top: 0;
    }
    section {
      margin-top: 40px;
    }
    ul, ol {
      padding-left: 20px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
    }
    .ranking-list li {
      margin-bottom: 6px;
    }
    .nav-links a {
      display: inline-block;
      margin-right: 16px;
      margin-bottom: 8px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>MC Battle DB</h1>
    <p>国内主要MCバトルの本戦結果をもとにした記録・ランキングDB</p>
    <p class="muted">現在は構築中のテスト表示です。</p>
  </header>

  <section>
    <h2>直近の大会</h2>
    <div class="card">
<p id="events-status" class="muted">読み込み中...</p>
<ul id="recent-events-list"></ul>
    </div>
  </section>

  <section>
    <h2>ランキングの決定仕様</h2>
    <div class="card">
      <p>
        1on1本戦の試合結果をもとに、対戦相手の強さ・ラウンド・大会強度などを加味して
        スコアを算出しています。詳細仕様は今後このページ上でも確認できるようにします。
      </p>
    </div>
  </section>

  <section>
    <h2>ランキング Top20</h2>
    <div class="card">
      <p id="ranking-status" class="muted">読み込み中...</p>
      <ol id="ranking-list" class="ranking-list"></ol>
<p><a href="rankings.html">100位まで見る</a></p>
    </div>
  </section>

  <section>
    <h2>記録を見る</h2>
    <div class="card nav-links">
<a href="events.html">大会一覧から記録を見る</a>
<a href="mcs.html">MC一覧から記録を見る</a>
    </div>
  </section>

<script>
  const RANKING_API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

  function loadDataJsonp() {
    const callbackName = "mcBattleDataCallback";

    const rankingStatusEl = document.getElementById("ranking-status");
    const rankingListEl = document.getElementById("ranking-list");
    const eventsStatusEl = document.getElementById("events-status");
    const recentEventsListEl = document.getElementById("recent-events-list");

    window[callbackName] = function(data) {
      console.log("JSONP data:", data);

      rankingListEl.innerHTML = "";
      recentEventsListEl.innerHTML = "";

      try {
        if (data.error) {
          rankingStatusEl.textContent = "データ取得エラー: " + (data.message || "unknown error");
          rankingStatusEl.classList.add("error");
          eventsStatusEl.textContent = "データ取得エラー";
          eventsStatusEl.classList.add("error");
          return;
        }

        const rankings = Array.isArray(data.rankings) ? data.rankings.slice(0, 20) : [];
        rankings.forEach((item) => {
          const li = document.createElement("li");

          const mcName = item.mc_name ? String(item.mc_name) : "名前不明";

          const rawScore = item.current_strength_score_v2 ?? "";
          const score = rawScore !== "" && !isNaN(Number(rawScore))
            ? Number(rawScore).toFixed(2)
            : String(rawScore);

          li.textContent = `${mcName} — ${score}`;
          rankingListEl.appendChild(li);
        });

        rankingStatusEl.textContent = `Top${rankings.length}を表示`;

        const recentEvents = Array.isArray(data.recent_events) ? data.recent_events : [];
        recentEvents.forEach((event) => {
          const li = document.createElement("li");
          const a = document.createElement("a");

          const eventDate = event.event_date ? String(event.event_date) : "";
          const eventName = event.event_name ? String(event.event_name) : "大会名不明";

a.href = `event.html?event_id=${encodeURIComponent(event.event_id)}`;
a.textContent = `${eventDate} ${eventName}`.trim();

          li.appendChild(a);
          recentEventsListEl.appendChild(li);
        });

        eventsStatusEl.textContent = `直近${recentEvents.length}件を表示`;
      } catch (err) {
        console.error("render error:", err);
        rankingStatusEl.textContent = "ランキング描画エラー";
        rankingStatusEl.classList.add("error");
        eventsStatusEl.textContent = "大会描画エラー";
        eventsStatusEl.classList.add("error");
      }
    };

    const script = document.createElement("script");
    script.src = `${RANKING_API_URL}?callback=${callbackName}`;
    script.onerror = function() {
      rankingStatusEl.textContent = "JSONP読み込み失敗";
      rankingStatusEl.classList.add("error");
      eventsStatusEl.textContent = "JSONP読み込み失敗";
      eventsStatusEl.classList.add("error");
    };

    document.body.appendChild(script);
  }

  loadDataJsonp();
</script>
</body>
</html>
