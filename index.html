<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root{
      --panel:#171922;
      --panel-2:#1c1f2a;
      --line:#2a3040;
      --text:#f4f5f7;
      --muted:#b2b8c7;
      --accent:#d8b46a;
      --accent-2:#8fb3ff;
      --danger:#d97f7f;
      --shadow:0 18px 48px rgba(0,0,0,.28);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:
        radial-gradient(circle at top, rgba(216,180,106,.08), transparent 28%),
        linear-gradient(180deg, #11131a 0%, #0c0d12 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      line-height:1.65;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .site-header{
      width:auto !important;
      max-width:none !important;
      margin:0 !important;
      padding:28px 0 14px !important;
    }

    .header-spec-link,
    .header-spec-link:hover,
    .sim-card,
    .sim-card:hover,
    .link-card,
    .link-card:hover,
    .list-row,
    .list-row:hover,
    .header-spec-link *,
    .header-spec-link:hover *,
    .sim-card *,
    .sim-card:hover *,
    .link-card *,
    .link-card:hover *,
    .list-row *,
    .list-row:hover * {
      text-decoration: none !important;
    }

    .container{
      width:min(calc(100% - (var(--page-gutter) * 2)), var(--content-max));
      margin-left:auto;
      margin-right:auto;
    }

    .site-header-inner{
      padding-left:0;
      padding-right:0;
    }

    .site-header-row{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:12px;
    }

    .site-title{
      display:inline-block;
      font-family:"Times New Roman",Georgia,"Baskerville",serif;
      font-style:italic;
      font-size:clamp(36px, 5vw, 56px);
      font-weight:600;
      letter-spacing:.03em;
      color:var(--text);
      margin:0;
      line-height:1.05;
    }

    .site-header-copy{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-start;
    }

    .header-message{
      margin:0;
      font-size:15px;
      font-weight:600;
      line-height:1.6;
      color:var(--text);
      text-align:left;
    }

    .header-spec-link{
      display:inline-block;
      width:fit-content;
      max-width:100%;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(216,180,106,.34);
      background:linear-gradient(180deg, rgba(216,180,106,.12), rgba(216,180,106,.05));
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        color .18s ease,
        box-shadow .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .header-spec-link:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,106,.52);
      background:linear-gradient(180deg, rgba(216,180,106,.18), rgba(216,180,106,.08));
      color:#fff4dc;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .hero{
      padding:8px 0 18px;
    }

    .hero-stack{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .sim-card{
      display:block;
      padding:18px 18px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(143,179,255,.16), rgba(143,179,255,.06));
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .sim-card:hover{
      transform:translateY(-1px);
      border-color:rgba(143,179,255,.48);
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(143,179,255,.22), rgba(143,179,255,.09));
      box-shadow:0 14px 28px rgba(0,0,0,.18);
    }

    .sim-title{
      margin:0;
      font-size:16px;
      font-weight:800;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-title{
      color:#e8f0ff;
    }

    .sim-sub{
      display:none;
      margin:0;
      color:var(--muted);
      font-size:13px;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-sub{
      color:#d1d9e8;
    }

    .sim-kicker{
      display:block;
      margin-bottom:4px;
      color:#c7d8ff;
      font-size:13px;
      letter-spacing:.03em;
      font-weight:700;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-kicker{
      color:#e2ebff;
    }

    .link-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:12px;
    }

    .link-card{
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:18px 16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, #242936, #1c202b);
      font-weight:700;
      font-size:15px;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .link-card:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.26);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        linear-gradient(180deg, #2a3040, #222734);
      color:#ffffff;
      box-shadow:0 14px 28px rgba(0,0,0,.18);
    }

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .dashboard{
      padding:8px 0 48px;
    }

    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:18px;
      align-items:start;
    }

    .dashboard-card{
      padding:22px 22px 14px;
      min-width:0;
    }

    .dashboard-title{
      margin:0 0 14px;
      font-size:17px;
      font-weight:800;
      letter-spacing:.02em;
    }

    .dashboard-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .list-row{
      display:block;
      padding:12px 12px 11px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.025);
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
      min-width:0;
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .list-row:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.24);
      background:rgba(255,255,255,.05);
      box-shadow:0 12px 24px rgba(0,0,0,.14);
    }

    .event-date{
      display:block;
      color:var(--accent);
      font-size:12px;
      font-weight:700;
      letter-spacing:.04em;
      margin-bottom:4px;
      transition:color .18s ease;
    }

    .list-row:hover .event-date{
      color:#f0cd87;
    }

    .event-name{
      display:block;
      font-size:14px;
      font-weight:700;
      line-height:1.45;
      word-break:break-word;
      transition:color .18s ease;
    }

    .list-row:hover .event-name{
      color:#ffffff;
    }

    .rank-row{
      display:grid;
      grid-template-columns:42px minmax(0,1fr) auto;
      gap:10px;
      align-items:center;
    }

    .rank-num{
      font-family:"Times New Roman",Georgia,serif;
      font-style:italic;
      font-size:20px;
      color:var(--accent);
      text-align:center;
      transition:color .18s ease;
    }

    .list-row:hover .rank-num{
      color:#f0cd87;
    }

    .rank-name{
      min-width:0;
      font-size:16px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      transition:color .18s ease;
    }

    .list-row:hover .rank-name{
      color:#ffffff;
    }

    .rank-score{
      color:var(--muted);
      font-size:14px;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      transition:color .18s ease;
    }

    .list-row:hover .rank-score{
      color:#d7dee9;
    }

    .status{
      color:var(--muted);
      font-size:13px;
      padding:4px 2px 2px;
    }

    .status.error{
      color:var(--danger);
    }

    .status.hidden{
      display:none;
    }

    .footer-space{
      height:28px;
    }

    @media (min-width: 1024px){
      .container{
        width:min(var(--content-max), calc(100% - var(--pc-left-gutter) - var(--page-gutter)));
        margin-left:var(--pc-left-gutter);
        margin-right:auto;
      }
    }

    @media (max-width:980px){
      .dashboard-grid{
        grid-template-columns:1fr;
      }

      .link-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width:640px){
      .site-header{
        width:auto !important;
        max-width:none !important;
        margin:0 !important;
        padding:20px 0 10px !important;
      }

      .site-header-inner{
        padding-left:0;
        padding-right:0;
      }

      .site-header-row{
        gap:6px;
      }

      .site-title{
        font-size:clamp(30px, 9vw, 44px);
      }

      .site-header-copy{
        gap:8px;
      }

      .header-message{
        font-size:14px;
        line-height:1.55;
      }

      .header-spec-link{
        width:100%;
        white-space:normal;
      }

      .hero{
        padding:4px 0 12px;
      }

      .hero-stack{
        gap:12px;
      }

      .sim-card{
        padding:14px 14px;
        border-radius:16px;
      }

      .sim-kicker{
        margin-bottom:2px;
        font-size:12px;
      }

      .sim-title{
        font-size:15px;
        line-height:1.35;
      }

      .link-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:10px;
      }

      .link-card{
        min-height:66px;
        padding:12px 10px;
        border-radius:16px;
        font-size:14px;
        line-height:1.35;
        overflow-wrap:anywhere;
        word-break:break-word;
      }

      .dashboard{
        padding:4px 0 40px;
      }

      .dashboard-grid{
        gap:12px;
      }

      .dashboard-card{
        padding:16px 14px 12px;
      }

      .dashboard-title{
        margin:0 0 10px;
        font-size:16px;
      }

      .rank-row{
        grid-template-columns:34px minmax(0,1fr) auto;
      }

      .rank-name{
        font-size:15px;
      }

      .rank-score{
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="site-header-inner">
        <div class="site-header-row">
          <h1 class="site-title">MCBattle.jp</h1>
          <div class="site-header-copy">
            <p class="header-message">日本一情報量の多いMCバトルポータル。<br>大会記録・戦績・独自スコアをまとめています。</p>
            <a class="header-spec-link" href="ranking_spec.html">スコアリング仕様を見る</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-stack">
          <a class="sim-card" href="virtual_tournament.html">
            <span class="sim-kicker">現役勢の8人を選んで戦わせる</span>
            <h3 class="sim-title">仮想MCバトルシミュレーション</h3>
            <p class="sim-sub"></p>
          </a>

          <div class="link-grid">
            <a class="link-card" href="rankings.html">スコアランキング</a>
            <a class="link-card" href="prize_rankings.html">賞金ランキング</a>
            <a class="link-card" href="events.html">大会一覧</a>
            <a class="link-card" href="mcs.html">MC一覧</a>
          </div>
        </div>
      </div>
    </section>

    <section class="dashboard">
      <div class="container">
        <div class="dashboard-grid">
          <section class="panel dashboard-card">
            <h2 class="dashboard-title">今後開催予定の大会</h2>
            <div id="future-events" class="dashboard-list"></div>
            <div id="future-events-status" class="status">読み込み中…</div>
          </section>

          <section class="panel dashboard-card">
            <h2 class="dashboard-title">直近開催された大会</h2>
            <div id="recent-events" class="dashboard-list"></div>
            <div id="recent-events-status" class="status">読み込み中…</div>
          </section>

          <section class="panel dashboard-card">
            <h2 class="dashboard-title">スコアランキング</h2>
            <div id="score-ranking" class="dashboard-list"></div>
            <div id="score-ranking-status" class="status">読み込み中…</div>
          </section>

          <section class="panel dashboard-card">
            <h2 class="dashboard-title">賞金ランキング</h2>
            <div id="prize-ranking" class="dashboard-list"></div>
            <div id="prize-ranking-status" class="status">読み込み中…</div>
          </section>
        </div>
      </div>
    </section>

    <div class="footer-space"></div>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDateJP(raw) {
      if (!raw) return "";
      const s = String(raw).trim();

      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        const [y, m, d] = s.split("-");
        return `${y}.${m}.${d}`;
      }

      if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)) {
        const [y, m, d] = s.split("/");
        return `${y}.${String(m).padStart(2, "0")}.${String(d).padStart(2, "0")}`;
      }

      const date = new Date(s);
      if (!Number.isNaN(date.getTime())) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}.${m}.${d}`;
      }

      return s;
    }

    function parseDate(raw) {
      if (!raw) return null;
      if (Object.prototype.toString.call(raw) === "[object Date]" && !Number.isNaN(raw.getTime())) {
        return raw;
      }
      const s = String(raw).trim().replace(/\./g, "-").replace(/\//g, "-");
      const date = new Date(s);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function getEventId(event) {
      return event.event_id || event.id || event.eventId || "";
    }

    function getEventName(event) {
      return event.event_name || event.name || event.title || "";
    }

    function getEventDate(event) {
      return event.event_date || event.date || event.EventDate || "";
    }

    function getMcId(item) {
      return item.mc_id || item.id || item.mcId || "";
    }

    function getMcName(item) {
      return item.mc_name || item.name || item.mc || "";
    }

    function getRank(item, index) {
      return item.rank || item.ranking || item.position || (index + 1);
    }

    function getScore(item) {
      const raw =
        item.current_strength_score_v2 ??
        item.score ??
        item.current_score ??
        item.current_strength_score ??
        item.rating ??
        "";
      const num = Number(raw);
      if (Number.isFinite(num)) return num.toFixed(2);
      return raw ? String(raw) : "";
    }

    function getPrize(item) {
      const raw =
        item.total_prize_money ??
        item.prize_money ??
        item.prize ??
        item.total ??
        "";
      const num = Number(raw);
      if (Number.isFinite(num)) return "¥" + num.toLocaleString("ja-JP");
      return raw ? String(raw) : "";
    }

    function setStatus(id, message, isError = false) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = message;
      el.classList.toggle("error", !!isError);
      el.classList.toggle("hidden", !message);
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "__jsonp_cb_" + Math.random().toString(36).slice(2);
        const script = document.createElement("script");
        const sep = url.includes("?") ? "&" : "?";
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("timeout"));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.src = `${url}${sep}callback=${callbackName}`;
        script.onerror = () => {
          cleanup();
          reject(new Error("load error"));
        };

        document.body.appendChild(script);
      });
    }

    function renderEventList(containerId, items, emptyMessage) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = items.map((event) => {
        const eventId = getEventId(event);
        const name = getEventName(event);
        const date = formatDateJP(getEventDate(event));
        const href = eventId ? `event.html?event_id=${encodeURIComponent(eventId)}` : "events.html";

        return `
          <a class="list-row" href="${href}">
            <span class="event-date">${escapeHtml(date)}</span>
            <span class="event-name">${escapeHtml(name)}</span>
          </a>
        `;
      }).join("");
    }

    function renderScoreRanking(containerId, items, emptyMessage) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = items.map((item, index) => {
        const mcId = getMcId(item);
        const name = getMcName(item);
        const rank = getRank(item, index);
        const score = getScore(item);
        const href = mcId ? `mc.html?mc_id=${encodeURIComponent(mcId)}` : "mcs.html";

        return `
          <a class="list-row" href="${href}">
            <div class="rank-row">
              <div class="rank-num">${escapeHtml(rank)}</div>
              <div class="rank-name">${escapeHtml(name)}</div>
              <div class="rank-score">${escapeHtml(score)}</div>
            </div>
          </a>
        `;
      }).join("");
    }

    function renderPrizeRanking(containerId, items, emptyMessage) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="status">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = items.map((item, index) => {
        const mcId = getMcId(item);
        const name = getMcName(item);
        const rank = getRank(item, index);
        const prize = getPrize(item);
        const href = mcId ? `mc.html?mc_id=${encodeURIComponent(mcId)}` : "mcs.html";

        return `
          <a class="list-row" href="${href}">
            <div class="rank-row">
              <div class="rank-num">${escapeHtml(rank)}</div>
              <div class="rank-name">${escapeHtml(name)}</div>
              <div class="rank-score">${escapeHtml(prize)}</div>
            </div>
          </a>
        `;
      }).join("");
    }

    async function loadTopData() {
      try {
        const payload = await jsonp(API_URL);
        if (payload?.error) throw new Error(payload.message || "top data error");

        const rankings = Array.isArray(payload?.score_rankings) ? payload.score_rankings.slice(0, 10) : [];
        const recentEventsRaw = Array.isArray(payload?.recent_events) ? payload.recent_events : [];

        renderScoreRanking("score-ranking", rankings, "データがありません");
        setStatus("score-ranking-status", rankings.length ? "" : "データがありません");

        const recentEvents = recentEventsRaw.slice(0, 5);
        renderEventList("recent-events", recentEvents, "データがありません");
        setStatus("recent-events-status", recentEvents.length ? "" : "データがありません");
      } catch (error) {
        console.error(error);
        setStatus("score-ranking-status", "スコアランキングの読み込みに失敗しました。", true);
        setStatus("recent-events-status", "直近大会の読み込みに失敗しました。", true);
      }
    }

    async function loadEventsData() {
      try {
        const payload = await jsonp(`${API_URL}?mode=events`);
        if (payload?.error) throw new Error(payload.message || "events error");

        const events = Array.isArray(payload?.events) ? payload.events : [];
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const futureEvents = events
          .map((event) => ({ ...event, __date: parseDate(getEventDate(event)) }))
          .filter((event) => event.__date && event.__date >= today)
          .sort((a, b) => a.__date - b.__date)
          .slice(0, 5);

        renderEventList("future-events", futureEvents, "今後開催予定の大会はありません");
        setStatus("future-events-status", "");
      } catch (error) {
        console.error(error);
        setStatus("future-events-status", "今後開催予定の大会の読み込みに失敗しました。", true);
      }
    }

    async function loadPrizeRanking() {
      try {
        const payload = await jsonp(`${API_URL}?mode=prize_rankings`);
        if (payload?.error) throw new Error(payload.message || "prize ranking error");

        const items = Array.isArray(payload?.rankings) ? payload.rankings.slice(0, 10) : [];
        renderPrizeRanking("prize-ranking", items, "データがありません");
        setStatus("prize-ranking-status", items.length ? "" : "データがありません");
      } catch (error) {
        console.error(error);
        setStatus("prize-ranking-status", "賞金ランキングの読み込みに失敗しました。", true);
      }
    }

    Promise.allSettled([
      loadTopData(),
      loadEventsData(),
      loadPrizeRanking()
    ]);
  </script>
</body>
</html>
