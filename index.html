<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root{
      --panel:#171922;
      --panel-2:#1c1f2a;
      --line:#2a3040;
      --text:#f4f5f7;
      --muted:#b2b8c7;
      --accent:#d8b46a;
      --accent-2:#8fb3ff;
      --danger:#d97f7f;
      --shadow:0 18px 48px rgba(0,0,0,.28);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:
        radial-gradient(circle at top, rgba(216,180,106,.08), transparent 28%),
        linear-gradient(180deg, #11131a 0%, #0c0d12 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      line-height:1.65;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .container{
      width:min(calc(100% - (var(--page-gutter) * 2)), var(--content-max));
      margin-left:auto;
      margin-right:auto;
    }

    .page-top{
      margin-bottom:14px;
    }

    .page-mini-logo{
      margin:0 0 10px;
    }

    .site-header-copy{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-start;
    }

    .header-message{
      margin:0;
      font-size:15px;
      font-weight:600;
      line-height:1.6;
      color:var(--text);
      text-align:left;
    }

    .header-spec-link,
    .header-spec-link:hover,
    .sim-card,
    .sim-card:hover,
    .link-card,
    .link-card:hover,
    .list-row,
    .list-row:hover,
    .header-spec-link *,
    .header-spec-link:hover *,
    .sim-card *,
    .sim-card:hover *,
    .link-card *,
    .link-card:hover *,
    .list-row *,
    .list-row:hover * {
      text-decoration: none !important;
    }

    .header-spec-link{
      display:inline-block;
      width:fit-content;
      max-width:100%;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(216,180,106,.34);
      background:linear-gradient(180deg, rgba(216,180,106,.12), rgba(216,180,106,.05));
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        color .18s ease,
        box-shadow .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .header-spec-link:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,106,.52);
      background:linear-gradient(180deg, rgba(216,180,106,.18), rgba(216,180,106,.08));
      color:#fff4dc;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .hero{
      padding:8px 0 18px;
    }

    .hero-stack{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .sim-card{
      display:block;
      padding:18px 18px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(143,179,255,.16), rgba(143,179,255,.06));
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        color .18s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .sim-card:hover{
      transform:translateY(-1px);
      border-color:rgba(143,179,255,.48);
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(143,179,255,.22), rgba(143,179,255,.09));
      box-shadow:0 14px 28px rgba(0,0,0,.18);
    }

    .sim-title{
      margin:0;
      font-size:16px;
      font-weight:800;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-title{
      color:#e8f0ff;
    }

    .sim-sub{
      display:none;
      margin:0;
      color:var(--muted);
      font-size:13px;
      transition:color .18s ease;
    }

    .sim-card:hover .sim-sub{
      color:#d1d9e8;
    }

    .sim-kicker{
      display:block;
      margin-bottom:4px;
      color:#c7d8ff;
      font-size:13px;
      letter-spacing:.03em;
      font-weight:700;
      transition:color .18s ease;
    }
