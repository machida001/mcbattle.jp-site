<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会記録 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .event-page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 16px 72px;
    }

    .event-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .event-card-inner .muted {
      margin-bottom: 12px;
    }

    .result-lines {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.6;
    }

    .result-medal {
      flex: 0 0 auto;
    }

    @media (max-width: 640px) {
      .event-page {
        padding: 20px 12px 56px;
      }

      .event-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="event-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <header>
      <h1 id="event-title">大会情報を読み込み中...</h1>
      <p id="event-meta" class="muted"></p>
    </header>

    <section class="card">
      <div class="event-card-inner">
        <h2>大会情報</h2>
        <ul id="event-info-list" class="meta-list"></ul>
      </div>
    </section>

    <section class="card">
      <div class="event-card-inner">
        <h2>試合結果</h2>
        <p id="matches-status" class="muted">読み込み中...</p>
        <div id="matches-list"></div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function getEventIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("event_id");
    }

    function formatNumberWithComma(value) {
      if (value === null || value === undefined || value === "") return "";
      const normalized = String(value).replace(/,/g, "").trim();
      if (!/^\d+(\.\d+)?$/.test(normalized)) return String(value);
      return Number(normalized).toLocaleString("ja-JP");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMcLink(name, mcId) {
      const safeName = escapeHtml(name || "");
      const safeId = String(mcId || "").trim();

      if (!safeName) return "";
      if (!safeId) return `<span>${safeName}</span>`;

      return `<a href="./mc.html?mc_id=${encodeURIComponent(safeId)}">${safeName}</a>`;
    }

    function ensureMatchRowStyles() {
      if (document.getElementById("event-match-row-style")) return;

      const style = document.createElement("style");
      style.id = "event-match-row-style";
      style.textContent = `
        .round-block {
          margin-top: 20px;
        }

        .round-heading {
          margin-bottom: 10px;
        }

        .match-list {
          list-style: none;
          padding: 0;
          margin: 0;
        }

        .match-list > li {
          margin: 0 0 10px 0;
          padding: 10px 12px;
          border-radius: 8px;
          background: transparent;
          border: 1px solid currentColor;
          color: inherit;
        }

        .match-row-wrap {
          display: block;
        }

        .match-row {
          display: grid;
          grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr) auto;
          gap: 8px;
          align-items: center;
          color: inherit;
        }

        .mark {
          white-space: nowrap;
          font-weight: 700;
          color: inherit;
        }

        .mark-loser,
        .name-loser {
          text-align: right;
        }

        .mark-winner,
        .name-winner {
          text-align: left;
        }

        .name {
          min-width: 0;
          overflow-wrap: anywhere;
          word-break: break-word;
          color: inherit;
        }

        .name a,
        .meta-list a {
          color: inherit;
          text-decoration: underline;
        }

        .vs-part {
          white-space: nowrap;
          text-align: center;
          font-weight: 700;
          color: inherit;
        }

        .judge-method {
          margin-top: 6px;
          font-size: 0.9em;
          text-align: center;
          color: inherit;
          opacity: 0.8;
        }

        .note-box {
          margin-bottom: 12px;
          padding: 10px 12px;
          border-radius: 8px;
          background: transparent;
          border: 1px solid currentColor;
          color: inherit;
        }

        @media (max-width: 640px) {
          .match-row {
            grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr) auto;
            gap: 6px;
            font-size: 0.95rem;
          }

          .match-list > li {
            padding: 8px 10px;
          }
        }
      `;
      document.head.appendChild(style);
    }

    function getMatchGroupsMap(groupedMatches) {
      const map = {};
      groupedMatches.forEach((group) => {
        const key = String(group.round_name || "").trim();
        map[key] = Array.isArray(group.matches) ? group.matches : [];
      });
      return map;
    }

    function getResultHtml(groupedMatches) {
      const groupMap = getMatchGroupsMap(groupedMatches);

      const finalMatches =
        groupMap["決勝"] ||
        groupMap["FINAL"] ||
        groupMap["Final"] ||
        groupMap["final"] ||
        [];

      const semiMatches =
        groupMap["準決勝"] ||
        [];

      let championHtml = "不明";
      let runnerUpHtml = "不明";
      let best4Html = "不明";

      if (finalMatches.length > 0) {
        const finalMatch = finalMatches[0];
        championHtml = renderMcLink(finalMatch.winner_name || "不明", finalMatch.winner_mc_id || "");
        runnerUpHtml = renderMcLink(finalMatch.loser_name || "不明", finalMatch.loser_mc_id || "");
      }

      if (semiMatches.length > 0) {
        const losers = semiMatches
          .map((match) => renderMcLink(match.loser_name || "不明", match.loser_mc_id || ""))
          .filter(Boolean);

        if (losers.length > 0) {
          best4Html = losers.join(" / ");
        }
      }

      return `
        <div class="result-lines">
          <div class="result-line">
            <span class="result-medal">🥇</span>
            <span>${championHtml}</span>
          </div>
          <div class="result-line">
            <span class="result-medal">🥈</span>
            <span>${runnerUpHtml}</span>
          </div>
          <div class="result-line">
            <span class="result-medal">🥉</span>
            <span>${best4Html}</span>
          </div>
        </div>
      `;
    }

    function loadEventDetail() {
      const eventId = getEventIdFromQuery();

      const titleEl = document.getElementById("event-title");
      const metaEl = document.getElementById("event-meta");
      const infoListEl = document.getElementById("event-info-list");
      const matchesStatusEl = document.getElementById("matches-status");
      const matchesListEl = document.getElementById("matches-list");

      ensureMatchRowStyles();

      if (!eventId) {
        titleEl.textContent = "大会IDが指定されていません";
        metaEl.textContent = "";
        matchesStatusEl.textContent = "event_id が見つかりませんでした。";
        matchesStatusEl.classList.add("error");
        return;
      }

      const callbackName = "mcBattleEventCallback";

      window[callbackName] = function(data) {
        console.log("event detail:", data);

        infoListEl.innerHTML = "";
        matchesListEl.innerHTML = "";
        matchesStatusEl.classList.remove("error");

        try {
          if (!data) {
            titleEl.textContent = "大会情報の取得に失敗しました";
            metaEl.textContent = "";
            matchesStatusEl.textContent = "レスポンスが空です";
            matchesStatusEl.classList.add("error");
            return;
          }

          if (data.error) {
            titleEl.textContent = "大会情報の取得に失敗しました";
            metaEl.textContent = data.message || "";
            matchesStatusEl.textContent = "データ取得エラー";
            matchesStatusEl.classList.add("error");
            return;
          }

          const event = data.event || {};
          const groupedMatches = Array.isArray(data.grouped_matches) ? data.grouped_matches : [];
          const formattedWinnerPrize = formatNumberWithComma(event.prize_money_winner);

          titleEl.textContent = event.event_name || "大会名不明";
          metaEl.textContent = `${event.event_date || ""} ${event.event_category || ""}`.trim();

          const infoItems = [
            { label: "開催日：", html: escapeHtml(event.event_date || "") },
            { label: "カテゴリ：", html: escapeHtml(event.event_category || "") },
            { label: "結果：", html: getResultHtml(groupedMatches) },
            { label: "優勝賞金：", html: escapeHtml(formattedWinnerPrize ? `${formattedWinnerPrize}円` : "") }
          ];

          infoItems.forEach((item) => {
            const li = document.createElement("li");

            const labelEl = document.createElement("span");
            labelEl.className = "meta-label";
            labelEl.textContent = item.label;

            const valueEl = document.createElement("span");
            valueEl.innerHTML = item.html || "";

            li.appendChild(labelEl);
            li.appendChild(valueEl);
            infoListEl.appendChild(li);
          });

          const warningMessages = [];
          let totalMatchCount = 0;

          groupedMatches.forEach((group) => {
            const roundName = String(group.round_name || "ラウンド不明").trim();
            const matches = Array.isArray(group.matches) ? group.matches : [];

            totalMatchCount += matches.length;

            const block = document.createElement("div");
            block.className = "round-block";

            const heading = document.createElement("h3");
            heading.className = "round-heading";
            heading.textContent = roundName;
            block.appendChild(heading);

            const ul = document.createElement("ul");
            ul.className = "match-list";

            matches.forEach((match) => {
              const li = document.createElement("li");
              li.className = "match-row-wrap";

              const loserHtml = renderMcLink(match.loser_name || "不明", match.loser_mc_id || "");
              const winnerHtml = renderMcLink(match.winner_name || "不明", match.winner_mc_id || "");
              const judgeMethod = escapeHtml(String(match.judge_method || "").trim());

              li.innerHTML = `
                <div class="match-row">
                  <span class="mark mark-loser">【✕】</span>
                  <span class="name name-loser">${loserHtml}</span>
                  <span class="vs-part">×</span>
                  <span class="name name-winner">${winnerHtml}</span>
                  <span class="mark mark-winner">【◯】</span>
                </div>
                ${judgeMethod ? `<div class="judge-method">判定: ${judgeMethod}</div>` : ""}
              `;

              ul.appendChild(li);
            });

            block.appendChild(ul);
            matchesListEl.appendChild(block);

            if (roundName === "決勝" && matches.length !== 1) {
              warningMessages.push(`決勝が ${matches.length} 試合あります`);
            }
            if (roundName === "準決勝" && matches.length > 2) {
              warningMessages.push(`準決勝が ${matches.length} 試合あります`);
            }
            if (roundName === "Best8" && matches.length > 4) {
              warningMessages.push(`Best8が ${matches.length} 試合あります`);
            }
          });

          matchesStatusEl.textContent = "";

          if (warningMessages.length > 0) {
            const note = document.createElement("div");
            note.className = "note-box";
            note.textContent = `注意: ${warningMessages.join("、")}`;
            matchesListEl.prepend(note);
            matchesStatusEl.textContent = `注意: ${warningMessages.join("、")}`;
          }

          if (totalMatchCount === 0) {
            matchesStatusEl.textContent = "試合結果がありません";
          }
        } catch (err) {
          console.error(err);
          titleEl.textContent = "大会情報の描画に失敗しました";
          matchesStatusEl.textContent = "描画エラー";
          matchesStatusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?event_id=${encodeURIComponent(eventId)}&callback=${callbackName}`;
      script.onerror = function() {
        titleEl.textContent = "大会情報の読み込みに失敗しました";
        matchesStatusEl.textContent = "JSONP読み込み失敗";
        matchesStatusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadEventDetail();
  </script>
</body>
</html>
