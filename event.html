<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会記録 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .event-page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 16px 72px;
    }

    .event-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .event-card-inner .muted {
      margin-bottom: 12px;
    }

    @media (max-width: 640px) {
      .event-page {
        padding: 20px 12px 56px;
      }

      .event-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="event-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <header>
      <h1 id="event-title">大会情報を読み込み中...</h1>
      <p id="event-meta" class="muted"></p>
    </header>

    <section class="card">
      <div class="event-card-inner">
        <h2>大会情報</h2>
        <ul id="event-info-list" class="meta-list"></ul>
      </div>
    </section>

    <section class="card">
      <div class="event-card-inner">
        <h2>試合結果</h2>
        <p id="matches-status" class="muted">読み込み中...</p>
        <div id="matches-list"></div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function getEventIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("event_id");
    }

    function formatNumberWithComma(value) {
      if (value === null || value === undefined || value === "") return "";
      const normalized = String(value).replace(/,/g, "").trim();
      if (!/^\d+$/.test(normalized)) return String(value);
      return Number(normalized).toLocaleString("ja-JP");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMcLink(name, mcId) {
      const safeName = escapeHtml(name || "");
      const safeId = String(mcId || "").trim();

      if (!safeName) return "";
      if (!safeId) return `<span>${safeName}</span>`;

      return `<a href="./mc.html?mc_id=${encodeURIComponent(safeId)}">${safeName}</a>`;
    }

    function getChampionInfo(matches) {
      if (!Array.isArray(matches) || matches.length === 0) {
        return { name: "", id: "" };
      }

      const finalMatch = matches.find((match) => String(match.round_name || "").trim() === "決勝");
      if (finalMatch && finalMatch.winner_name) {
        return {
          name: finalMatch.winner_name || "",
          id: finalMatch.winner_id || ""
        };
      }

      const normalizedFinalMatch = matches.find((match) => {
        const round = String(match.round_name || "").trim();
        return round === "FINAL" || round === "Final" || round === "final";
      });
      if (normalizedFinalMatch && normalizedFinalMatch.winner_name) {
        return {
          name: normalizedFinalMatch.winner_name || "",
          id: normalizedFinalMatch.winner_id || ""
        };
      }

      const lastWinner = [...matches].reverse().find((match) => match && match.winner_name);
      if (lastWinner) {
        return {
          name: lastWinner.winner_name || "",
          id: lastWinner.winner_id || ""
        };
      }

      return { name: "", id: "" };
    }

    function ensureMatchRowStyles() {
      if (document.getElementById("event-match-row-style")) return;

      const style = document.createElement("style");
      style.id = "event-match-row-style";
      style.textContent = `
        .round-block {
          margin-top: 20px;
        }

        .round-heading {
          margin-bottom: 10px;
        }

        .match-list {
          list-style: none;
          padding: 0;
          margin: 0;
        }

        .match-list > li {
          margin: 0 0 10px 0;
          padding: 10px 12px;
          border-radius: 8px;
          background: transparent;
          border: 1px solid currentColor;
          color: inherit;
        }

        .match-row-wrap {
          display: block;
        }

        .match-row {
          display: grid;
          grid-template-columns: 44px minmax(120px, 220px) 24px minmax(120px, 220px) 44px;
          gap: 8px;
          align-items: center;
          justify-content: start;
          width: fit-content;
          max-width: 100%;
          color: inherit;
        }

        .mark {
          white-space: nowrap;
          font-weight: 700;
          color: inherit;
        }

        .mark-loser,
        .name-loser {
          text-align: right;
        }

        .mark-winner,
        .name-winner {
          text-align: left;
        }

        .name {
          min-width: 0;
          overflow-wrap: anywhere;
          word-break: break-word;
          color: inherit;
        }

        .name a,
        .meta-list a {
          color: inherit;
          text-decoration: underline;
        }

        .vs-part {
          white-space: nowrap;
          text-align: center;
          font-weight: 700;
          color: inherit;
        }

        .judge-method {
          margin-top: 6px;
          font-size: 0.9em;
          text-align: left;
          color: inherit;
          opacity: 0.8;
        }

        .note-box {
          margin-bottom: 12px;
          padding: 10px 12px;
          border-radius: 8px;
          background: transparent;
          border: 1px solid currentColor;
          color: inherit;
        }

        @media (max-width: 860px) {
          .match-row {
            grid-template-columns: 40px minmax(100px, 1fr) 22px minmax(100px, 1fr) 40px;
            width: 100%;
          }
        }

        @media (max-width: 640px) {
          .match-row {
            grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr) auto;
            gap: 6px;
            font-size: 0.95rem;
            width: 100%;
          }

          .match-list > li {
            padding: 8px 10px;
          }
        }
      `;
      document.head.appendChild(style);
    }

    function loadEventDetail() {
      const eventId = getEventIdFromQuery();

      const titleEl = document.getElementById("event-title");
      const metaEl = document.getElementById("event-meta");
      const infoListEl = document.getElementById("event-info-list");
      const matchesStatusEl = document.getElementById("matches-status");
      const matchesListEl = document.getElementById("matches-list");

      ensureMatchRowStyles();

      if (!eventId) {
        titleEl.textContent = "大会IDが指定されていません";
        metaEl.textContent = "";
        matchesStatusEl.textContent = "event_id が見つかりませんでした。";
        matchesStatusEl.classList.add("error");
        return;
      }

      const callbackName = "mcBattleEventCallback";

      window[callbackName] = function(data) {
        console.log("event detail:", data);

        infoListEl.innerHTML = "";
        matchesListEl.innerHTML = "";
        matchesStatusEl.classList.remove("error");

        try {
          if (!data) {
            titleEl.textContent = "大会情報の取得に失敗しました";
            metaEl.textContent = "";
            matchesStatusEl.textContent = "レスポンスが空です";
            matchesStatusEl.classList.add("error");
            return;
          }

          if (data.error) {
            titleEl.textContent = "大会情報の取得に失敗しました";
            metaEl.textContent = data.message || "";
            matchesStatusEl.textContent = "データ取得エラー";
            matchesStatusEl.classList.add("error");
            return;
          }

          const event = data.event || {};
          const matches = Array.isArray(data.matches) ? data.matches : [];
          const champion = getChampionInfo(matches);
          const formattedWinnerPrize = formatNumberWithComma(event.prize_money_winner);

          titleEl.textContent = event.event_name || "大会名不明";
          metaEl.textContent = `${event.event_date || ""} ${event.event_category || ""}`.trim();

          const infoItems = [
            { label: "開催日：", html: escapeHtml(event.event_date || "") },
            { label: "カテゴリ：", html: escapeHtml(event.event_category || "") },
            { label: "優勝者：", html: renderMcLink(champion.name || "", champion.id || "") },
            { label: "優勝賞金：", html: escapeHtml(formattedWinnerPrize || "") }
          ];

          infoItems.forEach((item) => {
            const li = document.createElement("li");

            const labelEl = document.createElement("span");
            labelEl.className = "meta-label";
            labelEl.textContent = item.label;

            const valueEl = document.createElement("span");
            valueEl.innerHTML = item.html || "";

            li.appendChild(labelEl);
            li.appendChild(valueEl);
            infoListEl.appendChild(li);
          });

          const roundDisplayMap = {
            "決勝": "決勝",
            "FINAL": "決勝",
            "Final": "決勝",
            "final": "決勝",
            "準決勝": "準決勝",
            "決勝トーナメント準決勝": "準決勝",
            "ベスト4": "準決勝",
            "準々決勝": "ベスト8",
            "ベスト8": "ベスト8"
          };

          function normalizeDisplayRound(roundName) {
            const name = String(roundName || "").trim();
            return roundDisplayMap[name] || name || "ラウンド不明";
          }

          const grouped = {};

          matches.forEach((match) => {
            const displayRound = normalizeDisplayRound(match.round_name);
            if (!grouped[displayRound]) grouped[displayRound] = [];
            grouped[displayRound].push(match);
          });

          const roundOrder = [
            "決勝",
            "準決勝",
            "ベスト8",
            "ベスト16",
            "ベスト32",
            "ベスト48",
            "ベスト64",
            "3回戦",
            "2回戦",
            "1回戦",
            "シード戦"
          ];

          const sortedRoundNames = Object.keys(grouped).sort((a, b) => {
            const ai = roundOrder.indexOf(a);
            const bi = roundOrder.indexOf(b);

            if (ai === -1 && bi === -1) return a.localeCompare(b, "ja");
            if (ai === -1) return 1;
            if (bi === -1) return -1;
            return ai - bi;
          });

          sortedRoundNames.forEach((roundName) => {
            const block = document.createElement("div");
            block.className = "round-block";

            const heading = document.createElement("h3");
            heading.className = "round-heading";
            heading.textContent = roundName;
            block.appendChild(heading);

            const ul = document.createElement("ul");
            ul.className = "match-list";

            grouped[roundName].forEach((match) => {
              const li = document.createElement("li");
              li.className = "match-row-wrap";

              const loserHtml = renderMcLink(match.loser_name || "不明", match.loser_id || "");
              const winnerHtml = renderMcLink(match.winner_name || "不明", match.winner_id || "");
              const judgeMethod = escapeHtml(String(match.judge_method || "").trim());

              li.innerHTML = `
                <div class="match-row">
                  <span class="mark mark-loser">【✕】</span>
                  <span class="name name-loser">${loserHtml}</span>
                  <span class="vs-part">×</span>
                  <span class="name name-winner">${winnerHtml}</span>
                  <span class="mark mark-winner">【◯】</span>
                </div>
                ${judgeMethod ? `<div class="judge-method">判定: ${judgeMethod}</div>` : ""}
              `;

              ul.appendChild(li);
            });

            block.appendChild(ul);
            matchesListEl.appendChild(block);
          });

          const warningMessages = [];

          if (grouped["決勝"] && grouped["決勝"].length !== 1) {
            warningMessages.push(`決勝が ${grouped["決勝"].length} 試合あります`);
          }
          if (grouped["準決勝"] && grouped["準決勝"].length > 2) {
            warningMessages.push(`準決勝が ${grouped["準決勝"].length} 試合あります`);
          }
          if (grouped["ベスト8"] && grouped["ベスト8"].length > 4) {
            warningMessages.push(`ベスト8が ${grouped["ベスト8"].length} 試合あります`);
          }

          matchesStatusEl.textContent = `${matches.length}試合を表示`;

          if (warningMessages.length > 0) {
            const note = document.createElement("div");
            note.className = "note-box";
            note.textContent = `注意: ${warningMessages.join("、")}`;
            matchesListEl.prepend(note);
            matchesStatusEl.textContent = `${matches.length}試合を表示 / 注意: ${warningMessages.join("、")}`;
          }

          if (matches.length === 0) {
            matchesStatusEl.textContent = "試合結果がありません";
          }
        } catch (err) {
          console.error(err);
          titleEl.textContent = "大会情報の描画に失敗しました";
          matchesStatusEl.textContent = "描画エラー";
          matchesStatusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?event_id=${encodeURIComponent(eventId)}&callback=${callbackName}`;
      script.onerror = function() {
        titleEl.textContent = "大会情報の読み込みに失敗しました";
        matchesStatusEl.textContent = "JSONP読み込み失敗";
        matchesStatusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadEventDetail();
  </script>
</body>
</html>
