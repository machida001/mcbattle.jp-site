<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会記録 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="event-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>
    <h1 id="event-title">debug</h1>
    <p id="debug-line">starting...</p>
    <pre id="debug-json" style="white-space: pre-wrap; word-break: break-word;"></pre>
  </div>

  <script>
    async function main() {
      const titleEl = document.getElementById("event-title");
      const lineEl = document.getElementById("debug-line");
      const jsonEl = document.getElementById("debug-json");

      try {
        lineEl.textContent = "step1: reading query";
        const search = window.location.search;
        const params = new URLSearchParams(search);
        const eventId = params.get("event_id");

        titleEl.textContent = eventId || "no event_id";
        lineEl.textContent = `step2: eventId=${eventId || "(none)"}`;

        const url = "./data/event_details_all.json";
        lineEl.textContent = `step3: fetching ${url}`;

        const res = await fetch(url);
        lineEl.textContent = `step4: fetched status=${res.status}`;

        const text = await res.text();
        lineEl.textContent = `step5: text loaded length=${text.length}`;

        const data = JSON.parse(text);
        lineEl.textContent = `step6: parsed total=${data && data.total}`;

        const detailMap = data && data.event_details ? data.event_details : null;
        const target = detailMap && eventId ? detailMap[eventId] : null;

        lineEl.textContent =
          `step7: hasMap=${!!detailMap} / hasTarget=${!!target}`;

        jsonEl.textContent = JSON.stringify({
          eventId: eventId,
          total: data ? data.total : null,
          hasMap: !!detailMap,
          hasTarget: !!target,
          targetKeys: target ? Object.keys(target) : []
        }, null, 2);

      } catch (err) {
        titleEl.textContent = "error";
        lineEl.textContent = "FAILED";
        jsonEl.textContent = String(err && err.message ? err.message : err);
      }
    }

    main();
  </script>
</body>
</html>
