<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会記録 | MC Battle DB</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 64px;
      line-height: 1.6;
      color: #111;
    }
    h1, h2 {
      margin-top: 0;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin-bottom: 6px;
    }
    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <p><a href="./">← トップへ戻る</a></p>

  <header>
    <h1 id="event-title">大会情報を読み込み中...</h1>
    <p id="event-meta" class="muted"></p>
  </header>

  <section class="card">
    <h2>大会情報</h2>
    <ul id="event-info-list"></ul>
  </section>

  <section class="card">
    <h2>試合結果</h2>
    <p id="matches-status" class="muted">読み込み中...</p>
    <ul id="matches-list"></ul>
  </section>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function getEventIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("event_id");
    }

    function loadEventDetail() {
      const eventId = getEventIdFromQuery();

      const titleEl = document.getElementById("event-title");
      const metaEl = document.getElementById("event-meta");
      const infoListEl = document.getElementById("event-info-list");
      const matchesStatusEl = document.getElementById("matches-status");
      const matchesListEl = document.getElementById("matches-list");

      if (!eventId) {
        titleEl.textContent = "大会IDが指定されていません";
        metaEl.textContent = "";
        matchesStatusEl.textContent = "event_id が見つかりませんでした。";
        matchesStatusEl.classList.add("error");
        return;
      }

      const callbackName = "mcBattleEventCallback";

      window[callbackName] = function(data) {
        console.log("event detail:", data);

        infoListEl.innerHTML = "";
        matchesListEl.innerHTML = "";

        try {
          if (data.error) {
            titleEl.textContent = "大会情報の取得に失敗しました";
            metaEl.textContent = data.message || "";
            matchesStatusEl.textContent = "データ取得エラー";
            matchesStatusEl.classList.add("error");
            return;
          }

          const event = data.event || {};
          const matches = Array.isArray(data.matches) ? data.matches : [];

          titleEl.textContent = event.event_name || "大会名不明";
          metaEl.textContent = `${event.event_date || ""} ${event.event_category || ""}`.trim();

          const infoItems = [
            ["大会ID", event.event_id || ""],
            ["開催日", event.event_date || ""],
            ["カテゴリ", event.event_category || ""],
            ["賞金総額", event.prize_money_total || ""],
            ["優勝賞金", event.prize_money_winner || ""]
          ];

          infoItems.forEach(([label, value]) => {
            const li = document.createElement("li");
            li.textContent = `${label}: ${value}`;
            infoListEl.appendChild(li);
          });

const grouped = {};

matches.forEach((match) => {
  const roundName = match.round_name || "ラウンド不明";
  if (!grouped[roundName]) grouped[roundName] = [];
  grouped[roundName].push(match);
});

const roundOrder = [
  "1回戦",
  "2回戦",
  "3回戦",
  "ベスト64",
  "ベスト48",
  "ベスト32",
  "ベスト16",
  "準々決勝",
  "ベスト8",
  "準決勝",
  "決勝",
  "決勝トーナメント準決勝",
  "シード戦"
];

const sortedRoundNames = Object.keys(grouped).sort((a, b) => {
  const ai = roundOrder.indexOf(a);
  const bi = roundOrder.indexOf(b);

  if (ai === -1 && bi === -1) return a.localeCompare(b, "ja");
  if (ai === -1) return 1;
  if (bi === -1) return -1;
  return ai - bi;
});

sortedRoundNames.forEach((roundName) => {
  const sectionLi = document.createElement("li");
  sectionLi.style.listStyle = "none";
  sectionLi.style.marginTop = "16px";
  sectionLi.style.fontWeight = "bold";
  sectionLi.textContent = roundName;
  matchesListEl.appendChild(sectionLi);

  grouped[roundName].forEach((match) => {
    const li = document.createElement("li");

    const loserName = match.loser_name || "不明";
    const winnerName = match.winner_name || "不明";
    const judgeMethod = match.judge_method || "";

    li.textContent = `【✕】${loserName} × ${winnerName}【◯】｜${judgeMethod}`;
    matchesListEl.appendChild(li);
  });
});

matchesStatusEl.textContent = `${matches.length}試合を表示`;
        } catch (err) {
          console.error(err);
          titleEl.textContent = "大会情報の描画に失敗しました";
          matchesStatusEl.textContent = "描画エラー";
          matchesStatusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?event_id=${encodeURIComponent(eventId)}&callback=${callbackName}`;
      script.onerror = function() {
        titleEl.textContent = "大会情報の読み込みに失敗しました";
        matchesStatusEl.textContent = "JSONP読み込み失敗";
        matchesStatusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadEventDetail();
  </script>
</body>
</html>
