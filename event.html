<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会記録 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .event-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .event-card-inner .muted {
      margin-bottom: 12px;
    }

    @media (max-width: 640px) {
      .event-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="event-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <header>
      <h1 id="event-title">大会情報を読み込み中...</h1>
      <p id="event-meta" class="muted"></p>
    </header>

    <section class="card">
      <div class="event-card-inner">
        <h2>大会情報</h2>
        <ul id="event-info-list" class="meta-list"></ul>
      </div>
    </section>

    <section class="card">
      <div class="event-card-inner">
        <h2>試合結果</h2>
        <p id="matches-status" class="muted">読み込み中...</p>
        <div id="matches-list"></div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function getEventIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("event_id");
    }

    function formatNumberWithComma(value) {
      if (value === null || value === undefined || value === "") return "";
      const normalized = String(value).replace(/,/g, "").trim();
      if (!/^\d+$/.test(normalized)) return String(value);
      return Number(normalized).toLocaleString("ja-JP");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMcLink(name, mcId) {
      const safeName = escapeHtml(name || "");
      const safeId = String(mcId || "").trim();

      if (!safeName) return "";
      if (!safeId) return `<span>${safeName}</span>`;

      return `<a href="./mc.html?mc_id=${encodeURIComponent(safeId)}">${safeName}</a>`;
    }

    function ensureMatchRowStyles() {
      if (document.getElementById("event-match-row-style")) return;

      const style = document.createElement("style");
      style.id = "event-match-row-style";
      style.textContent = `
        .round-block {
          margin-top: 20px;
        }

        .round-heading {
          margin-bottom: 10px;
        }

        .match-list {
          list-style: none;
          padding: 0;
          margin: 0;
        }

        .match-list > li {
          margin: 0 0 10px 0;
          padding: 10px 12px;
          border-radius: 8px;
          background: transparent;
          border: 1px solid currentColor;
          color: inherit;
        }

        .match-row-wrap {
          display: block;
        }

        .match-row {
          display: grid;
          grid-template-columns: 34px minmax(120px, 180px) 20px minmax(120px, 180px) 34px;
          gap: 6px;
          align-items: center;
          justify-content: start;
          width: fit-content;
          max-width: 100%;
          color: inherit;
        }

        .mark {
          white-space: nowrap;
          font-weight: 700;
          color: inherit;
        }

        .mark-loser,
        .name-loser {
          text-align: right;
        }

        .mark-winner,
        .name-winner {
          text-align: left;
        }

        .name {
          min-width: 0;
          overflow-wrap: anywhere;
          word-break: break-word;
          color: inherit;
        }

        .name a,
        .meta-list a {
          color: inherit;
          text-decoration: underline;
        }

        .vs-part {
          white-space: nowrap;
          text-align: center;
          font-weight: 700;
          color: inherit;
        }

        .judge-method {
          margin-top: 6px;
          width: fit-content;
          max-width: 100%;
          font-size: 0.9em;
          text-align: left;
          color: inherit;
          opacity: 0.8;
        }

        .note-box {
          margin-bottom: 12px;
          padding: 10px 12px;
          border-radius: 8px;
          background: transparent;
          border: 1px solid currentColor;
          color: inherit;
        }

        @media (max-width: 900px) {
          .match-row {
            grid-template-columns: 34px minmax(90px, 1fr) 18px minmax(90px, 1fr) 34px;
            width: 100%;
          }

          .judge-method {
            width: 100%;
          }
        }

        @media (max-width: 640px) {
          .match-row {
            grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr) auto;
            gap: 6px;
            font-size: 0.95rem;
            width: 100%;
          }

          .match-list > li {
            padding: 8px 10px;
          }

          .judge-method {
            text-align: center;
          }
        }
      `;
      document.head.appendChild(style);
    }

    function normalizeDisplayRound(roundName) {
      const roundDisplayMap = {
        "決勝": "決勝",
        "FINAL": "決勝",
        "Final": "決勝",
        "final": "決勝",
        "準決勝": "準決勝",
        "決勝トーナメント準決勝": "準決勝",
        "ベスト4": "準決勝",
        "Best4": "準決勝",
        "BEST4": "準決勝",
        "準々決勝": "ベスト8",
        "ベスト8": "ベスト8",
        "Best8": "ベスト8",
        "BEST8": "ベスト8",
        "ベスト16": "ベスト16",
        "Best16": "ベスト16",
        "BEST16": "ベスト16",
        "ベスト32": "ベスト32",
        "Best32": "ベスト32",
        "BEST32": "ベスト32",
        "ベスト48": "ベスト48",
        "Best48": "ベスト48",
        "BEST48": "ベスト48",
        "ベスト64": "ベスト64",
        "Best64": "ベスト64",
        "BEST64": "ベスト64"
      };

      const name = String(roundName || "").trim();
      return roundDisplayMap[name] || name || "ラウンド不明";
    }

    function loadJsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "mcBattleEventCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const timeoutMs = 15000;
        let settled = false;

        function cleanup() {
          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        const timer = setTimeout(() => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(new Error("timeout"));
        }, timeoutMs);

        window[callbackName] = function(data) {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          cleanup();
          reject(new Error("load error"));
        };

        script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;
        document.body.appendChild(script);
      });
    }

    async function loadEventDetail() {
      const eventId = getEventIdFromQuery();

      const titleEl = document.getElementById("event-title");
      const metaEl = document.getElementById("event-meta");
      const infoListEl = document.getElementById("event-info-list");
      const matchesStatusEl = document.getElementById("matches-status");
      const matchesListEl = document.getElementById("matches-list");

      ensureMatchRowStyles();

      if (!eventId) {
        titleEl.textContent = "大会IDが指定されていません";
        metaEl.textContent = "";
        matchesStatusEl.textContent = "event_id が見つかりませんでした。";
        matchesStatusEl.classList.add("error");
        return;
      }

      try {
        const data = await loadJsonp(`${API_URL}?mode=event_detail&event_id=${encodeURIComponent(eventId)}`);

        console.log("event detail:", data);

        infoListEl.innerHTML = "";
        matchesListEl.innerHTML = "";
        matchesStatusEl.classList.remove("error");

        if (!data) {
          titleEl.textContent = "大会情報の取得に失敗しました";
          metaEl.textContent = "";
          matchesStatusEl.textContent = "レスポンスが空です";
          matchesStatusEl.classList.add("error");
          return;
        }

        if (data.error) {
          titleEl.textContent = "大会情報の取得に失敗しました";
          metaEl.textContent = data.message || "";
          matchesStatusEl.textContent = "データ取得エラー";
          matchesStatusEl.classList.add("error");
          return;
        }

        const event = data.event || {};
        const groupedMatches = Array.isArray(data.grouped_matches) ? data.grouped_matches : [];
        const totalMatches = Number(data.total_matches || 0);
        const formattedWinnerPrize = formatNumberWithComma(event.prize_money_winner);

        titleEl.textContent = event.event_name_full || event.event_name || "大会名不明";
        metaEl.textContent = `${event.event_date || ""} ${event.event_category || ""}`.trim();

        const infoItems = [
          { label: "開催日：", html: escapeHtml(event.event_date || "") },
          { label: "カテゴリ：", html: escapeHtml(event.event_category || "") },
          { label: "会場：", html: escapeHtml(event.event_stage || "") },
          { label: "優勝者：", html: escapeHtml(event.winner_name || "") },
          { label: "優勝賞金：", html: escapeHtml(formattedWinnerPrize || "") }
        ].filter((item) => item.html !== "");

        infoItems.forEach((item) => {
          const li = document.createElement("li");

          const labelEl = document.createElement("span");
          labelEl.className = "meta-label";
          labelEl.textContent = item.label;

          const valueEl = document.createElement("span");
          valueEl.innerHTML = item.html || "";

          li.appendChild(labelEl);
          li.appendChild(valueEl);
          infoListEl.appendChild(li);
        });

        groupedMatches.forEach((group) => {
          const roundName = normalizeDisplayRound(group.round_name);

          const block = document.createElement("div");
          block.className = "round-block";

          const heading = document.createElement("h3");
          heading.className = "round-heading";
          heading.textContent = roundName;
          block.appendChild(heading);

          const ul = document.createElement("ul");
          ul.className = "match-list";

          const matches = Array.isArray(group.matches) ? group.matches : [];

          matches.forEach((match) => {
            const li = document.createElement("li");
            li.className = "match-row-wrap";

            const loserHtml = renderMcLink(match.loser_name || "不明", match.loser_mc_id || "");
            const winnerHtml = renderMcLink(match.winner_name || "不明", match.winner_mc_id || "");
            const judgeMethod = escapeHtml(String(match.judge_method || "").trim());

            li.innerHTML = `
              <div class="match-row">
                <span class="mark mark-loser">【✕】</span>
                <span class="name name-loser">${loserHtml}</span>
                <span class="vs-part">×</span>
                <span class="name name-winner">${winnerHtml}</span>
                <span class="mark mark-winner">【◯】</span>
              </div>
              ${judgeMethod ? `<div class="judge-method">判定: ${judgeMethod}</div>` : ""}
            `;

            ul.appendChild(li);
          });

          block.appendChild(ul);
          matchesListEl.appendChild(block);
        });

        const warningMessages = [];
        const finals = groupedMatches.find((g) => normalizeDisplayRound(g.round_name) === "決勝");
        const semis = groupedMatches.find((g) => normalizeDisplayRound(g.round_name) === "準決勝");
        const best8 = groupedMatches.find((g) => normalizeDisplayRound(g.round_name) === "ベスト8");

        if (finals && Array.isArray(finals.matches) && finals.matches.length !== 1) {
          warningMessages.push(`決勝が ${finals.matches.length} 試合あります`);
        }
        if (semis && Array.isArray(semis.matches) && semis.matches.length > 2) {
          warningMessages.push(`準決勝が ${semis.matches.length} 試合あります`);
        }
        if (best8 && Array.isArray(best8.matches) && best8.matches.length > 4) {
          warningMessages.push(`ベスト8が ${best8.matches.length} 試合あります`);
        }

        matchesStatusEl.textContent = `${totalMatches}試合を表示`;

        if (warningMessages.length > 0) {
          const note = document.createElement("div");
          note.className = "note-box";
          note.textContent = `注意: ${warningMessages.join("、")}`;
          matchesListEl.prepend(note);
          matchesStatusEl.textContent = `${totalMatches}試合を表示 / 注意: ${warningMessages.join("、")}`;
        }

        if (totalMatches === 0) {
          matchesStatusEl.textContent = "試合結果がありません";
        }
      } catch (err) {
        console.error(err);
        titleEl.textContent = "大会情報の読み込みに失敗しました";
        metaEl.textContent = "";
        matchesStatusEl.textContent = "JSONP読み込み失敗";
        matchesStatusEl.classList.add("error");
      }
    }

    loadEventDetail();
  </script>
</body>
</html>
