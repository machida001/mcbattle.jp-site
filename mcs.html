<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC一覧 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-top{
      margin-bottom: 18px;
    }

    .page-mini-logo{
      margin: 0 0 10px;
    }

    .page-mini-logo .site-mini-logo{
      text-decoration: none;
    }

    .page-header-block{
      margin-bottom: 14px;
    }

    .page-header-block h1{
      margin: 0;
    }

    .page-nav-pills{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      max-width: 100%;
    }

    .page-nav-pill{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.93rem;
      font-weight: 700;
      line-height: 1.2;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .page-nav-pill:hover{
      text-decoration: none;
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
      border-color: var(--line-strong);
      box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
      opacity: 1;
    }

    .page-nav-break{
      flex-basis: 100%;
      height: 0;
    }

    .mcs-list-wrap {
      padding-left: 12px;
      padding-right: 12px;
    }

    .mcs-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .mcs-tab {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 12px;
      min-width: 0;
      min-height: 38px;
      font: inherit;
      font-size: 0.98rem;
      cursor: pointer;
      transition:
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        color 0.18s ease,
        transform 0.18s ease;
    }

    .mcs-tab:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-1px);
    }

    .mcs-tab.is-active {
      background: rgba(255,255,255,0.10);
      border-color: var(--line-strong);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    #mcs-status {
      display: none;
      margin-bottom: 10px;
    }

    .mcs-section-title {
      margin: 4px 0 6px;
      font-size: 0.98rem;
      color: var(--accent-soft);
    }

    .mcs-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .mcs-list li {
      margin: 0;
      padding: 0;
      border-bottom: 1px solid var(--line);
    }

    .mcs-list li:last-child {
      border-bottom: none;
    }

    .mc-link,
    .mc-link-static {
      display: block;
      padding: 9px 0;
      color: inherit;
      border-radius: 8px;
      line-height: 1.32;
    }

    .mc-link {
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .mc-link:hover {
      opacity: 0.9;
      background: rgba(255,255,255,0.03);
      text-decoration: underline;
    }

    .mc-link-static {
      text-decoration: none;
    }

    .mcs-empty {
      color: var(--muted);
      padding: 8px 0;
    }

    @media (max-width: 640px) {
      .page-top{
        margin-bottom: 14px;
      }

      .page-mini-logo{
        margin-bottom: 8px;
      }

      .page-header-block{
        margin-bottom: 12px;
      }

      .page-nav-pills{
        gap: 7px;
      }

      .page-nav-pill{
        min-height: 34px;
        padding: 0 12px;
        font-size: 0.86rem;
      }

      .mcs-list-wrap {
        padding-left: 10px;
        padding-right: 10px;
      }

      .mcs-tabs {
        gap: 7px;
        margin-bottom: 9px;
      }

      .mcs-tab {
        padding: 5px 11px;
        min-height: 34px;
        font-size: 0.92rem;
      }

      .mc-link,
      .mc-link-static {
        padding: 8px 0;
      }

      .mcs-section-title {
        margin: 3px 0 5px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="mcs-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <div class="page-header-block">
        <h1>MC一覧</h1>
      </div>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">仮想シミュレーション</a>
      </nav>
    </div>

    <section class="card">
      <div class="mcs-list-wrap">
        <div id="mcs-tabs" class="mcs-tabs"></div>
        <p id="mcs-status" class="muted">読み込み中...</p>
        <div id="mcs-panel"></div>
      </div>
    </section>
  </div>

  <script>
    const MCS_JSON_URL = "./data/mcs.json";
    const TAB_ORDER = ["あ", "か", "さ", "た", "な", "は", "ま", "や", "ら", "わ", "その他"];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function toHiragana(str) {
      return String(str || "").replace(/[\u30a1-\u30f6]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    }

    function getTabGroup(mc) {
      const yomi = toHiragana(String(mc.mc_yomi || mc.mc_name || "").trim());
      const first = yomi.charAt(0);

      if ("あいうえお".includes(first)) return "あ";
      if ("かきくけこがぎぐげご".includes(first)) return "か";
      if ("さしすせそざじずぜぞ".includes(first)) return "さ";
      if ("たちつてとだぢづでど".includes(first)) return "た";
      if ("なにぬねの".includes(first)) return "な";
      if ("はひふへほばびぶべぼぱぴぷぺぽ".includes(first)) return "は";
      if ("まみむめも".includes(first)) return "ま";
      if ("やゆよ".includes(first)) return "や";
      if ("らりるれろ".includes(first)) return "ら";
      if ("わをん".includes(first)) return "わ";

      return "その他";
    }

    function sortMcs(mcs) {
      return [...mcs].sort((a, b) => {
        const ay = String(a.mc_yomi || a.mc_name || "");
        const by = String(b.mc_yomi || b.mc_name || "");
        const yomiCompare = ay.localeCompare(by, "ja");
        if (yomiCompare !== 0) return yomiCompare;

        return String(a.mc_name || "").localeCompare(String(b.mc_name || ""), "ja");
      });
    }

    function renderTabs(groups, activeTab) {
      const tabsEl = document.getElementById("mcs-tabs");
      tabsEl.innerHTML = "";

      TAB_ORDER.forEach(tabName => {
        if (!groups[tabName] || groups[tabName].length === 0) return;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "mcs-tab" + (tabName === activeTab ? " is-active" : "");
        btn.textContent = tabName;
        btn.addEventListener("click", () => renderPanel(groups, tabName));
        tabsEl.appendChild(btn);
      });
    }

    function renderPanel(groups, activeTab) {
      renderTabs(groups, activeTab);

      const panelEl = document.getElementById("mcs-panel");
      panelEl.innerHTML = "";

      const sectionTitle = document.createElement("h2");
      sectionTitle.className = "mcs-section-title";
      sectionTitle.textContent = `${activeTab}行`;
      panelEl.appendChild(sectionTitle);

      const list = document.createElement("ul");
      list.className = "mcs-list";

      const target = groups[activeTab] || [];
      if (target.length === 0) {
        const empty = document.createElement("p");
        empty.className = "mcs-empty";
        empty.textContent = "該当するMCがいません";
        panelEl.appendChild(empty);
        return;
      }

      target.forEach(mc => {
        const li = document.createElement("li");
        const mcId = String(mc.mc_id || "");
        const name = String(mc.mc_name || "MC名不明");

        if (mcId) {
          li.innerHTML = `<a class="mc-link" href="mc.html?mc_id=${encodeURIComponent(mcId)}">${escapeHtml(name)}</a>`;
        } else {
          li.innerHTML = `<span class="mc-link-static">${escapeHtml(name)}</span>`;
        }

        list.appendChild(li);
      });

      panelEl.appendChild(list);
    }

    async function loadMcsJson() {
      const res = await fetch(MCS_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    async function loadMcsList() {
      const statusEl = document.getElementById("mcs-status");
      statusEl.classList.remove("error");

      try {
        const data = await loadMcsJson();
        console.log("mcs list:", data);

        if (data.error) {
          statusEl.style.display = "block";
          statusEl.textContent = "MC一覧の取得に失敗しました: " + (data.message || "");
          statusEl.classList.add("error");
          return;
        }

        const mcs = Array.isArray(data.mcs) ? sortMcs(data.mcs) : [];
        const groups = {};

        TAB_ORDER.forEach(tab => {
          groups[tab] = [];
        });

        mcs.forEach(mc => {
          const group = getTabGroup(mc);
          groups[group].push(mc);
        });

        const firstTab = TAB_ORDER.find(tab => groups[tab] && groups[tab].length > 0) || "あ";
        renderPanel(groups, firstTab);

        if (mcs.length === 0) {
          statusEl.style.display = "block";
          statusEl.textContent = "表示できるMCがいません";
        } else {
          statusEl.style.display = "none";
          statusEl.textContent = "";
        }
      } catch (err) {
        console.error(err);
        statusEl.style.display = "block";
        statusEl.textContent = "MC一覧の読み込みに失敗しました";
        statusEl.classList.add("error");
      }
    }

    loadMcsList();
  </script>
</body>
</html>
