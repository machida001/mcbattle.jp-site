<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC一覧 | MC Battle DB</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <p><a href="./">← トップへ戻る</a></p>

  <header>
    <h1>MC一覧</h1>
    <p class="muted">mc_yomi ベースで並べています。</p>
  </header>

  <section class="card">
    <p id="mcs-status" class="muted">読み込み中...</p>
    <ul id="mcs-list"></ul>
  </section>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function loadMcsList() {
      const callbackName = "mcBattleMcsCallback";
      const statusEl = document.getElementById("mcs-status");
      const listEl = document.getElementById("mcs-list");

      window[callbackName] = function(data) {
        console.log("mcs list:", data);

        listEl.innerHTML = "";

        try {
          if (data.error) {
            statusEl.textContent = "MC一覧の取得に失敗しました: " + (data.message || "");
            statusEl.classList.add("error");
            return;
          }

          const mcs = Array.isArray(data.mcs) ? data.mcs : [];

          mcs.forEach((mc) => {
            const li = document.createElement("li");
            const a = document.createElement("a");

            a.href = `mc.html?mc_id=${encodeURIComponent(mc.mc_id)}`;

            const name = mc.mc_name ? String(mc.mc_name) : "MC名不明";
            a.textContent = name;

            li.appendChild(a);
            listEl.appendChild(li);
          });

          statusEl.textContent = `${mcs.length}名を表示`;
        } catch (err) {
          console.error(err);
          statusEl.textContent = "MC一覧の描画に失敗しました";
          statusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?mode=mcs&callback=${callbackName}`;
      script.onerror = function() {
        statusEl.textContent = "MC一覧の読み込みに失敗しました";
        statusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadMcsList();
  </script>
</body>
</html>
