<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC一覧 | MC Battle DB</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 64px;
      line-height: 1.6;
      color: #111;
    }
    h1, h2 {
      margin-top: 0;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin-bottom: 8px;
    }
    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <p><a href="./">← トップへ戻る</a></p>

  <header>
    <h1>MC一覧</h1>
    <p class="muted">mc_yomi ベースで並べています。</p>
  </header>

  <section class="card">
    <p id="mcs-status" class="muted">読み込み中...</p>
    <ul id="mcs-list"></ul>
  </section>

  <script>
    const API_URL = "ここにあなたの /exec URL を貼る";

    function loadMcsList() {
      const callbackName = "mcBattleMcsCallback";
      const statusEl = document.getElementById("mcs-status");
      const listEl = document.getElementById("mcs-list");

      window[callbackName] = function(data) {
        console.log("mcs list:", data);

        listEl.innerHTML = "";

        try {
          if (data.error) {
            statusEl.textContent = "MC一覧の取得に失敗しました: " + (data.message || "");
            statusEl.classList.add("error");
            return;
          }

          const mcs = Array.isArray(data.mcs) ? data.mcs : [];

          mcs.forEach((mc) => {
            const li = document.createElement("li");
            const a = document.createElement("a");

            a.href = `mc.html?mc_id=${encodeURIComponent(mc.mc_id)}`;

            const name = mc.mc_name ? String(mc.mc_name) : "MC名不明";
            a.textContent = name;

            li.appendChild(a);
            listEl.appendChild(li);
          });

          statusEl.textContent = `${mcs.length}名を表示`;
        } catch (err) {
          console.error(err);
          statusEl.textContent = "MC一覧の描画に失敗しました";
          statusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?mode=mcs&callback=${callbackName}`;
      script.onerror = function() {
        statusEl.textContent = "MC一覧の読み込みに失敗しました";
        statusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadMcsList();
  </script>
</body>
</html>
