<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC一覧 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .mcs-page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 16px 72px;
    }

    .mcs-list-wrap {
      padding-left: 12px;
      padding-right: 12px;
    }

    #mcs-status {
      margin-bottom: 12px;
    }

    .mcs-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .mcs-list li {
      margin: 0;
      padding: 0;
      border-bottom: 1px solid var(--line);
    }

    .mcs-list li:last-child {
      border-bottom: none;
    }

    .mc-link,
    .mc-link-static {
      display: block;
      padding: 11px 0;
      color: inherit;
      border-radius: 8px;
    }

    .mc-link {
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .mc-link:hover {
      opacity: 0.9;
      background: rgba(255,255,255,0.03);
      text-decoration: underline;
    }

    .mc-link-static {
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .mcs-page {
        padding: 20px 12px 56px;
      }

      .mcs-list-wrap {
        padding-left: 10px;
        padding-right: 10px;
      }

      .mc-link,
      .mc-link-static {
        padding: 9px 0;
      }
    }
  </style>
</head>
<body>
  <div class="mcs-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <header>
      <h1>MC一覧</h1>
    </header>

    <section class="card">
      <div class="mcs-list-wrap">
        <p id="mcs-status" class="muted">読み込み中...</p>
        <ul id="mcs-list" class="mcs-list"></ul>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function loadMcsList() {
      const callbackName = "mcBattleMcsCallback";
      const statusEl = document.getElementById("mcs-status");
      const listEl = document.getElementById("mcs-list");

      window[callbackName] = function(data) {
        console.log("mcs list:", data);

        listEl.innerHTML = "";
        statusEl.classList.remove("error");

        try {
          if (data.error) {
            statusEl.textContent = "MC一覧の取得に失敗しました: " + (data.message || "");
            statusEl.classList.add("error");
            return;
          }

          const mcs = Array.isArray(data.mcs) ? data.mcs : [];

          mcs.forEach((mc) => {
            const li = document.createElement("li");

            const mcId = mc.mc_id ? String(mc.mc_id) : "";
            const name = mc.mc_name ? String(mc.mc_name) : "MC名不明";

            if (mcId) {
              li.innerHTML = `<a class="mc-link" href="mc.html?mc_id=${encodeURIComponent(mcId)}">${escapeHtml(name)}</a>`;
            } else {
              li.innerHTML = `<span class="mc-link-static">${escapeHtml(name)}</span>`;
            }

            listEl.appendChild(li);
          });

          statusEl.textContent = `${mcs.length}名を表示`;
        } catch (err) {
          console.error(err);
          statusEl.textContent = "MC一覧の描画に失敗しました";
          statusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?mode=mcs&callback=${callbackName}`;
      script.onerror = function() {
        statusEl.textContent = "MC一覧の読み込みに失敗しました";
        statusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadMcsList();
  </script>
</body>
</html>
