<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランキング | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .spec-card-link{
      display: block;
      margin-bottom: 10px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      text-decoration: none;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .spec-card-link:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,0.06);
      border-color: var(--line-strong);
      box-shadow: 0 0 18px var(--glow);
      text-decoration: none;
    }

    .spec-card-title{
      margin: 0;
      color: var(--accent);
      font-size: 0.96rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .rankings-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .rankings-card-head{
      margin-bottom: 8px;
    }

    .rankings-table-wrap {
      overflow-x: visible;
      width: 100%;
    }

    table.rankings-table {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: collapse;
      margin-top: 0;
    }

    table.rankings-table col:nth-child(1) {
      width: 58px;
    }

    table.rankings-table col:nth-child(2) {
      width: auto;
    }

    table.rankings-table col:nth-child(3) {
      width: 84px;
    }

    table.rankings-table th,
    table.rankings-table td {
      padding: 6px 8px;
      vertical-align: middle;
    }

    table.rankings-table th:nth-child(1),
    table.rankings-table td:nth-child(1) {
      text-align: right;
      white-space: nowrap;
    }

    table.rankings-table th:nth-child(2),
    table.rankings-table td:nth-child(2) {
      text-align: left;
      min-width: 0;
    }

    table.rankings-table th:nth-child(3),
    table.rankings-table td:nth-child(3) {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    table.rankings-table tbody tr:hover {
      opacity: 0.92;
    }

    .rank-name-link,
    .rank-name-text {
      display: block;
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.35;
    }

    .rank-name-link:hover {
      opacity: 0.85;
    }

    @media (max-width: 640px) {
      .spec-card-link{
        margin-bottom: 8px;
        padding: 10px 12px;
        border-radius: 15px;
      }

      .spec-card-title{
        font-size: 0.9rem;
      }

      .rankings-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      .rankings-card-head{
        margin-bottom: 6px;
      }

      table.rankings-table col:nth-child(1) {
        width: 42px;
      }

      table.rankings-table col:nth-child(3) {
        width: 62px;
      }

      table.rankings-table th,
      table.rankings-table td {
        padding: 5px 4px;
        font-size: 0.9rem;
      }

      .rank-name-link,
      .rank-name-text {
        line-height: 1.28;
      }
    }
  </style>
</head>
<body>
  <div class="rankings-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">仮想シミュレーション</a>
      </nav>

      <div class="page-header-block">
        <h1>スコアランキング</h1>
      </div>

      <a class="spec-card-link" href="ranking_spec.html">
        <p class="spec-card-title">スコアリング仕様</p>
      </a>
    </div>

    <section class="card">
      <div class="rankings-card-inner">
        <div class="rankings-card-head">
          <p id="rankings-status" class="muted"></p>
        </div>

        <div class="rankings-table-wrap">
          <table class="rankings-table">
            <colgroup>
              <col />
              <col />
              <col />
            </colgroup>
            <thead>
              <tr>
                <th>順位</th>
                <th>MC名</th>
                <th>スコア</th>
              </tr>
            </thead>
            <tbody id="rankings-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const RANKINGS_JSON_URL = "./data/rankings.json";

    async function loadRankingsJson() {
      const res = await fetch(RANKINGS_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function loadRankingsPage() {
      const statusEl = document.getElementById("rankings-status");
      const bodyEl = document.getElementById("rankings-body");

      loadRankingsJson()
        .then((data) => {
          console.log("rankings page:", data);

          bodyEl.innerHTML = "";
          statusEl.classList.remove("error");

          try {
            if (data.error) {
              statusEl.textContent = "ランキングの取得に失敗しました: " + (data.message || "");
              statusEl.classList.add("error");
              return;
            }

            const rankings = Array.isArray(data.rankings) ? data.rankings.slice(0, 100) : [];

            rankings.forEach((item, index) => {
              const tr = document.createElement("tr");

              const rankTd = document.createElement("td");
              const nameTd = document.createElement("td");
              const scoreTd = document.createElement("td");

              const rank = item.rank || (index + 1);
              const mcId = item.mc_id || "";
              const mcName = item.mc_name || "名前不明";

              const rawScore =
                item.current_strength_score_v2 ??
                item.current_strength_score ??
                item.current_score ??
                item.score ??
                "";

              const score = rawScore !== "" && !isNaN(Number(rawScore))
                ? Number(rawScore).toFixed(2)
                : String(rawScore);

              rankTd.textContent = rank;

              if (mcId) {
                const a = document.createElement("a");
                a.href = `mc.html?mc_id=${encodeURIComponent(mcId)}`;
                a.textContent = mcName;
                a.className = "rank-name-link";
                nameTd.appendChild(a);
              } else {
                const span = document.createElement("span");
                span.textContent = mcName;
                span.className = "rank-name-text";
                nameTd.appendChild(span);
              }

              scoreTd.textContent = score;

              tr.appendChild(rankTd);
              tr.appendChild(nameTd);
              tr.appendChild(scoreTd);

              bodyEl.appendChild(tr);
            });

            statusEl.textContent = "";
          } catch (err) {
            console.error(err);
            statusEl.textContent = "ランキングの描画に失敗しました";
            statusEl.classList.add("error");
          }
        })
        .catch((err) => {
          console.error(err);
          statusEl.textContent = "ランキングの読み込みに失敗しました";
          statusEl.classList.add("error");
        });
    }

    loadRankingsPage();
  </script>
</body>
</html>
