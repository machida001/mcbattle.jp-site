<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランキング | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-top{
      margin-bottom: 18px;
    }

    .page-mini-logo{
      margin: 0 0 10px;
    }

    .page-mini-logo .site-mini-logo{
      display: inline-block;
      text-decoration: none;
      font-size: clamp(1.56rem, 5.9vw, 1.96rem);
      line-height: 1.08;
      letter-spacing: -0.01em;
    }

    .page-header-block{
      margin-bottom: 14px;
    }

    .page-header-block h1{
      margin: 0;
      font-size: clamp(1.72rem, 6.45vw, 2.08rem);
      line-height: 1.08;
      letter-spacing: -0.015em;
      font-weight: 750;
    }

    .page-nav-pills{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      max-width: 100%;
    }

    .page-nav-pill{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.93rem;
      font-weight: 700;
      line-height: 1.2;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .page-nav-pill:hover{
      text-decoration: none;
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
      border-color: var(--line-strong);
      box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
      opacity: 1;
    }

    .page-nav-break{
      flex-basis: 100%;
      height: 0;
    }

    .rankings-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .rankings-card-head{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .rankings-spec-link{
      display: inline-block;
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.15em;
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .rankings-spec-link:hover{
      opacity: 0.85;
    }

    .rankings-table-wrap {
      overflow-x: visible;
      width: 100%;
    }

    table.rankings-table {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: collapse;
      margin-top: 0;
    }

    table.rankings-table col:nth-child(1) {
      width: 58px;
    }

    table.rankings-table col:nth-child(2) {
      width: auto;
    }

    table.rankings-table col:nth-child(3) {
      width: 84px;
    }

    table.rankings-table th,
    table.rankings-table td {
      padding: 6px 8px;
      vertical-align: middle;
    }

    table.rankings-table th:nth-child(1),
    table.rankings-table td:nth-child(1) {
      text-align: right;
      white-space: nowrap;
    }

    table.rankings-table th:nth-child(2),
    table.rankings-table td:nth-child(2) {
      text-align: left;
      min-width: 0;
    }

    table.rankings-table th:nth-child(3),
    table.rankings-table td:nth-child(3) {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    table.rankings-table tbody tr:hover {
      opacity: 0.92;
    }

    .rank-name-link,
    .rank-name-text {
      display: block;
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.35;
    }

    .rank-name-link:hover {
      opacity: 0.85;
    }

    @media (max-width: 640px) {
      .page-top{
        margin-bottom: 14px;
      }

      .page-mini-logo{
        margin-bottom: 8px;
      }

      .page-mini-logo .site-mini-logo{
        font-size: clamp(1.42rem, 6.15vw, 1.74rem);
        line-height: 1.06;
      }

      .page-header-block{
        margin-bottom: 12px;
      }

      .page-header-block h1{
        font-size: clamp(1.58rem, 6.85vw, 1.9rem);
        line-height: 1.06;
        font-weight: 750;
      }

      .page-nav-pills{
        gap: 7px;
      }

      .page-nav-pill{
        min-height: 34px;
        padding: 0 12px;
        font-size: 0.86rem;
      }

      .rankings-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      .rankings-card-head{
        margin-bottom: 6px;
      }

      .rankings-spec-link{
        font-size: 0.88rem;
      }

      table.rankings-table col:nth-child(1) {
        width: 42px;
      }

      table.rankings-table col:nth-child(3) {
        width: 62px;
      }

      table.rankings-table th,
      table.rankings-table td {
        padding: 5px 4px;
        font-size: 0.9rem;
      }

      .rank-name-link,
      .rank-name-text {
        line-height: 1.28;
      }
    }
  </style>
</head>
<body>
  <div class="rankings-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <div class="page-header-block">
        <h1>スコアランキング</h1>
      </div>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">仮想シミュレーション</a>
      </nav>
    </div>

    <section class="card">
      <div class="rankings-card-inner">
        <div class="rankings-card-head">
          <p id="rankings-status" class="muted"></p>
          <a class="rankings-spec-link" href="ranking_spec.html">ランキング仕様</a>
        </div>

        <div class="rankings-table-wrap">
          <table class="rankings-table">
            <colgroup>
              <col />
              <col />
              <col />
            </colgroup>
            <thead>
              <tr>
                <th>順位</th>
                <th>MC名</th>
                <th>スコア</th>
              </tr>
            </thead>
            <tbody id="rankings-body"></tbody>
          </table>
        </div>
      </div>
    </section
