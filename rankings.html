<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランキング | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .rankings-page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 16px 72px;
    }

    .rankings-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .rankings-table-wrap {
      overflow-x: auto;
    }

    table.rankings-table {
      width: fit-content !important;
      max-width: none !important;
      min-width: 0 !important;
      table-layout: auto !important;
      border-collapse: collapse;
      margin-top: 8px;
    }

    table.rankings-table th,
    table.rankings-table td {
      width: auto !important;
      white-space: nowrap;
      padding: 6px 8px;
      vertical-align: middle;
    }

    table.rankings-table th:nth-child(1),
    table.rankings-table td:nth-child(1) {
      text-align: right;
    }

    table.rankings-table th:nth-child(3),
    table.rankings-table td:nth-child(3) {
      text-align: right;
    }

    table.rankings-table tbody tr:hover {
      opacity: 0.92;
    }

    .rank-name-link {
      display: inline-block;
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      white-space: nowrap;
    }

    .rank-name-link:hover {
      opacity: 0.85;
    }

    @media (max-width: 640px) {
      .rankings-page {
        padding: 20px 12px 56px;
      }

      .rankings-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      table.rankings-table th,
      table.rankings-table td {
        padding: 5px 6px;
        font-size: 0.93rem;
      }
    }
  </style>
</head>
<body>
  <div class="rankings-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <header>
      <h1>スコアランキング</h1>
      <p class="muted">現行の v2 スコアに基づく順位です。</p>
    </header>

    <section class="card">
      <div class="rankings-card-inner">
        <p id="rankings-status" class="muted">読み込み中...</p>
        <div class="rankings-table-wrap">
          <table class="rankings-table">
            <thead>
              <tr>
                <th>順位</th>
                <th>MC名</th>
                <th>スコア</th>
              </tr>
            </thead>
            <tbody id="rankings-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";

    function loadRankingsPage() {
      const callbackName = "mcBattleRankingsPageCallback";
      const statusEl = document.getElementById("rankings-status");
      const bodyEl = document.getElementById("rankings-body");

      window[callbackName] = function(data) {
        console.log("rankings page:", data);

        bodyEl.innerHTML = "";
        statusEl.classList.remove("error");

        try {
          if (data.error) {
            statusEl.textContent = "ランキングの取得に失敗しました: " + (data.message || "");
            statusEl.classList.add("error");
            return;
          }

       
const rankings = Array.isArray(data.rankings) ? data.rankings.slice(0, 100) : [];

          rankings.forEach((item, index) => {
            const tr = document.createElement("tr");

            const rankTd = document.createElement("td");
            const nameTd = document.createElement("td");
            const scoreTd = document.createElement("td");

            const rank = item.rank || (index + 1);
            const mcId = item.mc_id || "";
            const mcName = item.mc_name || "名前不明";

            const rawScore = item.current_strength_score_v2 ?? item.current_strength_score ?? item.score ?? "";
            const score = rawScore !== "" && !isNaN(Number(rawScore))
              ? Number(rawScore).toFixed(2)
              : String(rawScore);

            rankTd.textContent = rank;

            if (mcId) {
              const a = document.createElement("a");
              a.href = `mc.html?mc_id=${encodeURIComponent(mcId)}`;
              a.textContent = mcName;
              a.className = "rank-name-link";
              nameTd.appendChild(a);
            } else {
              nameTd.textContent = mcName;
            }

            scoreTd.textContent = score;

            tr.appendChild(rankTd);
            tr.appendChild(nameTd);
            tr.appendChild(scoreTd);

            bodyEl.appendChild(tr);
          });

          statusEl.textContent = `${rankings.length}名を表示`;
        } catch (err) {
          console.error(err);
          statusEl.textContent = "ランキングの描画に失敗しました";
          statusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?mode=rankings&callback=${callbackName}`;
      script.onerror = function() {
        statusEl.textContent = "ランキングの読み込みに失敗しました";
        statusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadRankingsPage();
  </script>
</body>
</html>
