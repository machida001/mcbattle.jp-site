<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スコアランキング | MCバトルスコアランキング | MCBattle.jp</title>
  <meta name="description" content="国内MCバトルのスコアランキングページです。試合結果をもとに算出した独自スコアで、各MCの順位を掲載しています。">
  <link rel="stylesheet" href="style.css" />
  <style>
    .spec-card-link{
      display: block;
      margin-bottom: 10px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      text-decoration: none;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .spec-card-link:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,0.06);
      border-color: var(--line-strong);
      box-shadow: 0 0 18px var(--glow);
      text-decoration: none;
    }

    .spec-card-title{
      margin: 0;
      color: var(--accent);
      font-size: 0.96rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .top3-wrap {
      margin-bottom: 18px;
    }

    .top3-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .top3-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .top3-row + .top3-row {
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .top3-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      font-size: 1.12rem;
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.01em;
    }

    .top3-medal {
      flex: 0 0 auto;
      font-size: 0.96em;
      line-height: 1;
    }

    .top3-name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top3-name a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .top3-name a:hover {
      opacity: 0.85;
    }

    .top3-score {
      color: var(--accent);
      font-weight: 800;
      font-size: 1.08rem;
      line-height: 1;
      letter-spacing: -0.02em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .rankings-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .rankings-card-head{
      margin-bottom: 8px;
    }

    .rankings-table-wrap {
      overflow-x: visible;
      width: 100%;
    }

    table.rankings-table {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: collapse;
      margin-top: 0;
    }

    table.rankings-table col:nth-child(1) {
      width: 58px;
    }

    table.rankings-table col:nth-child(2) {
      width: auto;
    }

    table.rankings-table col:nth-child(3) {
      width: 84px;
    }

    table.rankings-table td {
      padding: 10px 8px;
      vertical-align: middle;
    }

    table.rankings-table td:nth-child(1) {
      text-align: right;
      white-space: nowrap;
    }

    table.rankings-table td:nth-child(2) {
      text-align: left;
      min-width: 0;
    }

    table.rankings-table td:nth-child(3) {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    table.rankings-table tbody tr + tr {
      border-top: 1px solid rgba(214,178,95,0.26);
    }

    .rank-rank {
      color: #ffffff;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .rank-name-link,
    .rank-name-text {
      display: block;
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.35;
    }

    .rank-name-link:hover {
      opacity: 0.85;
    }

    .rank-score {
      color: #ffffff;
      font-weight: 500;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    @media (max-width: 640px) {
      .spec-card-link{
        margin-bottom: 8px;
        padding: 10px 12px;
        border-radius: 15px;
      }

      .spec-card-title{
        font-size: 0.9rem;
      }

      .top3-row {
        gap: 10px;
        padding: 10px 0;
      }

      .top3-left {
        gap: 7px;
        font-size: 0.98rem;
      }

      .top3-medal {
        font-size: 0.92em;
      }

      .top3-score {
        font-size: 0.98rem;
      }

      .rankings-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      .rankings-card-head{
        margin-bottom: 6px;
      }

      table.rankings-table col:nth-child(1) {
        width: 42px;
      }

      table.rankings-table col:nth-child(3) {
        width: 62px;
      }

      table.rankings-table td {
        padding: 8px 4px;
        font-size: 0.9rem;
      }

      .rank-name-link,
      .rank-name-text {
        line-height: 1.28;
      }

      .rank-score {
        font-size: 0.94rem;
      }
    }
  </style>
</head>
<body>
  <div class="rankings-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">仮想シミュレーション</a>
      </nav>

      <div class="page-header-block">
        <h1>スコアランキング</h1>
      </div>

      <a class="spec-card-link" href="ranking_spec.html">
        <p class="spec-card-title">【重要】スコアリングの考え方</p>
      </a>
    </div>

    <div class="top3-wrap">
      <div id="top3" class="top3-list"></div>
    </div>

    <section class="card">
      <div class="rankings-card-inner">
        <div class="rankings-card-head">
          <p id="rankings-status" class="muted"></p>
        </div>

        <div class="rankings-table-wrap">
          <table class="rankings-table">
            <colgroup>
              <col />
              <col />
              <col />
            </colgroup>
            <tbody id="rankings-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const RANKINGS_JSON_URL = "./data/rankings.json";

    async function loadRankingsJson() {
      const res = await fetch(RANKINGS_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function medalEmoji(rank) {
      if (rank === 1) return "🥇";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return "";
    }

    function formatScore(value) {
      return value !== "" && !isNaN(Number(value))
        ? Number(value).toFixed(2)
        : String(value);
    }

    function extractScore(item) {
      return (
        item.current_strength_score_v2 ??
        item.current_strength_score ??
        item.current_score ??
        item.score ??
        ""
      );
    }

    function buildTop3(items) {
      return items.map(item => {
        const wrapper = document.createElement("div");
        wrapper.className = "top3-row";

        const left = document.createElement("div");
        left.className = "top3-left";

        const medal = document.createElement("span");
        medal.className = "top3-medal";
        medal.setAttribute("aria-hidden", "true");
        medal.textContent = medalEmoji(item.rank);

        const nameWrap = document.createElement("span");
        nameWrap.className = "top3-name";

        if (item.mc_id) {
          const a = document.createElement("a");
          a.href = `mc.html?mc_id=${encodeURIComponent(item.mc_id)}`;
          a.textContent = item.mc_name;
          a.title = item.mc_name;
          nameWrap.appendChild(a);
        } else {
          nameWrap.textContent = item.mc_name;
          nameWrap.title = item.mc_name;
        }

        const score = document.createElement("div");
        score.className = "top3-score";
        score.textContent = formatScore(item.raw_score);

        left.appendChild(medal);
        left.appendChild(nameWrap);
        wrapper.appendChild(left);
        wrapper.appendChild(score);

        return wrapper;
      });
    }

    function loadRankingsPage() {
      const statusEl = document.getElementById("rankings-status");
      const top3El = document.getElementById("top3");
      const bodyEl = document.getElementById("rankings-body");

      loadRankingsJson()
        .then((data) => {
          console.log("rankings page:", data);

          top3El.innerHTML = "";
          bodyEl.innerHTML = "";
          statusEl.classList.remove("error");

          try {
            if (data.error) {
              statusEl.textContent = "ランキングの取得に失敗しました: " + (data.message || "");
              statusEl.classList.add("error");
              return;
            }

            const rankings = Array.isArray(data.rankings) ? data.rankings.slice(0, 100) : [];

            const normalized = rankings.map((item, index) => ({
              rank: item.rank || (index + 1),
              mc_id: item.mc_id || "",
              mc_name: item.mc_name || "名前不明",
              raw_score: extractScore(item)
            }));

            const top3 = normalized.slice(0, 3);
            const rest = normalized.slice(3);

            buildTop3(top3).forEach(node => top3El.appendChild(node));

            rest.forEach((item) => {
              const tr = document.createElement("tr");

              const rankTd = document.createElement("td");
              const nameTd = document.createElement("td");
              const scoreTd = document.createElement("td");

              rankTd.textContent = item.rank;
              rankTd.className = "rank-rank";

              if (item.mc_id) {
                const a = document.createElement("a");
                a.href = `mc.html?mc_id=${encodeURIComponent(item.mc_id)}`;
                a.textContent = item.mc_name;
                a.className = "rank-name-link";
                nameTd.appendChild(a);
              } else {
                const span = document.createElement("span");
                span.textContent = item.mc_name;
                span.className = "rank-name-text";
                nameTd.appendChild(span);
              }

              scoreTd.textContent = formatScore(item.raw_score);
              scoreTd.className = "rank-score";

              tr.appendChild(rankTd);
              tr.appendChild(nameTd);
              tr.appendChild(scoreTd);

              bodyEl.appendChild(tr);
            });

            statusEl.textContent = "";
          } catch (err) {
            console.error(err);
            statusEl.textContent = "ランキングの描画に失敗しました";
            statusEl.classList.add("error");
          }
        })
        .catch((err) => {
          console.error(err);
          statusEl.textContent = "ランキングの読み込みに失敗しました";
          statusEl.classList.add("error");
        });
    }

    loadRankingsPage();
  </script>
</body>
</html>
