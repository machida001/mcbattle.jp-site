<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC記録 | MC Battle DB</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .mc-card-inner {
      padding-left: 12px;
      padding-right: 12px;
    }

    .mc-card-inner .muted {
      margin-bottom: 12px;
    }

    .more-button {
      margin-top: 12px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .more-button:hover {
      opacity: 0.9;
    }

    .is-hidden {
      display: none !important;
    }

    .meta-list li.meta-list-block {
      display: block;
    }

    .meta-list-block .meta-label {
      display: block;
      margin-bottom: 8px;
    }

    .meta-list-block .meta-value-block {
      display: block;
      line-height: 1.8;
    }

    .meta-list-block .meta-value-block a {
      color: inherit;
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .mc-card-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      .meta-list-block .meta-label {
        margin-bottom: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="mc-page">
    <p><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

    <header>
      <h1 id="mc-title">MC情報を読み込み中...</h1>
      <p id="mc-meta" class="muted"></p>
    </header>

    <section class="card">
      <div class="mc-card-inner">
        <ul id="mc-info-list" class="meta-list"></ul>
      </div>
    </section>

    <section class="card">
      <div class="mc-card-inner">
        <h2 id="wins-heading">勝った相手</h2>
        <p id="wins-status" class="muted">読み込み中...</p>
        <ul id="wins-list" class="list-tight"></ul>
        <button id="wins-more-button" class="more-button is-hidden" type="button">すべて見る</button>
      </div>
    </section>

    <section class="card">
      <div class="mc-card-inner">
        <h2 id="losses-heading">負けた相手</h2>
        <p id="losses-status" class="muted">読み込み中...</p>
        <ul id="losses-list" class="list-tight"></ul>
        <button id="losses-more-button" class="more-button is-hidden" type="button">すべて見る</button>
      </div>
    </section>

    <section class="card">
      <div class="mc-card-inner">
        <h2>出場大会</h2>
        <p id="appearances-status" class="muted">読み込み中...</p>
        <ul id="appearances-list" class="list-tight"></ul>
        <button id="appearances-more-button" class="more-button is-hidden" type="button">すべて見る</button>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhs1MAehpfkicBmd5GfebPdrQqtanheYtONWAOsJ-D30s79xEf0wHB1afK9JShGJMgUQ/exec";
    const COLLAPSE_LIMIT = 10;

    function getMcIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("mc_id");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatScore(value) {
      if (value === null || value === undefined || value === "") return "";
      if (isNaN(Number(value))) return String(value);
      return Number(value).toFixed(2);
    }

    function formatYen(value) {
      const num = Number(value || 0);
      return num.toLocaleString("ja-JP");
    }

    function displayValue(value) {
      return (value === null || value === undefined || value === "") ? "−" : value;
    }

    function getRankLabel(rankValue) {
      if (rankValue === null || rankValue === undefined || rankValue === "") return "圏外";
      const n = Number(rankValue);
      if (!Number.isFinite(n)) return "圏外";
      return n <= 100 ? String(n) : "圏外";
    }

    function getRankDisplay(ranking) {
      if (ranking.rank_display !== null && ranking.rank_display !== undefined && ranking.rank_display !== "") {
        return String(ranking.rank_display);
      }
      return getRankLabel(ranking.rank);
    }

    function getScoreDisplay(ranking) {
      if (ranking.score_display !== null && ranking.score_display !== undefined && ranking.score_display !== "") {
        return String(ranking.score_display);
      }
      return formatScore(ranking.current_score ?? ranking.score);
    }

    function renderMcLink(name, mcId) {
      const safeName = escapeHtml(name || "");
      const safeId = String(mcId || "").trim();

      if (!safeName) return "";
      if (!safeId) return `<span>${safeName}</span>`;

      return `<a href="./mc.html?mc_id=${encodeURIComponent(safeId)}">${safeName}</a>`;
    }

    function renderEventLink(name, eventId, eventDate) {
      const safeName = escapeHtml(name || "");
      const safeDate = escapeHtml(eventDate || "");
      const safeId = String(eventId || "").trim();
      const label = `${safeDate} ${safeName}`.trim();

      if (!label) return "";
      if (!safeId) return `<span>${label}</span>`;

      return `<a href="./event.html?event_id=${encodeURIComponent(safeId)}">${label}</a>`;
    }

    function getRoundSortValue(roundName) {
      const name = String(roundName || "").trim();

      const orderMap = {
        "決勝": 1000,
        "FINAL": 1000,
        "Final": 1000,
        "final": 1000,
        "準決勝": 900,
        "決勝トーナメント準決勝": 900,
        "ベスト4": 900,
        "準々決勝": 800,
        "ベスト8": 800,
        "ベスト16": 700,
        "ベスト32": 600,
        "ベスト48": 550,
        "ベスト64": 500,
        "4回戦": 400,
        "3回戦": 300,
        "2回戦": 200,
        "1回戦": 100,
        "シード戦": 50
      };

      if (orderMap[name] != null) return orderMap[name];

      const bestMatch = name.match(/^ベスト(\d+)$/);
      if (bestMatch) {
        return 1000 - Number(bestMatch[1]);
      }

      const roundMatch = name.match(/^(\d+)回戦$/);
      if (roundMatch) {
        return Number(roundMatch[1]) * 100;
      }

      return 0;
    }

    function sortMatchHistory(items) {
      return [...items].sort((a, b) => {
        const dateA = String(a.event_date || "");
        const dateB = String(b.event_date || "");
        if (dateA !== dateB) {
          return dateB.localeCompare(dateA);
        }

        const roundA = getRoundSortValue(a.round_name);
        const roundB = getRoundSortValue(b.round_name);
        if (roundA !== roundB) {
          return roundB - roundA;
        }

        const eventA = String(a.event_name || "");
        const eventB = String(b.event_name || "");
        if (eventA !== eventB) {
          return eventA.localeCompare(eventB, "ja");
        }

        const oppA = String(a.opponent_name || "");
        const oppB = String(b.opponent_name || "");
        return oppA.localeCompare(oppB, "ja");
      });
    }

    function setupCollapsibleList(listEl, buttonEl) {
      const items = Array.from(listEl.children);

      if (items.length <= COLLAPSE_LIMIT) {
        buttonEl.classList.add("is-hidden");
        return;
      }

      let expanded = false;

      function render() {
        items.forEach((item, index) => {
          if (!expanded && index >= COLLAPSE_LIMIT) {
            item.classList.add("is-hidden");
          } else {
            item.classList.remove("is-hidden");
          }
        });

        buttonEl.textContent = expanded ? "閉じる" : "すべて見る";
      }

      buttonEl.classList.remove("is-hidden");
      buttonEl.onclick = function() {
        expanded = !expanded;
        render();
      };

      render();
    }

    function appendInfoRow(infoListEl, label, value, options = {}) {
      const li = document.createElement("li");

      if (options.block) {
        li.className = "meta-list-block";
      }

      const labelEl = document.createElement("span");
      labelEl.className = "meta-label";
      labelEl.textContent = `${label}：`;

      const valueEl = document.createElement("span");
      valueEl.innerHTML = value;

      if (options.block) {
        valueEl.className = "meta-value-block";
      }

      li.appendChild(labelEl);
      li.appendChild(valueEl);
      infoListEl.appendChild(li);
    }

    function loadMcDetail() {
      const mcId = getMcIdFromQuery();

      const titleEl = document.getElementById("mc-title");
      const metaEl = document.getElementById("mc-meta");
      const infoListEl = document.getElementById("mc-info-list");

      const winsHeadingEl = document.getElementById("wins-heading");
      const winsStatusEl = document.getElementById("wins-status");
      const winsListEl = document.getElementById("wins-list");
      const winsMoreButtonEl = document.getElementById("wins-more-button");

      const lossesHeadingEl = document.getElementById("losses-heading");
      const lossesStatusEl = document.getElementById("losses-status");
      const lossesListEl = document.getElementById("losses-list");
      const lossesMoreButtonEl = document.getElementById("losses-more-button");

      const appearancesStatusEl = document.getElementById("appearances-status");
      const appearancesListEl = document.getElementById("appearances-list");
      const appearancesMoreButtonEl = document.getElementById("appearances-more-button");

      if (!mcId) {
        titleEl.textContent = "MC IDが指定されていません";
        metaEl.textContent = "";
        appearancesStatusEl.textContent = "mc_id が見つかりませんでした。";
        appearancesStatusEl.classList.add("error");
        winsStatusEl.textContent = "";
        lossesStatusEl.textContent = "";
        return;
      }

      const callbackName = "mcBattleMcCallback";

      window[callbackName] = function(data) {
        console.log("mc detail:", data);

        infoListEl.innerHTML = "";
        appearancesListEl.innerHTML = "";
        winsListEl.innerHTML = "";
        lossesListEl.innerHTML = "";

        winsMoreButtonEl.classList.add("is-hidden");
        lossesMoreButtonEl.classList.add("is-hidden");
        appearancesMoreButtonEl.classList.add("is-hidden");

        appearancesStatusEl.classList.remove("error");
        winsStatusEl.classList.remove("error");
        lossesStatusEl.classList.remove("error");

        try {
          if (!data) {
            titleEl.textContent = "MC情報の取得に失敗しました";
            metaEl.textContent = "";
            appearancesStatusEl.textContent = "レスポンスが空です";
            appearancesStatusEl.classList.add("error");
            return;
          }

          if (data.error) {
            titleEl.textContent = "MC情報の取得に失敗しました";
            metaEl.textContent = data.message || "";
            appearancesStatusEl.textContent = "データ取得エラー";
            appearancesStatusEl.classList.add("error");
            return;
          }

          const mc = data.mc || {};
          const ranking = data.ranking || {};
          const summary = data.summary || {};
          const appearances = Array.isArray(data.participated_events) ? data.participated_events : [];
          const wins = sortMatchHistory(Array.isArray(data.wins_against) ? data.wins_against : []);
          const losses = sortMatchHistory(Array.isArray(data.losses_against) ? data.losses_against : []);
          const championships = Array.isArray(data.championships) ? data.championships : [];
          const totalPrizeMoney = data.total_prize_money ?? 0;
          const mcName = mc.mc_name || "このMC";

          titleEl.textContent = mcName;
          metaEl.textContent = "";

          winsHeadingEl.textContent = `${mcName}が勝った対戦相手`;
          lossesHeadingEl.textContent = `${mcName}が負けた対戦相手`;

          const championshipText = championships.length
            ? championships.map((item) => {
                const label = `${item.event_name || ""}（${formatYen(item.prize_money_winner || 0)}円）`;
                if (item.event_id) {
                  return `<a href="./event.html?event_id=${encodeURIComponent(item.event_id)}">${escapeHtml(label)}</a>`;
                }
                return escapeHtml(label);
              }).join("<br>")
            : "−";

          const rankDisplay = getRankDisplay(ranking);
          const scoreDisplay = getScoreDisplay(ranking);

          appendInfoRow(infoListEl, "MCBattle Rank順位", escapeHtml(displayValue(rankDisplay)));
          appendInfoRow(infoListEl, "スコア", escapeHtml(displayValue(scoreDisplay)));
          appendInfoRow(infoListEl, "総試合数", escapeHtml(displayValue(summary.total_matches)));
          appendInfoRow(infoListEl, "勝利数", escapeHtml(displayValue(summary.wins)));
          appendInfoRow(infoListEl, "敗北数", escapeHtml(displayValue(summary.losses)));
          appendInfoRow(infoListEl, "これまで優勝した大会", championshipText, { block: true });
          appendInfoRow(infoListEl, "獲得賞金総額", escapeHtml(`${formatYen(totalPrizeMoney)}円`));

          appearances.forEach((item) => {
            const li = document.createElement("li");
            li.innerHTML = renderEventLink(item.event_name || "", item.event_id || "", item.event_date || "");
            appearancesListEl.appendChild(li);
          });

          if (wins.length === 0) {
            const li = document.createElement("li");
            li.textContent = "−";
            winsListEl.appendChild(li);
          } else {
            wins.forEach((item) => {
              const li = document.createElement("li");
              const opponentHtml = renderMcLink(item.opponent_name || "不明", item.opponent_mc_id || "");
              const eventName = escapeHtml(item.event_name || "");

              li.innerHTML = `
                ${opponentHtml}
                ${eventName ? `｜${eventName}` : ""}
              `;
              winsListEl.appendChild(li);
            });
          }

          if (losses.length === 0) {
            const li = document.createElement("li");
            li.textContent = "−";
            lossesListEl.appendChild(li);
          } else {
            losses.forEach((item) => {
              const li = document.createElement("li");
              const opponentHtml = renderMcLink(item.opponent_name || "不明", item.opponent_mc_id || "");
              const eventName = escapeHtml(item.event_name || "");

              li.innerHTML = `
                ${opponentHtml}
                ${eventName ? `｜${eventName}` : ""}
              `;
              lossesListEl.appendChild(li);
            });
          }

          appearancesStatusEl.textContent = "";
          winsStatusEl.textContent = "";
          lossesStatusEl.textContent = "";

          if (appearances.length === 0) appearancesStatusEl.textContent = "出場大会がありません";

          setupCollapsibleList(winsListEl, winsMoreButtonEl);
          setupCollapsibleList(lossesListEl, lossesMoreButtonEl);
          setupCollapsibleList(appearancesListEl, appearancesMoreButtonEl);
        } catch (err) {
          console.error(err);
          titleEl.textContent = "MC情報の描画に失敗しました";
          appearancesStatusEl.textContent = "描画エラー";
          appearancesStatusEl.classList.add("error");
        }
      };

      const script = document.createElement("script");
      script.src = `${API_URL}?mc_id=${encodeURIComponent(mcId)}&callback=${callbackName}`;
      script.onerror = function() {
        titleEl.textContent = "MC情報の読み込みに失敗しました";
        appearancesStatusEl.textContent = "JSONP読み込み失敗";
        appearancesStatusEl.classList.add("error");
      };

      document.body.appendChild(script);
    }

    loadMcDetail();
  </script>
</body>
</html>
