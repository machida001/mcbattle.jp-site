<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC詳細 | MCBattle.jp</title>
  <meta name="description" content="国内MCバトルのMCごとの戦績、出場大会、優勝歴、獲得賞金、スコアを掲載する詳細ページです。">
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-top{
      margin-bottom: 18px;
    }

    .page-mini-logo{
      margin: 0 0 10px;
    }

    .page-mini-logo .site-mini-logo{
      text-decoration: none;
    }

    .page-nav-pills{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
      max-width: 100%;
    }

    .page-nav-pill{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.93rem;
      font-weight: 700;
      line-height: 1.2;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .page-nav-pill:hover{
      text-decoration: none;
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
      border-color: var(--line-strong);
      box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
      opacity: 1;
    }

    .page-nav-break{
      flex-basis: 100%;
      height: 0;
    }

    .page-header-block{
      margin-bottom: 14px;
    }

    .page-header-block h1{
      margin: 0;
      text-wrap: balance;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .page-header-meta{
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .mc-card-inner{
      padding-left: 12px;
      padding-right: 12px;
    }

    .mc-card-inner .muted{
      margin-bottom: 9px;
      font-size: 0.92rem;
      line-height: 1.48;
    }

    .more-button{
      margin-top: 12px;
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: 11px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font: inherit;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;
    }

    .more-button:hover{
      opacity: 1;
      transform: translateY(-1px);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 18px rgba(135, 164, 255, 0.08);
    }

    .is-hidden{
      display: none !important;
    }

    .meta-list{
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .meta-list li{
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      font-size: 0.97rem;
      line-height: 1.46;
    }

    .meta-list li:last-child{
      border-bottom: none;
      padding-bottom: 1px;
    }

    .meta-list .meta-label{
      flex: 0 0 auto;
      min-width: 6.2em;
      color: #c7cedc;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .meta-list li > span:last-child{
      flex: 1 1 auto;
      min-width: 0;
      color: var(--text);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .meta-list li.meta-list-block{
      display: block;
    }

    .meta-list-block .meta-label{
      display: block;
      margin-bottom: 6px;
      min-width: 0;
    }

    .meta-list-block .meta-value-block{
      display: block;
      line-height: 1.52;
      font-size: 0.95rem;
    }

    .meta-list-block .meta-value-block a,
    .battle-list a,
    .appearance-list a{
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .state-card-message{
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.93rem;
    }

    .state-card-message.error{
      color: var(--danger);
      font-weight: 700;
    }

    .mc-note{
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .championship-line{
      display: block;
      line-height: 1.5;
    }

    .championship-line + .championship-line{
      margin-top: 2px;
    }

    .championship-event-link{
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }

    .battle-section-heading,
    .appearance-section-heading{
      position: sticky;
      top: 8px;
      z-index: 5;
      display: inline-block;
      margin: 0 0 8px;
      padding: 6px 9px;
      border: 1px solid rgba(216,180,106,0.18);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%),
        linear-gradient(180deg, rgba(24, 28, 41, 0.92) 0%, rgba(14, 18, 28, 0.92) 100%);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.015) inset,
        0 8px 18px rgba(0,0,0,0.12);
    }

    .battle-list,
    .appearance-list{
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .battle-list li,
    .appearance-list li{
      margin: 0;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .battle-list li:last-child,
    .appearance-list li:last-child{
      border-bottom: none;
    }

    .battle-opponent{
      display: block;
      min-width: 0;
      line-height: 1.36;
      font-size: 0.98rem;
      font-weight: 600;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .battle-event{
      display: block;
      margin-top: 4px;
      color: #8f97aa;
      font-size: 0.88rem;
      line-height: 1.34;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .battle-event-link{
      display: inline-flex;
      align-items: center;
      gap: 0.32em;
      color: #8f97aa;
      text-decoration: none;
      border-bottom: none;
      cursor: pointer;
      max-width: 100%;
    }

    .battle-event-link::after{
      content: "›";
      font-size: 0.95em;
      line-height: 1;
      opacity: 0.78;
      transform: translateY(-0.02em);
      flex: 0 0 auto;
    }

    .battle-event-link:visited{
      color: #8f97aa;
      text-decoration: none;
    }

    .battle-event-link:hover{
      color: #a3acc1;
      text-decoration: none;
      opacity: 1;
    }

    .battle-event-link:active{
      color: #aeb7cb;
      text-decoration: none;
    }

    .appearance-link-wrap a,
    .appearance-link-wrap span{
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .appearance-link-wrap a:hover{
      opacity: 0.95;
    }

    .appearance-name{
      display: block;
      line-height: 1.34;
      word-break: break-word;
      overflow-wrap: anywhere;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      font-size: 0.98rem;
      font-weight: 500;
    }

    .appearance-date{
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.87rem;
      line-height: 1.32;
    }

    @media (max-width: 640px) {
      .page-top{
        margin-bottom: 14px;
      }

      .page-mini-logo{
        margin-bottom: 8px;
      }

      .page-nav-pills{
        gap: 7px;
        margin-bottom: 12px;
      }

      .page-nav-pill{
        min-height: 34px;
        padding: 0 12px;
        font-size: 0.86rem;
      }

      .page-header-block{
        margin-bottom: 10px;
      }

      .page-header-block h1{
        font-size: clamp(1.5rem, 5.3vw, 1.95rem);
        line-height: 1.12;
      }

      .page-header-meta{
        margin-top: 6px;
        font-size: 0.82rem;
        line-height: 1.34;
      }

      .mc-card-inner{
        padding-left: 10px;
        padding-right: 10px;
      }

      .mc-card-inner .muted{
        margin-bottom: 7px;
        font-size: 0.82rem;
        line-height: 1.38;
      }

      .meta-list li{
        gap: 7px;
        padding: 8px 0;
        font-size: 0.87rem;
        line-height: 1.34;
      }

      .meta-list li:last-child{
        padding-bottom: 0;
      }

      .meta-list .meta-label{
        min-width: 5em;
        font-size: 0.85rem;
      }

      .meta-list-block .meta-label{
        margin-bottom: 5px;
      }

      .meta-list-block .meta-value-block{
        line-height: 1.42;
        font-size: 0.86rem;
      }

      .state-card-message{
        font-size: 0.82rem;
        line-height: 1.38;
      }

      .mc-note{
        font-size: 0.8rem;
        line-height: 1.34;
      }

      .battle-section-heading,
      .appearance-section-heading{
        top: 6px;
        margin-bottom: 7px;
        padding: 5px 8px;
      }

      .battle-list li,
      .appearance-list li{
        padding: 8px 0;
      }

      .battle-opponent{
        font-size: 0.9rem;
        line-height: 1.3;
      }

      .battle-event{
        margin-top: 3px;
        font-size: 0.8rem;
        line-height: 1.28;
      }

      .appearance-name{
        font-size: 0.9rem;
        line-height: 1.3;
      }

      .appearance-date{
        margin-top: 1px;
        font-size: 0.79rem;
        line-height: 1.26;
      }

      .more-button{
        margin-top: 10px;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 10px;
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>
  <div class="mc-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
      </nav>

      <div class="page-header-block">
        <h1 id="mc-title">MC情報を読み込み中...</h1>
        <p id="mc-meta" class="page-header-meta"></p>
      </div>
    </div>

    <section id="mc-state-card" class="card">
      <div class="mc-card-inner">
        <p id="mc-state-message" class="state-card-message">読み込み中...</p>
      </div>
    </section>

    <section id="mc-info-section" class="card is-hidden">
      <div class="mc-card-inner">
        <ul id="mc-info-list" class="meta-list"></ul>
      </div>
    </section>

    <section id="wins-section" class="card is-hidden">
      <div class="mc-card-inner">
        <h2 id="wins-heading" class="battle-section-heading">勝った試合</h2>
        <p id="wins-status" class="muted">読み込み中...</p>
        <ul id="wins-list" class="battle-list"></ul>
        <button id="wins-more-button" class="more-button is-hidden" type="button">すべて見る</button>
      </div>
    </section>

    <section id="losses-section" class="card is-hidden">
      <div class="mc-card-inner">
        <h2 id="losses-heading" class="battle-section-heading">負けた試合</h2>
        <p id="losses-status" class="muted">読み込み中...</p>
        <ul id="losses-list" class="battle-list"></ul>
        <button id="losses-more-button" class="more-button is-hidden" type="button">すべて見る</button>
      </div>
    </section>

    <section id="appearances-section" class="card is-hidden">
      <div class="mc-card-inner">
        <h2 class="appearance-section-heading">出場大会</h2>
        <p id="appearances-status" class="muted">読み込み中...</p>
        <ul id="appearances-list" class="appearance-list"></ul>
        <button id="appearances-more-button" class="more-button is-hidden" type="button">すべて見る</button>
      </div>
    </section>
  </div>

  <script>
    const MC_DETAILS_ALL_JSON_URL = "./data/mc_details_all.json";
    const COLLAPSE_LIMIT_BATTLE = 5;
    const COLLAPSE_LIMIT_APPEARANCE = 10;

    async function loadMcDetailsAllJson() {
      const res = await fetch(MC_DETAILS_ALL_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error("HTTP " + res.status);
      }
      return await res.json();
    }

    function getMcIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("mc_id");
    }

    function setMetaDescription(content) {
      let meta = document.querySelector('meta[name="description"]');
      if (!meta) {
        meta = document.createElement("meta");
        meta.setAttribute("name", "description");
        document.head.appendChild(meta);
      }
      meta.setAttribute("content", content);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatScore(value) {
      if (value === null || value === undefined || value === "") return "";
      if (isNaN(Number(value))) return String(value);
      return Number(value).toFixed(2);
    }

    function formatYen(value) {
      const num = Number(value || 0);
      return num.toLocaleString("ja-JP");
    }

    function displayValue(value) {
      return (value === null || value === undefined || value === "") ? "−" : value;
    }

    function formatDateDots(value) {
      const s = String(value || "").trim();
      if (!s) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        return s.replace(/-/g, ".");
      }
      return s;
    }

    function getRankLabel(rankValue) {
      if (rankValue === null || rankValue === undefined || rankValue === "") return "圏外";
      const n = Number(rankValue);
      if (!Number.isFinite(n)) return "圏外";
      return n <= 100 ? String(n) : "圏外";
    }

    function getRankDisplay(ranking) {
      if (ranking.rank_display !== null && ranking.rank_display !== undefined && ranking.rank_display !== "") {
        return String(ranking.rank_display);
      }
      return getRankLabel(ranking.rank);
    }

    function getScoreDisplay(ranking) {
      if (ranking.score_display !== null && ranking.score_display !== undefined && ranking.score_display !== "") {
        return String(ranking.score_display);
      }
      return formatScore(ranking.current_score ?? ranking.score);
    }

    function renderMcLink(name, mcId) {
      const safeName = escapeHtml(name || "");
      const safeId = String(mcId || "").trim();

      if (!safeName) return "";
      if (!safeId) return `<span>${safeName}</span>`;

      return `<a href="./mc.html?mc_id=${encodeURIComponent(safeId)}">${safeName}</a>`;
    }

    function renderBattleEvent(name, eventId) {
      const safeName = escapeHtml(name || "");
      const safeId = String(eventId || "").trim();

      if (!safeName) return "";
      if (!safeId) return `<span class="battle-event">${safeName}</span>`;

      return `
        <span class="battle-event">
          <a href="./event.html?event_id=${encodeURIComponent(safeId)}" class="battle-event-link">${safeName}</a>
        </span>
      `;
    }

    function renderEventStack(name, eventId, eventDate) {
      const safeName = escapeHtml(name || "");
      const safeDate = escapeHtml(formatDateDots(eventDate || ""));
      const safeId = String(eventId || "").trim();

      if (!safeName && !safeDate) return "";
      if (!safeId) {
        return `
          <span class="appearance-name">${safeName}</span>
          ${safeDate ? `<span class="appearance-date">${safeDate}</span>` : ""}
        `;
      }

      return `
        <a href="./event.html?event_id=${encodeURIComponent(safeId)}">
          <span class="appearance-name">${safeName}</span>
          ${safeDate ? `<span class="appearance-date">${safeDate}</span>` : ""}
        </a>
      `;
    }

    function renderChampionshipLine(item) {
      const eventName = escapeHtml(item.event_name || "");
      const safeEventId = String(item.event_id || "").trim();

      if (!eventName) return "";

      if (safeEventId) {
        return `
          <span class="championship-line">
            <a class="championship-event-link" href="./event.html?event_id=${encodeURIComponent(safeEventId)}">${eventName}</a>
          </span>
        `;
      }

      return `
        <span class="championship-line">
          <span>${eventName}</span>
        </span>
      `;
    }

    function normalizeRoundLabel(roundName) {
      const name = String(roundName || "").trim();

      if (!name) return "";
      if (/^final$/i.test(name) || name === "決勝") return "Final";

      const jaBest = name.match(/^ベスト\s*(\d+)$/);
      if (jaBest) return `Best${jaBest[1]}`;

      const enBest = name.match(/^best\s*(\d+)$/i);
      if (enBest) return `Best${enBest[1]}`;

      if (name === "準決勝") return "Best4";
      if (name === "準々決勝") return "Best8";

      return name;
    }

    function getRoundSortValue(roundName) {
      const normalized = normalizeRoundLabel(roundName);

      if (!normalized) return 999999;
      if (normalized === "Final") return 0;

      const bestMatch = normalized.match(/^Best(\d+)$/i);
      if (bestMatch) return Number(bestMatch[1]);

      const roundMatch = normalized.match(/^(\d+)回戦$/);
      if (roundMatch) return 1000 + Number(roundMatch[1]);

      return 999999;
    }

    function sortMatchHistory(items) {
      return [...items].sort((a, b) => {
        const dateA = String(a.event_date || "");
        const dateB = String(b.event_date || "");
        if (dateA !== dateB) return dateB.localeCompare(dateA);

        const roundA = getRoundSortValue(a.round_name);
        const roundB = getRoundSortValue(b.round_name);
        if (roundA !== roundB) return roundA - roundB;

        const eventA = String(a.event_name || "");
        const eventB = String(b.event_name || "");
        if (eventA !== eventB) return eventA.localeCompare(eventB, "ja");

        const oppA = String(a.opponent_name || "");
        const oppB = String(b.opponent_name || "");
        return oppA.localeCompare(oppB, "ja");
      });
    }

    function sortAppearances(items) {
      return [...items].sort((a, b) => {
        const dateA = String(a.event_date || "");
        const dateB = String(b.event_date || "");
        if (dateA !== dateB) return dateB.localeCompare(dateA);

        const roundA = getRoundSortValue(a.round_name);
        const roundB = getRoundSortValue(b.round_name);
        if (roundA !== roundB) return roundA - roundB;

        const eventA = String(a.event_name || "");
        const eventB = String(b.event_name || "");
        return eventA.localeCompare(eventB, "ja");
      });
    }

    function setupCollapsibleList(listEl, buttonEl, limit) {
      const items = Array.from(listEl.children);

      if (items.length <= limit) {
        buttonEl.classList.add("is-hidden");
        return;
      }

      let expanded = false;

      function render() {
        items.forEach((item, index) => {
          if (!expanded && index >= limit) {
            item.classList.add("is-hidden");
          } else {
            item.classList.remove("is-hidden");
          }
        });

        buttonEl.textContent = expanded ? "閉じる" : "すべて見る";
      }

      buttonEl.classList.remove("is-hidden");
      buttonEl.onclick = function() {
        expanded = !expanded;
        render();
      };

      render();
    }

    function appendInfoRow(infoListEl, label, value, options = {}) {
      const li = document.createElement("li");

      if (options.block) {
        li.className = "meta-list-block";
      }

      const labelEl = document.createElement("span");
      labelEl.className = "meta-label";
      labelEl.textContent = `${label}：`;

      const valueEl = document.createElement("span");
      valueEl.innerHTML = value;

      if (options.block) {
        valueEl.className = "meta-value-block";
      }

      li.appendChild(labelEl);
      li.appendChild(valueEl);
      infoListEl.appendChild(li);
    }

    function showLoadingState() {
      document.getElementById("mc-state-card").classList.remove("is-hidden");
      document.getElementById("mc-state-message").className = "state-card-message";
      document.getElementById("mc-state-message").textContent = "読み込み中...";

      document.getElementById("mc-info-section").classList.add("is-hidden");
      document.getElementById("wins-section").classList.add("is-hidden");
      document.getElementById("losses-section").classList.add("is-hidden");
      document.getElementById("appearances-section").classList.add("is-hidden");
    }

    function showErrorState(message) {
      document.getElementById("mc-state-card").classList.remove("is-hidden");
      document.getElementById("mc-state-message").className = "state-card-message error";
      document.getElementById("mc-state-message").textContent = message;

      document.getElementById("mc-info-section").classList.add("is-hidden");
      document.getElementById("wins-section").classList.add("is-hidden");
      document.getElementById("losses-section").classList.add("is-hidden");
      document.getElementById("appearances-section").classList.add("is-hidden");
    }

    function showContentState() {
      document.getElementById("mc-state-card").classList.add("is-hidden");
      document.getElementById("mc-info-section").classList.remove("is-hidden");
      document.getElementById("wins-section").classList.remove("is-hidden");
      document.getElementById("losses-section").classList.remove("is-hidden");
      document.getElementById("appearances-section").classList.remove("is-hidden");
    }

    async function loadMcDetail() {
      const mcId = getMcIdFromQuery();

      const titleEl = document.getElementById("mc-title");
      const metaEl = document.getElementById("mc-meta");
      const infoListEl = document.getElementById("mc-info-list");

      const winsStatusEl = document.getElementById("wins-status");
      const winsListEl = document.getElementById("wins-list");
      const winsMoreButtonEl = document.getElementById("wins-more-button");

      const lossesStatusEl = document.getElementById("losses-status");
      const lossesListEl = document.getElementById("losses-list");
      const lossesMoreButtonEl = document.getElementById("losses-more-button");

      const appearancesStatusEl = document.getElementById("appearances-status");
      const appearancesListEl = document.getElementById("appearances-list");
      const appearancesMoreButtonEl = document.getElementById("appearances-more-button");

      showLoadingState();

      if (!mcId) {
        titleEl.textContent = "MC IDが指定されていません";
        document.title = "MC詳細 | MCBattle.jp";
        setMetaDescription("国内MCバトルのMCごとの戦績、出場大会、優勝歴、獲得賞金、スコアを掲載する詳細ページです。");
        metaEl.textContent = "";
        showErrorState("mc_id が見つかりませんでした。");
        return;
      }

      try {
        const allData = await loadMcDetailsAllJson();
        const detailMap = allData && allData.mc_details ? allData.mc_details : {};
        const data = detailMap[mcId] || null;

        infoListEl.innerHTML = "";
        appearancesListEl.innerHTML = "";
        winsListEl.innerHTML = "";
        lossesListEl.innerHTML = "";

        winsMoreButtonEl.classList.add("is-hidden");
        lossesMoreButtonEl.classList.add("is-hidden");
        appearancesMoreButtonEl.classList.add("is-hidden");

        appearancesStatusEl.classList.remove("error");
        winsStatusEl.classList.remove("error");
        lossesStatusEl.classList.remove("error");

        if (!data) {
          titleEl.textContent = "MC情報の取得に失敗しました";
          document.title = "MC詳細 | MCBattle.jp";
          setMetaDescription("国内MCバトルのMCごとの戦績、出場大会、優勝歴、獲得賞金、スコアを掲載する詳細ページです。");
          metaEl.textContent = "";
          showErrorState("指定されたMCデータが見つかりません");
          return;
        }

        if (data.error) {
          titleEl.textContent = "MC情報の取得に失敗しました";
          document.title = "MC詳細 | MCBattle.jp";
          setMetaDescription("国内MCバトルのMCごとの戦績、出場大会、優勝歴、獲得賞金、スコアを掲載する詳細ページです。");
          metaEl.textContent = data.message || "";
          showErrorState("データ取得エラー");
          return;
        }

        const mc = data.mc || {};
        const ranking = data.ranking || {};
        const summary = data.summary || {};
        const appearances = sortAppearances(Array.isArray(data.participated_events) ? data.participated_events : []);
        const wins = sortMatchHistory(Array.isArray(data.wins_against) ? data.wins_against : []);
        const losses = sortMatchHistory(Array.isArray(data.losses_against) ? data.losses_against : []);
        const championships = Array.isArray(data.championships) ? data.championships : [];
        const totalPrizeMoney = data.total_prize_money ?? 0;

        const mcName = mc.mc_name || "このMC";
        titleEl.textContent = mcName;
        document.title = `${mcName} | 戦績・出場大会・優勝歴 | MCBattle.jp`;
        metaEl.textContent = "";

        const rankDisplay = getRankDisplay(ranking);
        const scoreDisplay = getScoreDisplay(ranking);
        const rankingStatus = String(ranking.ranking_status || "");
        const rankingNote = rankingStatus === "inactive_3y"
          ? "直近3年以上バトル不参加"
          : "";

        const championshipText = championships.length
          ? championships.map(renderChampionshipLine).join("")
          : "−";

        const battleSummary = `${displayValue(summary.total_matches)}試合 ${displayValue(summary.wins)}勝 ${displayValue(summary.losses)}敗`;

        const descriptionParts = [
          `${mcName}のMC詳細ページです。`,
          summary.total_matches !== null && summary.total_matches !== undefined ? `戦績は${displayValue(summary.total_matches)}試合${displayValue(summary.wins)}勝${displayValue(summary.losses)}敗。` : "",
          championships.length ? `優勝歴${championships.length}回。` : "",
          totalPrizeMoney ? `獲得賞金総額は¥${formatYen(totalPrizeMoney)}。` : "",
          "出場大会とスコアを掲載しています。"
        ].filter(Boolean);
        setMetaDescription(descriptionParts.join(" "));

        appendInfoRow(infoListEl, "戦績", escapeHtml(battleSummary));
        appendInfoRow(infoListEl, "獲得賞金総額", escapeHtml(`¥${formatYen(totalPrizeMoney)}`));
        appendInfoRow(infoListEl, "優勝歴", championshipText, { block: true });
        appendInfoRow(infoListEl, "スコアランキング", escapeHtml(rankingStatus === "inactive_3y" ? "対象外" : displayValue(rankDisplay)));
        appendInfoRow(infoListEl, "スコア", escapeHtml(rankingStatus === "inactive_3y" ? "−" : displayValue(scoreDisplay)));
        if (rankingNote) {
          appendInfoRow(infoListEl, "補足", `<span class="mc-note">${escapeHtml(rankingNote)}</span>`);
        }

        appearances.forEach((item) => {
          const li = document.createElement("li");
          li.innerHTML = `<div class="appearance-link-wrap">${renderEventStack(item.event_name || "", item.event_id || "", item.event_date || "")}</div>`;
          appearancesListEl.appendChild(li);
        });

        if (wins.length === 0) {
          const li = document.createElement("li");
          li.textContent = "−";
          winsListEl.appendChild(li);
        } else {
          wins.forEach((item) => {
            const li = document.createElement("li");
            const opponentHtml = renderMcLink(item.opponent_name || "不明", item.opponent_mc_id || "");
            const eventHtml = renderBattleEvent(item.event_name || "", item.event_id || "");

            li.innerHTML = `
              <span class="battle-opponent">${opponentHtml}</span>
              ${eventHtml}
            `;
            winsListEl.appendChild(li);
          });
        }

        if (losses.length === 0) {
          const li = document.createElement("li");
          li.textContent = "−";
          lossesListEl.appendChild(li);
        } else {
          losses.forEach((item) => {
            const li = document.createElement("li");
            const opponentHtml = renderMcLink(item.opponent_name || "不明", item.opponent_mc_id || "");
            const eventHtml = renderBattleEvent(item.event_name || "", item.event_id || "");

            li.innerHTML = `
              <span class="battle-opponent">${opponentHtml}</span>
              ${eventHtml}
            `;
            lossesListEl.appendChild(li);
          });
        }

        appearancesStatusEl.textContent = "";
        winsStatusEl.textContent = "";
        lossesStatusEl.textContent = "";

        if (appearances.length === 0) appearancesStatusEl.textContent = "出場大会がありません";

        setupCollapsibleList(winsListEl, winsMoreButtonEl, COLLAPSE_LIMIT_BATTLE);
        setupCollapsibleList(lossesListEl, lossesMoreButtonEl, COLLAPSE_LIMIT_BATTLE);
        setupCollapsibleList(appearancesListEl, appearancesMoreButtonEl, COLLAPSE_LIMIT_APPEARANCE);

        showContentState();
      } catch (err) {
        console.error(err);
        titleEl.textContent = "MC情報の読み込みに失敗しました";
        document.title = "MC詳細 | MCBattle.jp";
        setMetaDescription("国内MCバトルのMCごとの戦績、出場大会、優勝歴、獲得賞金、スコアを掲載する詳細ページです。");
        metaEl.textContent = "";
        showErrorState(`読み込み失敗: ${err && err.message ? err.message : err}`);
      }
    }

    loadMcDetail();
  </script>
</body>
</html>
