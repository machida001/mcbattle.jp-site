<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スコア検証 | MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-top{
      margin-bottom: 18px;
    }

    .page-mini-logo{
      margin: 0 0 10px;
    }

    .page-mini-logo .site-mini-logo{
      text-decoration: none;
    }

    .page-nav-pills{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
      max-width: 100%;
    }

    .page-nav-pill{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      text-decoration: none;
      font-size: .92rem;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .page-nav-pill.is-current{
      border-color: rgba(214,179,73,.42);
      background: rgba(214,179,73,.12);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(214,179,73,.12);
    }

    .hero-card{
      margin-bottom: 16px;
    }

    .hero-title{
      margin: 0 0 10px;
      font-size: 1.38rem;
      line-height: 1.25;
    }

    .hero-text{
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.72;
    }

    .control-card{
      margin-bottom: 16px;
    }

    .control-grid{
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .control-group{
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label{
      color: var(--muted);
      font-size: .84rem;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .control-input{
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      font: inherit;
      box-sizing: border-box;
    }

    .control-input:focus{
      outline: none;
      border-color: rgba(214,179,73,.45);
      box-shadow: 0 0 0 3px rgba(214,179,73,.12);
    }

    .control-actions{
      display: flex;
      align-items: end;
    }

    .control-button{
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(214,179,73,.35);
      border-radius: 12px;
      background: rgba(214,179,73,.12);
      color: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .control-button:hover{
      background: rgba(214,179,73,.17);
    }

    .summary-card{
      margin-bottom: 16px;
    }

    .summary-grid{
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-item{
      padding: 14px 14px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.02);
    }

    .summary-label{
      margin: 0 0 6px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .03em;
    }

    .summary-value{
      margin: 0;
      color: var(--text);
      font-size: 1.18rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .result-card{
      overflow: hidden;
    }

    .result-head{
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .result-title{
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.3;
    }

    .result-note{
      color: var(--muted);
      font-size: .84rem;
      white-space: nowrap;
    }

    .result-table-wrap{
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .result-table{
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    .result-table th,
    .result-table td{
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    .result-table th{
      color: var(--muted);
      font-size: .80rem;
      font-weight: 800;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .result-table td{
      font-size: .93rem;
      line-height: 1.45;
    }

    .mc-link{
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 2px;
      font-weight: 800;
    }

    .score-low{
      color: #ff8e8e;
      font-weight: 800;
    }

    .win-positive{
      color: var(--accent);
      font-weight: 800;
    }

    .muted{
      color: var(--muted);
    }

    .empty-state{
      padding: 16px 0 4px;
      color: var(--muted);
      line-height: 1.7;
    }

    .loading{
      padding: 10px 0 0;
      color: var(--muted);
    }

    @media (max-width: 900px){
      .control-grid,
      .summary-grid{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px){
      .hero-title{
        font-size: 1.18rem;
      }

      .page-nav-pills{
        gap: 7px;
      }

      .page-nav-pill{
        min-height: 34px;
        padding: 0 12px;
        font-size: .86rem;
      }

      .control-grid,
      .summary-grid{
        grid-template-columns: 1fr;
      }

      .result-head{
        align-items: flex-start;
        flex-direction: column;
      }

      .result-note{
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="page-top">
      <p class="page-mini-logo">
        <a class="site-mini-logo" href="index.html">MCBattle.jp</a>
      </p>

      <nav class="page-nav-pills" aria-label="ページ一覧">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
        <a class="page-nav-pill is-current" href="score_sanity.html">スコア検証</a>
      </nav>
    </section>

    <section class="card hero-card">
      <h1 class="hero-title">スコア検証</h1>
      <p class="hero-text">
        本戦試合数・勝敗・スコアの関係を見るための確認用ページです。<br />
        ここでは「ある程度出場していて、勝ち越しているのに、スコアが初期値1500を下回っているMC」を抽出できます。
      </p>
    </section>

    <section class="card control-card">
      <div class="control-grid">
        <div class="control-group">
          <label class="control-label" for="minMatches">最低試合数</label>
          <input id="minMatches" class="control-input" type="number" min="1" step="1" value="10" />
        </div>

        <div class="control-group">
          <label class="control-label" for="minWinDiff">最低勝ち越し数</label>
          <input id="minWinDiff" class="control-input" type="number" min="1" step="1" value="1" />
        </div>

        <div class="control-group">
          <label class="control-label" for="scoreThreshold">スコア上限</label>
          <input id="scoreThreshold" class="control-input" type="number" step="0.01" value="1500" />
        </div>

        <div class="control-actions">
          <button id="applyButton" class="control-button" type="button">再抽出</button>
        </div>
      </div>
    </section>

    <section class="card summary-card">
      <div class="summary-grid">
        <div class="summary-item">
          <p class="summary-label">対象MC数</p>
          <p id="summaryCount" class="summary-value">-</p>
        </div>
        <div class="summary-item">
          <p class="summary-label">平均試合数</p>
          <p id="summaryAvgMatches" class="summary-value">-</p>
        </div>
        <div class="summary-item">
          <p class="summary-label">平均勝率</p>
          <p id="summaryAvgRate" class="summary-value">-</p>
        </div>
        <div class="summary-item">
          <p class="summary-label">平均スコア</p>
          <p id="summaryAvgScore" class="summary-value">-</p>
        </div>
      </div>
    </section>

    <section class="card result-card">
      <div class="result-head">
        <h2 class="result-title">抽出結果</h2>
        <div id="resultNote" class="result-note">読み込み中...</div>
      </div>

      <div id="loading" class="loading">データを読み込んでいます...</div>

      <div id="resultTableWrap" class="result-table-wrap" hidden>
        <table class="result-table">
          <thead>
            <tr>
              <th>順位</th>
              <th>MC</th>
              <th>戦績</th>
              <th>勝率</th>
              <th>勝ち越し</th>
              <th>スコア</th>
              <th>初期値差分</th>
              <th>優勝回数</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" hidden>
        条件に一致するMCはいませんでした。
      </div>
    </section>
  </main>

  <script>
    const MC_DETAILS_PATH = "data/mc_details_all.json";
    const SCORE_BASE = 1500;

    let allRows = [];

    async function init() {
      try {
        const response = await fetch(MC_DETAILS_PATH + "?v=" + Date.now(), { cache: "no-store" });
        if (!response.ok) {
          throw new Error("mc_details_all.json の取得に失敗しました。");
        }

        const json = await response.json();
        allRows = normalizeRows(json);

        document.getElementById("loading").hidden = true;
        document.getElementById("resultTableWrap").hidden = false;

        applyFilter();
      } catch (error) {
        document.getElementById("loading").textContent = "データの読み込みに失敗しました。";
        document.getElementById("resultNote").textContent = "読み込み失敗";
        console.error(error);
      }
    }

    function normalizeRows(json) {
      const details = json && json.mc_details ? json.mc_details : {};
      const rows = [];

      Object.keys(details).forEach((mcId) => {
        const detail = details[mcId] || {};

        const mcName = detail.mc_name || detail.name || mcId;
        const score = toNumber(
          detail.score,
          detail.current_score,
          detail.direct_score
        );

        const wins = toInt(
          detail.total_wins,
          detail.win_count,
          detail.wins,
          detail.record && detail.record.wins
        );

        const losses = toInt(
          detail.total_losses,
          detail.loss_count,
          detail.losses,
          detail.record && detail.record.losses
        );

        const totalMatches = toInt(
          detail.total_matches,
          detail.match_count,
          detail.matches,
          wins + losses
        );

        const championships = toInt(
          detail.championship_count,
          detail.title_count,
          detail.champion_count,
          Array.isArray(detail.championships) ? detail.championships.length : 0
        );

        if (!Number.isFinite(score)) return;
        if (!Number.isFinite(wins) || !Number.isFinite(losses)) return;

        const matches = Number.isFinite(totalMatches) && totalMatches > 0
          ? totalMatches
          : wins + losses;

        if (!matches) return;

        const winRate = matches > 0 ? wins / matches : 0;
        const winDiff = wins - losses;

        rows.push({
          mcId,
          mcName,
          score,
          wins,
          losses,
          matches,
          championships,
          winRate,
          winDiff
        });
      });

      rows.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.mcName.localeCompare(b.mcName, "ja");
      });

      rows.forEach((row, index) => {
        row.rank = index + 1;
      });

      return rows;
    }

    function applyFilter() {
      const minMatches = getNumberValue("minMatches", 10);
      const minWinDiff = getNumberValue("minWinDiff", 1);
      const scoreThreshold = getNumberValue("scoreThreshold", 1500);

      const filtered = allRows
        .filter((row) => row.matches >= minMatches)
        .filter((row) => row.winDiff >= minWinDiff)
        .filter((row) => row.score < scoreThreshold)
        .sort((a, b) => {
          if (b.matches !== a.matches) return b.matches - a.matches;
          if (b.winDiff !== a.winDiff) return b.winDiff - a.winDiff;
          return b.score - a.score;
        });

      renderSummary(filtered);
      renderTable(filtered, { minMatches, minWinDiff, scoreThreshold });
    }

    function renderSummary(rows) {
      const count = rows.length;
      const avgMatches = count ? average(rows.map((row) => row.matches)) : null;
      const avgRate = count ? average(rows.map((row) => row.winRate)) : null;
      const avgScore = count ? average(rows.map((row) => row.score)) : null;

      document.getElementById("summaryCount").textContent = formatInt(count);
      document.getElementById("summaryAvgMatches").textContent = count ? formatNumber(avgMatches) : "-";
      document.getElementById("summaryAvgRate").textContent = count ? formatPercent(avgRate) : "-";
      document.getElementById("summaryAvgScore").textContent = count ? formatNumber(avgScore) : "-";
    }

    function renderTable(rows, conditions) {
      const body = document.getElementById("resultBody");
      const empty = document.getElementById("emptyState");
      const wrap = document.getElementById("resultTableWrap");
      const note = document.getElementById("resultNote");

      body.innerHTML = "";

      note.textContent =
        "最低試合数 " + formatInt(conditions.minMatches) +
        " / 最低勝ち越し数 +" + formatInt(conditions.minWinDiff) +
        " / スコア " + formatNumber(conditions.scoreThreshold) + " 未満";

      if (!rows.length) {
        wrap.hidden = true;
        empty.hidden = false;
        return;
      }

      wrap.hidden = false;
      empty.hidden = true;

      rows.forEach((row) => {
        const tr = document.createElement("tr");

        tr.innerHTML = [
          "<td>" + formatInt(row.rank) + "位</td>",
          "<td><a class=\"mc-link\" href=\"mc.html?id=" + escapeHtml(row.mcId) + "\">" + escapeHtml(row.mcName) + "</a></td>",
          "<td>" + formatInt(row.matches) + "試合 " + formatInt(row.wins) + "勝 " + formatInt(row.losses) + "敗</td>",
          "<td>" + formatPercent(row.winRate) + "</td>",
          "<td><span class=\"win-positive\">+" + formatInt(row.winDiff) + "</span></td>",
          "<td><span class=\"score-low\">" + formatNumber(row.score) + "</span></td>",
          "<td>" + formatSignedNumber(row.score - SCORE_BASE) + "</td>",
          "<td>" + formatInt(row.championships) + "</td>"
        ].join("");

        body.appendChild(tr);
      });
    }

    function getNumberValue(id, fallback) {
      const value = Number(document.getElementById(id).value);
      return Number.isFinite(value) ? value : fallback;
    }

    function toNumber(...values) {
      for (const value of values) {
        const num = Number(value);
        if (Number.isFinite(num)) return num;
      }
      return NaN;
    }

    function toInt(...values) {
      for (const value of values) {
        const num = Number(value);
        if (Number.isFinite(num)) return Math.round(num);
      }
      return NaN;
    }

    function average(values) {
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function formatNumber(value) {
      return Number(value).toLocaleString("ja-JP", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatSignedNumber(value) {
      const sign = value > 0 ? "+" : "";
      return sign + formatNumber(value);
    }

    function formatPercent(value) {
      return (value * 100).toLocaleString("ja-JP", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + "%";
    }

    function formatInt(value) {
      return Number(value).toLocaleString("ja-JP", {
        maximumFractionDigits: 0
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    document.getElementById("applyButton").addEventListener("click", applyFilter);

    init();
  </script>
</body>
</html>
