<script>
  const MC_DETAILS_PATH = "data/mc_details_all.json";
  const SCORE_BASE = 1500;

  let allRows = [];

  async function init() {
    try {
      const response = await fetch(MC_DETAILS_PATH + "?v=" + Date.now(), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("mc_details_all.json の取得に失敗しました");
      }

      const json = await response.json();
      allRows = normalizeRows(json);

      document.getElementById("loading").hidden = true;

      if (!allRows.length) {
        document.getElementById("resultNote").textContent = "読込成功 / 0件";
        document.getElementById("emptyState").hidden = false;
        document.getElementById("emptyState").textContent =
          "データは読めましたが、抽出用のスコア・勝敗を取得できるMCが見つかりませんでした。mc_details_all.json のキー名を確認してください。";
        return;
      }

      document.getElementById("resultTableWrap").hidden = false;
      applyFilter();
    } catch (error) {
      document.getElementById("loading").textContent = "データの読み込みに失敗しました。";
      document.getElementById("resultNote").textContent = "読み込み失敗";
      console.error(error);
    }
  }

  function normalizeRows(json) {
    const detailsRoot =
      json?.mc_details ||
      json?.data?.mc_details ||
      json?.details ||
      json;

    let entries = [];

    if (Array.isArray(detailsRoot)) {
      entries = detailsRoot.map((item, index) => [item.mc_id || item.id || String(index), item]);
    } else if (detailsRoot && typeof detailsRoot === "object") {
      entries = Object.entries(detailsRoot);
    }

    const rows = [];

    for (const [mcId, detail] of entries) {
      if (!detail || typeof detail !== "object") continue;

      const mcName =
        pick(detail, [
          "mc_name",
          "name",
          "mcName",
          "mc_name_display",
          "profile.mc_name"
        ]) || mcId;

      const score = toNumber(
        pick(detail, [
          "score",
          "direct_score",
          "current_score",
          "ranking.score",
          "score_info.score",
          "stats.score"
        ])
      );

      let wins = toInt(
        pick(detail, [
          "wins",
          "win_count",
          "total_wins",
          "record.wins",
          "stats.wins",
          "battle_stats.wins"
        ])
      );

      let losses = toInt(
        pick(detail, [
          "losses",
          "loss_count",
          "total_losses",
          "record.losses",
          "stats.losses",
          "battle_stats.losses"
        ])
      );

      let matches = toInt(
        pick(detail, [
          "matches",
          "match_count",
          "total_matches",
          "record.matches",
          "stats.matches",
          "battle_stats.matches"
        ])
      );

      if (!Number.isFinite(wins) || !Number.isFinite(losses) || !Number.isFinite(matches)) {
        const recordText =
          pick(detail, [
            "record_text",
            "battle_record_text",
            "record.label",
            "stats.record_text"
          ]) || "";

        const parsed = parseRecordText(recordText);
        if (!Number.isFinite(matches) && Number.isFinite(parsed.matches)) matches = parsed.matches;
        if (!Number.isFinite(wins) && Number.isFinite(parsed.wins)) wins = parsed.wins;
        if (!Number.isFinite(losses) && Number.isFinite(parsed.losses)) losses = parsed.losses;
      }

      if (!Number.isFinite(matches) && Number.isFinite(wins) && Number.isFinite(losses)) {
        matches = wins + losses;
      }

      const championships = inferChampionships(detail);

      if (!Number.isFinite(score)) continue;
      if (!Number.isFinite(wins)) continue;
      if (!Number.isFinite(losses)) continue;
      if (!Number.isFinite(matches) || matches <= 0) continue;

      const winRate = matches > 0 ? wins / matches : 0;
      const winDiff = wins - losses;

      rows.push({
        mcId,
        mcName,
        score,
        wins,
        losses,
        matches,
        championships,
        winRate,
        winDiff
      });
    }

    rows.sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      return String(a.mcName).localeCompare(String(b.mcName), "ja");
    });

    rows.forEach((row, index) => {
      row.rank = index + 1;
    });

    return rows;
  }

  function parseRecordText(text) {
    const str = String(text || "").replace(/\s+/g, "");
    const match = str.match(/(\d+)試合.*?(\d+)勝.*?(\d+)敗/);
    if (!match) {
      return { matches: NaN, wins: NaN, losses: NaN };
    }
    return {
      matches: Number(match[1]),
      wins: Number(match[2]),
      losses: Number(match[3])
    };
  }

  function inferChampionships(detail) {
    const direct = toInt(
      pick(detail, [
        "championship_count",
        "title_count",
        "champion_count",
        "stats.championship_count"
      ])
    );
    if (Number.isFinite(direct)) return direct;

    const list =
      pick(detail, [
        "championships",
        "titles",
        "wins_as_champion",
        "profile.championships"
      ]);

    if (Array.isArray(list)) return list.length;

    const text =
      pick(detail, [
        "championship_text",
        "title_text"
      ]) || "";

    if (text === "-" || text === "なし" || text === "0") return 0;

    return 0;
  }

  function pick(obj, paths) {
    for (const path of paths) {
      const value = getByPath(obj, path);
      if (value !== undefined && value !== null && value !== "") {
        return value;
      }
    }
    return undefined;
  }

  function getByPath(obj, path) {
    const parts = String(path).split(".");
    let current = obj;
    for (const part of parts) {
      if (current == null || typeof current !== "object") return undefined;
      current = current[part];
    }
    return current;
  }

  function applyFilter() {
    const minMatches = getNumberValue("minMatches", 10);
    const minWinDiff = getNumberValue("minWinDiff", 1);
    const scoreThreshold = getNumberValue("scoreThreshold", 1500);

    const filtered = allRows
      .filter((row) => row.matches >= minMatches)
      .filter((row) => row.winDiff >= minWinDiff)
      .filter((row) => row.score < scoreThreshold)
      .sort((a, b) => {
        if (b.matches !== a.matches) return b.matches - a.matches;
        if (b.winDiff !== a.winDiff) return b.winDiff - a.winDiff;
        return b.score - a.score;
      });

    renderSummary(filtered);
    renderTable(filtered, { minMatches, minWinDiff, scoreThreshold });
  }

  function renderSummary(rows) {
    const count = rows.length;
    const avgMatches = count ? average(rows.map((row) => row.matches)) : null;
    const avgRate = count ? average(rows.map((row) => row.winRate)) : null;
    const avgScore = count ? average(rows.map((row) => row.score)) : null;

    document.getElementById("summaryCount").textContent = formatInt(count);
    document.getElementById("summaryAvgMatches").textContent = count ? formatNumber(avgMatches) : "-";
    document.getElementById("summaryAvgRate").textContent = count ? formatPercent(avgRate) : "-";
    document.getElementById("summaryAvgScore").textContent = count ? formatNumber(avgScore) : "-";
  }

  function renderTable(rows, conditions) {
    const body = document.getElementById("resultBody");
    const empty = document.getElementById("emptyState");
    const wrap = document.getElementById("resultTableWrap");
    const note = document.getElementById("resultNote");

    body.innerHTML = "";

    note.textContent =
      "読込済 " + formatInt(allRows.length) + "件 / " +
      "最低試合数 " + formatInt(conditions.minMatches) +
      " / 最低勝ち越し数 +" + formatInt(conditions.minWinDiff) +
      " / スコア " + formatNumber(conditions.scoreThreshold) + " 未満";

    if (!rows.length) {
      wrap.hidden = true;
      empty.hidden = false;
      empty.textContent = "条件に一致するMCはいませんでした。";
      return;
    }

    wrap.hidden = false;
    empty.hidden = true;

    rows.forEach((row) => {
      const tr = document.createElement("tr");

      tr.innerHTML = [
        "<td>" + formatInt(row.rank) + "位</td>",
        "<td><a class=\"mc-link\" href=\"mc.html?id=" + encodeURIComponent(row.mcId) + "\">" + escapeHtml(row.mcName) + "</a></td>",
        "<td>" + formatInt(row.matches) + "試合 " + formatInt(row.wins) + "勝 " + formatInt(row.losses) + "敗</td>",
        "<td>" + formatPercent(row.winRate) + "</td>",
        "<td><span class=\"win-positive\">+" + formatInt(row.winDiff) + "</span></td>",
        "<td><span class=\"score-low\">" + formatNumber(row.score) + "</span></td>",
        "<td>" + formatSignedNumber(row.score - SCORE_BASE) + "</td>",
        "<td>" + formatInt(row.championships) + "</td>"
      ].join("");

      body.appendChild(tr);
    });
  }

  function getNumberValue(id, fallback) {
    const value = Number(document.getElementById(id).value);
    return Number.isFinite(value) ? value : fallback;
  }

  function toNumber(value) {
    const num = Number(value);
    return Number.isFinite(num) ? num : NaN;
  }

  function toInt(value) {
    const num = Number(value);
    return Number.isFinite(num) ? Math.round(num) : NaN;
  }

  function average(values) {
    if (!values.length) return null;
    return values.reduce((sum, value) => sum + value, 0) / values.length;
  }

  function formatNumber(value) {
    return Number(value).toLocaleString("ja-JP", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function formatSignedNumber(value) {
    const sign = value > 0 ? "+" : "";
    return sign + formatNumber(value);
  }

  function formatPercent(value) {
    return (value * 100).toLocaleString("ja-JP", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }) + "%";
  }

  function formatInt(value) {
    return Number(value).toLocaleString("ja-JP", {
      maximumFractionDigits: 0
    });
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  document.getElementById("applyButton").addEventListener("click", applyFilter);

  init();
</script>
