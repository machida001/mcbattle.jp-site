<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大会一覧 | 国内MCバトル大会データベース | MCBattle.jp</title>
  <meta name="description" content="国内MCバトルの大会一覧ページです。開催済み大会をカテゴリ別に掲載し、各大会の詳細ページから開催日、優勝者、試合結果を確認できます。">
  <link rel="stylesheet" href="style.css" />
  <style>
    .event-group-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .event-group {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      background: rgba(255,255,255,0.018);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.025) inset;
    }

    .event-group-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 15px;
      border: none;
      background: rgba(255,255,255,0.02);
      color: var(--accent);
      text-align: left;
      cursor: pointer;
      font: inherit;
      transition:
        background-color 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        color 0.18s ease,
        transform 0.18s ease;
    }

    .event-group-toggle:hover {
      background: rgba(255,255,255,0.032);
    }

    .event-group-left {
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .event-group-name {
      font-size: 0.98rem;
      font-weight: 800;
      line-height: 1.32;
      color: var(--accent);
      word-break: break-word;
    }

    .event-group-icon {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1;
      transition: transform 0.18s ease;
    }

    .event-group.is-open .event-group-icon {
      transform: rotate(180deg);
    }

    .event-group-body {
      display: none;
      padding: 0 9px 9px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .event-group.is-open .event-group-body {
      display: block;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .event-row,
    .event-row:hover,
    .event-row *,
    .event-row:hover * {
      text-decoration: none !important;
    }

    .event-row {
      display: block;
      padding: 9px 10px 8px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.018);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        background-color 0.18s ease,
        box-shadow 0.18s ease,
        color 0.18s ease;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.015) inset;
    }

    .event-row:hover {
      background: rgba(255,255,255,0.032);
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    .event-date {
      font-size: 0.76rem;
      color: var(--accent);
      margin-bottom: 3px;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: color 0.18s ease;
    }

    .event-row:hover .event-date {
      color: #f0cd87;
    }

    .event-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.38;
      word-break: break-word;
      transition: color 0.18s ease;
    }

    .event-row:hover .event-name {
      color: #ffffff;
    }

    .event-winner {
      display: block;
      color: #ffffff;
      font-weight: 700;
    }

    .status {
      margin-top: 8px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 640px) {
      .event-group-list {
        gap: 6px;
      }

      .event-group {
        border-radius: 16px;
      }

      .event-group-toggle {
        padding: 10px 13px;
      }

      .event-group-body {
        padding: 0 8px 8px;
      }

      .event-row {
        padding: 8px 9px 7px;
        border-radius: 12px;
      }

      .event-group-name {
        font-size: 0.94rem;
      }

      .event-date {
        font-size: 0.72rem;
      }

      .event-name {
        font-size: 0.89rem;
        line-height: 1.34;
      }
    }
  </style>
</head>
<body>
  <div class="events-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="prize_rankings.html">賞金ランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">大会シミュレーション</a>
      </nav>

      <div class="page-header-block">
        <h1>大会一覧</h1>
      </div>
    </div>

    <div id="event-list" class="event-group-list"></div>
    <p id="status" class="status">読み込み中…</p>
  </div>

  <script>
    const EVENTS_JSON_URL = "./data/events.json";

    function escapeHtml(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDate(v) {
      if (!v) return "";
      const d = new Date(v);
      if (isNaN(d)) return v;
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
    }

    function getName(e) {
      return e.event_name_full || e.event_name || "";
    }

    function getWinnerName(e) {
      return String(e.winner_name || "").trim();
    }

    function getCategoryName(e) {
      return String(e.category_name || "").trim() || String(e.event_category || "").trim() || "その他";
    }

    function getCategoryShowOrder(e) {
      const n = Number(e.category_show_order);
      return Number.isFinite(n) ? n : 999999;
    }

    function getDateValue(v) {
      if (!v) return null;
      const d = new Date(v);
      return isNaN(d) ? null : d;
    }

    function compareEventsByDateDesc(a, b) {
      const da = getDateValue(a.event_date);
      const db = getDateValue(b.event_date);

      if (da && db) return db - da;
      if (da) return -1;
      if (db) return 1;

      return String(getName(a)).localeCompare(String(getName(b)), "ja");
    }

    function groupEvents(events) {
      const map = new Map();

      events.forEach(event => {
        const categoryName = getCategoryName(event);
        const key = `${getCategoryShowOrder(event)}__${categoryName}`;

        if (!map.has(key)) {
          map.set(key, {
            category_name: categoryName,
            category_show_order: getCategoryShowOrder(event),
            items: []
          });
        }

        map.get(key).items.push(event);
      });

      const groups = Array.from(map.values()).map(group => {
        return {
          category: group.category_name,
          category_show_order: group.category_show_order,
          items: group.items.slice().sort(compareEventsByDateDesc)
        };
      });

      groups.sort((a, b) => {
        if (a.category_show_order !== b.category_show_order) {
          return a.category_show_order - b.category_show_order;
        }
        return a.category.localeCompare(b.category, "ja");
      });

      return groups;
    }

    async function loadEventsJson() {
      const res = await fetch(EVENTS_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function buildEventRow(e) {
      const id = e.event_id || "";
      const name = getName(e);
      const winnerName = getWinnerName(e);
      const date = formatDate(e.event_date);

      const winnerHtml = winnerName
        ? `<span class="event-winner">（${escapeHtml(winnerName)}）</span>`
        : "";

      return `
        <a class="event-row" href="event.html?event_id=${encodeURIComponent(id)}">
          <div class="event-date">${escapeHtml(date)}</div>
          <div class="event-name">
            ${escapeHtml(name)}
            ${winnerHtml}
          </div>
        </a>
      `;
    }

    function attachAccordionEvents() {
      const toggles = document.querySelectorAll(".event-group-toggle");
      toggles.forEach(btn => {
        btn.addEventListener("click", () => {
          const group = btn.closest(".event-group");
          if (!group) return;
          group.classList.toggle("is-open");

          const expanded = group.classList.contains("is-open");
          btn.setAttribute("aria-expanded", expanded ? "true" : "false");
        });
      });
    }

    async function load() {
      const listEl = document.getElementById("event-list");
      const statusEl = document.getElementById("status");

      try {
        const res = await loadEventsJson();

        if (res.error) throw new Error(res.message || "data error");

        const allEvents = Array.isArray(res.events) ? res.events : [];
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const events = allEvents.filter((event) => {
          const d = getDateValue(event.event_date);
          return d && d.getTime() <= today.getTime();
        });

        if (!events.length) {
          statusEl.textContent = "大会がありません";
          return;
        }

        const groups = groupEvents(events);

        listEl.innerHTML = groups.map((group, index) => {
          const bodyId = `event-group-body-${index}`;
          const rows = group.items.map(buildEventRow).join("");

          return `
            <section class="event-group">
              <button
                class="event-group-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="${bodyId}"
              >
                <span class="event-group-left">
                  <span class="event-group-name">${escapeHtml(group.category)}</span>
                </span>
                <span class="event-group-icon">▼</span>
              </button>
              <div id="${bodyId}" class="event-group-body">
                <div class="event-list">
                  ${rows}
                </div>
              </div>
            </section>
          `;
        }).join("");

        attachAccordionEvents();
        statusEl.textContent = "";
      } catch (e) {
        console.error(e);
        statusEl.textContent = "大会一覧の取得に失敗しました";
        statusEl.classList.add("error");
      }
    }

    load();
  </script>
</body>
</html>
