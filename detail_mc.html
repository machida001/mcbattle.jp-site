<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/favicon-180x180.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MC詳細ページへ移動中 | MCBattle.jp</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://mcbattle.jp/list_mc.html" />

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const mcId = String(params.get("mc_id") || "").trim();

      if (mcId) {
        location.replace("/detail_mc/" + encodeURIComponent(mcId) + ".html");
        return;
      }

      location.replace("/list_mc.html");
    })();
  </script>
</head>
<body>
  <p>新しいMC詳細ページへ移動しています。</p>
  <p><a href="/list_mc.html">MC一覧へ移動する</a></p>
</body>
</html>
