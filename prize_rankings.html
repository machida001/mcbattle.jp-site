<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>賞金ランキング | MCBattle.jp</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .prize-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 56px;
    }

    .page-top {
      margin-bottom: 20px;
    }

    .page-mini-logo {
      margin: 0 0 14px;
    }

    .site-mini-logo {
      display: inline-block;
      font-size: clamp(2.05rem, 4.9vw, 3.15rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--accent);
      text-decoration: none;
    }

    .site-mini-logo:hover {
      opacity: 0.92;
    }

    .page-nav-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 14px;
      margin-bottom: 18px;
    }

    .page-nav-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 28px;
      border-radius: 999px;
      border: 1px solid rgba(214, 178, 95, 0.22);
      background: rgba(255,255,255,0.025);
      color: var(--accent);
      text-decoration: none;
      font-weight: 800;
      font-size: 1rem;
      line-height: 1;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
      transition:
        background-color 0.18s ease,
        border-color 0.18s ease,
        transform 0.18s ease,
        box-shadow 0.18s ease,
        color 0.18s ease;
    }

    .page-nav-pill:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(214, 178, 95, 0.34);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.16);
    }

    .page-nav-break {
      flex-basis: 100%;
      height: 0;
    }

    .page-header-block h1 {
      margin: 0 0 18px;
      font-size: clamp(2.35rem, 7vw, 4.3rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    .top3-wrap {
      margin-bottom: 18px;
    }

    .top3-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .top3-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
    }

    .top3-row + .top3-row {
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .top3-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: 1.42rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .top3-medal {
      flex: 0 0 auto;
      font-size: 1.15em;
      line-height: 1;
    }

    .top3-name {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .top3-name a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.55);
      transition: border-color 0.18s ease, opacity 0.18s ease;
    }

    .top3-name a:hover {
      opacity: 0.92;
      border-bottom-color: rgba(255,255,255,0.88);
    }

    .top3-amount {
      color: var(--accent);
      font-weight: 900;
      font-size: 1.38rem;
      line-height: 1;
      letter-spacing: -0.03em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .ranking-panel {
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,0.16);
      background:
        radial-gradient(circle at top left, rgba(52, 76, 170, 0.08), transparent 36%),
        rgba(255,255,255,0.03);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 24px 50px rgba(0,0,0,0.16);
      padding: 18px 18px 14px;
    }

    .rest-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .ranking-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table.prize-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }

    .prize-table thead th {
      text-align: left;
      color: var(--accent);
      font-weight: 800;
      font-size: 1.05rem;
      padding: 16px 14px;
      background: rgba(255,255,255,0.035);
      border-bottom: 1px solid rgba(214,178,95,0.34);
    }

    .prize-table thead th:nth-child(1),
    .prize-table tbody td:nth-child(1) {
      width: 88px;
      text-align: right;
    }

    .prize-table thead th:nth-child(3),
    .prize-table tbody td:nth-child(3) {
      width: 220px;
      text-align: right;
      white-space: nowrap;
    }

    .prize-table tbody tr {
      border-bottom: 1px solid rgba(214,178,95,0.26);
    }

    .prize-table tbody td {
      padding: 18px 14px;
      color: #ffffff;
      font-size: 1rem;
      vertical-align: middle;
    }

    .prize-rank {
      color: #ffffff;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .prize-mc a {
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.55);
      transition: border-color 0.18s ease, opacity 0.18s ease;
    }

    .prize-mc a:hover {
      opacity: 0.92;
      border-bottom-color: rgba(255,255,255,0.88);
    }

    .prize-amount {
      color: #ffffff;
      font-weight: 500;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .status.error {
      color: var(--danger);
    }

    .empty-note {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
      padding: 10px 2px 2px;
    }

    @media (max-width: 640px) {
      .prize-page {
        padding: 18px 14px 48px;
      }

      .page-nav-pills {
        gap: 10px 12px;
      }

      .page-nav-pill {
        min-height: 48px;
        padding: 0 22px;
        font-size: 0.96rem;
      }

      .top3-row {
        gap: 10px;
        padding: 12px 0;
      }

      .top3-left {
        gap: 8px;
        font-size: 1.12rem;
      }

      .top3-medal {
        font-size: 1.08em;
      }

      .top3-amount {
        font-size: 1.08rem;
      }

      .ranking-panel {
        border-radius: 22px;
        padding: 12px 10px 12px;
      }

      table.prize-table {
        min-width: 0;
      }

      .prize-table thead th {
        padding: 13px 10px;
        font-size: 0.9rem;
      }

      .prize-table tbody td {
        padding: 14px 10px;
        font-size: 0.94rem;
      }

      .prize-table thead th:nth-child(1),
      .prize-table tbody td:nth-child(1) {
        width: 54px;
      }

      .prize-table thead th:nth-child(3),
      .prize-table tbody td:nth-child(3) {
        width: 140px;
      }

      .prize-amount {
        font-size: 0.94rem;
      }
    }
  </style>
</head>
<body>
  <div class="prize-page">
    <div class="page-top">
      <p class="page-mini-logo"><a href="./" class="site-mini-logo">MCBattle.jp</a></p>

      <nav class="page-nav-pills" aria-label="主要メニュー">
        <a class="page-nav-pill" href="events.html">大会一覧</a>
        <a class="page-nav-pill" href="mcs.html">MC一覧</a>
        <span class="page-nav-break" aria-hidden="true"></span>
        <a class="page-nav-pill" href="rankings.html">スコアランキング</a>
        <a class="page-nav-pill" href="virtual_tournament.html">仮想シミュレーション</a>
      </nav>

      <div class="page-header-block">
        <h1>賞金ランキング</h1>
      </div>
    </div>

    <section class="top3-wrap">
      <div id="top3" class="top3-list"></div>
    </section>

    <section class="ranking-panel">
      <p class="rest-title">4位以降</p>
      <div id="ranking-rest"></div>
    </section>

    <p id="status" class="status">読み込み中…</p>
  </div>

  <script>
    const PRIZE_JSON_URL = "./data/prize_rankings.json";

    function escapeHtml(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function toNumber(v) {
      if (v === null || v === undefined || v === "") return NaN;
      if (typeof v === "number") return Number.isFinite(v) ? v : NaN;
      const cleaned = String(v).replace(/[^\d.-]/g, "");
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : NaN;
    }

    function formatMoney(v) {
      const n = toNumber(v);
      return "¥" + (Number.isFinite(n) ? n : 0).toLocaleString("ja-JP");
    }

    function getMcId(item) {
      return String(item.mc_id || "").trim();
    }

    function getMcName(item) {
      return String(item.mc_name || item.name || "").trim();
    }

    function getPrizeAmount(item) {
      const candidates = [
        item.total_prize_money,
        item.total_prize,
        item.prize_total,
        item.total_amount,
        item.amount,
        item.prize,
        item.prize_money,
        item.totalPrize,
        item.totalPrizeAmount,
        item.winning_amount,
        item.money,
        item.賞金,
        item.総賞金
      ];

      for (const value of candidates) {
        const n = toNumber(value);
        if (Number.isFinite(n)) return n;
      }

      return 0;
    }

    function normalizeItems(raw) {
      const source =
        Array.isArray(raw?.rankings) ? raw.rankings :
        Array.isArray(raw?.items) ? raw.items :
        Array.isArray(raw?.data) ? raw.data :
        Array.isArray(raw) ? raw : [];

      return source
        .map((item, index) => ({
          rank: Number(item.rank) || (index + 1),
          mc_id: getMcId(item),
          mc_name: getMcName(item),
          amount: getPrizeAmount(item)
        }))
        .filter(item => item.mc_name)
        .sort((a, b) => {
          if (b.amount !== a.amount) return b.amount - a.amount;
          return a.rank - b.rank;
        })
        .map((item, index) => ({
          ...item,
          rank: index + 1
        }));
    }

    function mcLink(item) {
      const name = escapeHtml(item.mc_name);
      if (!item.mc_id) return name;
      return `<a href="mc.html?mc_id=${encodeURIComponent(item.mc_id)}">${name}</a>`;
    }

    function medalEmoji(rank) {
      if (rank === 1) return "🥇";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return "";
    }

    function buildTop3Row(item) {
      return `
        <div class="top3-row">
          <div class="top3-left">
            <span class="top3-medal" aria-hidden="true">${medalEmoji(item.rank)}</span>
            <span class="top3-name">${mcLink(item)}</span>
          </div>
          <div class="top3-amount">${escapeHtml(formatMoney(item.amount))}</div>
        </div>
      `;
    }

    function buildTop3(items) {
      if (!items.length) {
        return `<p class="empty-note">賞金データがありません。</p>`;
      }
      return items.map(buildTop3Row).join("");
    }

    function buildRestTable(items) {
      if (!items.length) {
        return `<p class="empty-note">4位以降のデータはありません。</p>`;
      }

      return `
        <div class="ranking-table-wrap">
          <table class="prize-table">
            <thead>
              <tr>
                <th>順位</th>
                <th>MC名</th>
                <th>賞金</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(item => `
                <tr>
                  <td class="prize-rank">${item.rank}</td>
                  <td class="prize-mc">${mcLink(item)}</td>
                  <td class="prize-amount">${escapeHtml(formatMoney(item.amount))}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    async function fetchPrizeData() {
      const res = await fetch(PRIZE_JSON_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function load() {
      const top3El = document.getElementById("top3");
      const restEl = document.getElementById("ranking-rest");
      const statusEl = document.getElementById("status");

      try {
        const raw = await fetchPrizeData();

        if (raw && raw.error) {
          throw new Error(raw.message || "data error");
        }

        const items = normalizeItems(raw);
        const top3 = items.slice(0, 3);
        const rest = items.slice(3);

        top3El.innerHTML = buildTop3(top3);
        restEl.innerHTML = buildRestTable(rest);
        statusEl.textContent = "";
      } catch (err) {
        console.error(err);
        top3El.innerHTML = "";
        restEl.innerHTML = "";
        statusEl.textContent = "賞金ランキングの取得に失敗しました";
        statusEl.classList.add("error");
      }
    }

    load();
  </script>
</body>
</html>
