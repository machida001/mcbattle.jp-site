<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>準備中 | MCBattle.jp</title>
  <meta name="description" content="MCBattle.jp は現在公開準備中です。正式リリースまでしばらくお待ちください。">
  <link rel="stylesheet" href="style.css" />
  <style>
    :root{
      --bg-1:#11131a;
      --bg-2:#0c0d12;
      --panel:#171922;
      --line:#2a3040;
      --text:#f4f5f7;
      --muted:#b2b8c7;
      --accent:#d8b46a;
      --shadow:0 20px 56px rgba(0,0,0,.30);
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(216,180,106,.10), transparent 30%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      line-height:1.7;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .maintenance-card{
      width:min(100%, 680px);
      padding:30px 28px 26px;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(23,25,34,.96), rgba(14,16,23,.98));
      box-shadow:var(--shadow);
      text-align:left;
    }

    .mini-logo{
      margin:0 0 14px;
      font-size:14px;
      font-weight:700;
      color:var(--accent);
      letter-spacing:.03em;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:14px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid rgba(216,180,106,.28);
      background:rgba(216,180,106,.08);
      color:#f0cd87;
      font-size:13px;
      font-weight:700;
      line-height:1.2;
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:currentColor;
      box-shadow:0 0 12px rgba(240,205,135,.45);
      flex:0 0 auto;
    }

    .title{
      margin:0;
      font-size:clamp(30px, 5vw, 44px);
      line-height:1.1;
      letter-spacing:.01em;
    }

    .lead{
      margin:14px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.8;
    }

    .info-box{
      margin-top:22px;
      padding:16px 16px 15px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.025);
    }

    .info-title{
      margin:0 0 8px;
      font-size:14px;
      font-weight:800;
      color:var(--accent);
      line-height:1.35;
    }

    .info-text{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.75;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:22px;
    }

    .action-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      color:var(--text);
      font-size:14px;
      font-weight:700;
      line-height:1.2;
      transition:
        transform .18s ease,
        border-color .18s ease,
        background-color .18s ease,
        box-shadow .18s ease,
        opacity .18s ease;
    }

    .action-link:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.24);
      background:rgba(255,255,255,.07);
      box-shadow:0 12px 24px rgba(0,0,0,.16);
      opacity:1;
    }

    .action-link.is-primary{
      border-color:rgba(216,180,106,.34);
      background:linear-gradient(180deg, rgba(216,180,106,.14), rgba(216,180,106,.06));
      color:#fff4dc;
    }

    .action-link.is-primary:hover{
      border-color:rgba(216,180,106,.56);
      background:linear-gradient(180deg, rgba(216,180,106,.20), rgba(216,180,106,.09));
      box-shadow:0 12px 28px rgba(0,0,0,.18);
    }

    .footnote{
      margin:18px 0 0;
      color:#8e96a9;
      font-size:12px;
      line-height:1.7;
    }

    @media (max-width:640px){
      .page{
        padding:16px;
        align-items:flex-start;
      }

      .maintenance-card{
        margin-top:26px;
        padding:22px 18px 20px;
        border-radius:20px;
      }

      .mini-logo{
        margin-bottom:12px;
        font-size:13px;
      }

      .status-chip{
        margin-bottom:12px;
        padding:6px 10px;
        font-size:12px;
      }

      .lead{
        margin-top:12px;
        font-size:14px;
        line-height:1.72;
      }

      .info-box{
        margin-top:18px;
        padding:14px 13px 13px;
        border-radius:16px;
      }

      .info-title{
        font-size:13px;
      }

      .info-text{
        font-size:13px;
        line-height:1.68;
      }

      .actions{
        margin-top:18px;
        gap:8px;
      }

      .action-link{
        width:100%;
        min-height:42px;
        font-size:13px;
      }

      .footnote{
        margin-top:15px;
        font-size:11px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="maintenance-card">
      <p class="mini-logo">MCBattle.jp</p>

      <div class="status-chip">
        <span class="status-dot" aria-hidden="true"></span>
        <span>現在公開準備中です</span>
      </div>

      <h1 class="title">ただいま調整中です</h1>

      <p class="lead">
        MCBattle.jp は現在、公開前の最終調整を行っています。<br>
        正式リリースまで、しばらくお待ちください。
      </p>

      <div class="info-box">
        <h2 class="info-title">このページについて</h2>
        <p class="info-text">
          大会情報、試合結果、MCごとの戦績、独自スコアなどを掲載するサイトとして準備を進めています。<br>
          公開開始後は、トップページから各コンテンツをご覧いただけます。
        </p>
      </div>

      <div class="actions">
        <a class="action-link is-primary" href="./">トップへ戻る</a>
        <a class="action-link" href="contact.html">お問い合わせ</a>
      </div>

      <p class="footnote">
        ※ この画面は公開前の一時表示です。公開時には通常のトップページへ切り替わります。
      </p>
    </section>
  </main>
</body>
</html>
