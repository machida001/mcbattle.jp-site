  <script>
    (function () {
      function setupCollapsibleList(listId, buttonId, limit) {
        const listEl = document.getElementById(listId);
        const buttonEl = document.getElementById(buttonId);
        if (!listEl || !buttonEl) return;

        const items = Array.from(listEl.children).filter((el) => !el.classList.contains("is-static-empty"));
        if (items.length <= limit) {
          buttonEl.classList.add("is-hidden");
          return;
        }

        let expanded = false;

        function render() {
          items.forEach((item, index) => {
            if (!expanded && index >= limit) {
              item.classList.add("is-hidden");
            } else {
              item.classList.remove("is-hidden");
            }
          });
          buttonEl.textContent = expanded ? "閉じる" : "すべて見る";
        }

        buttonEl.classList.remove("is-hidden");
        buttonEl.addEventListener("click", function () {
          expanded = !expanded;
          render();
        });

        render();
      }

      setupCollapsibleList("wins-list", "wins-more-button", 5);
      setupCollapsibleList("losses-list", "losses-more-button", 5);
      setupCollapsibleList("appearances-list", "appearances-more-button", 10);
    })();
  </script>
