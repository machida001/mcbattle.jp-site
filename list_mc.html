  <script>
    const MCS_JSON_URL = "./data/mcs.json";
    const TAB_ORDER = ["あ", "か", "さ", "た", "な", "は", "ま", "や", "ら", "わ"];

    let allMcs = [];
    let allGroups = {};
    let currentTab = "あ";
    let searchInitialized = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function toHiragana(str) {
      return String(str || "").replace(/[\u30a1-\u30f6]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    }

    function normalizeSearchText(value) {
      return toHiragana(String(value || ""))
        .toLowerCase()
        .replace(/\s+/g, "")
        .trim();
    }

    function getSearchText(mc) {
      return normalizeSearchText([
        mc.mc_name || "",
        mc.mc_yomi || ""
      ].join(" "));
    }

    function isHotMc(mc) {
      const value = mc ? mc.hot_mc : "";
      const text = String(value ?? "").toLowerCase().trim();
      return value === true || value === 1 || text === "1" || text === "true" || text === "yes" || text === "hot";
    }

    function getTabGroup(mc) {
      const yomi = toHiragana(String(mc.mc_yomi || mc.mc_name || "").trim());
      const first = yomi.charAt(0);

      if ("あいうえお".includes(first)) return "あ";
      if ("かきくけこがぎぐげご".includes(first)) return "か";
      if ("さしすせそざじずぜぞ".includes(first)) return "さ";
      if ("たちつてとだぢづでど".includes(first)) return "た";
      if ("なにぬねの".includes(first)) return "な";
      if ("はひふへほばびぶべぼぱぴぷぺぽ".includes(first)) return "は";
      if ("まみむめも".includes(first)) return "ま";
      if ("やゆよ".includes(first)) return "や";
      if ("らりるれろ".includes(first)) return "ら";
      if ("わをん".includes(first)) return "わ";

      return "";
    }

    function sortMcs(mcs) {
      return [...mcs].sort((a, b) => {
        const ay = String(a.mc_yomi || a.mc_name || "");
        const by = String(b.mc_yomi || b.mc_name || "");
        const yomiCompare = ay.localeCompare(by, "ja");
        if (yomiCompare !== 0) return yomiCompare;

        return String(a.mc_name || "").localeCompare(String(b.mc_name || ""), "ja");
      });
    }

    function createMcList(mcs) {
      const list = document.createElement("ul");
      list.className = "mcs-list";

      mcs.forEach(mc => {
        const li = document.createElement("li");
        const mcId = String(mc.mc_id || "");
        const name = String(mc.mc_name || "MC名不明");

        if (mcId) {
          li.innerHTML = `<a class="mc-link" href="detail_mc/${encodeURIComponent(mcId)}.html">${escapeHtml(name)}</a>`;
        } else {
          li.innerHTML = `<span class="mc-link-static">${escapeHtml(name)}</span>`;
        }

        list.appendChild(li);
      });

      return list;
    }

    function createHotMcsElement(mcs, activeTab) {
      const target = (mcs || []).filter(mc => getTabGroup(mc) === activeTab && isHotMc(mc));
      if (target.length === 0) return null;

      const sectionEl = document.createElement("div");
      sectionEl.className = "mcs-hot-section";

      const titleEl = document.createElement("h2");
      titleEl.className = "mcs-block-title mcs-hot-title";
      titleEl.textContent = `${activeTab}行の注目度の高いMC`;
      sectionEl.appendChild(titleEl);

      const listEl = document.createElement("ul");
      listEl.className = "mcs-hot-list";

      sortMcs(target).forEach(mc => {
        const li = document.createElement("li");
        const mcId = String(mc.mc_id || "");
        const name = String(mc.mc_name || "MC名不明");

        if (mcId) {
          li.innerHTML = `<a class="mcs-hot-link" href="detail_mc/${encodeURIComponent(mcId)}.html">${escapeHtml(name)}</a>`;
        } else {
          li.innerHTML = `<span class="mcs-hot-static">${escapeHtml(name)}</span>`;
        }

        listEl.appendChild(li);
      });

      sectionEl.appendChild(listEl);
      return sectionEl;
    }

    function renderTabs(groups, activeTab) {
      const tabsEl = document.getElementById("mcs-tabs");
      const allTitleEl = document.getElementById("mcs-all-title");

      allTitleEl.classList.remove("is-hidden");
      tabsEl.classList.remove("is-hidden");
      tabsEl.innerHTML = "";

      TAB_ORDER.forEach(tabName => {
        if (!groups[tabName] || groups[tabName].length === 0) return;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "mcs-tab" + (tabName === activeTab ? " is-active" : "");
        btn.textContent = tabName;
        btn.addEventListener("click", () => renderPanel(groups, tabName));
        tabsEl.appendChild(btn);
      });
    }

    function renderPanel(groups, activeTab) {
      currentTab = activeTab;
      renderTabs(groups, activeTab);

      const panelEl = document.getElementById("mcs-panel");
      panelEl.innerHTML = "";

      const hotEl = createHotMcsElement(allMcs, activeTab);
      if (hotEl) {
        panelEl.appendChild(hotEl);
      }

      const sectionTitle = document.createElement("h2");
      sectionTitle.className = "mcs-section-title";
      sectionTitle.textContent = `${activeTab}行`;
      panelEl.appendChild(sectionTitle);

      const target = groups[activeTab] || [];
      if (target.length === 0) {
        const empty = document.createElement("p");
        empty.className = "mcs-empty";
        empty.textContent = "該当するMCがいません";
        panelEl.appendChild(empty);
        return;
      }

      panelEl.appendChild(createMcList(target));
    }

    function renderSearchResults(keyword) {
      const tabsEl = document.getElementById("mcs-tabs");
      const allTitleEl = document.getElementById("mcs-all-title");
      const panelEl = document.getElementById("mcs-panel");
      const normalizedKeyword = normalizeSearchText(keyword);

      allTitleEl.classList.add("is-hidden");
      tabsEl.classList.add("is-hidden");
      panelEl.innerHTML = "";

      const results = allMcs.filter(mc => getSearchText(mc).includes(normalizedKeyword));

      const sectionTitle = document.createElement("h2");
      sectionTitle.className = "mcs-section-title";
      sectionTitle.innerHTML = `検索結果 <span class="mcs-result-count">${results.length}件</span>`;
      panelEl.appendChild(sectionTitle);

      if (results.length === 0) {
        const empty = document.createElement("p");
        empty.className = "mcs-empty";
        empty.textContent = "該当するMCがいません";
        panelEl.appendChild(empty);
        return;
      }

      panelEl.appendChild(createMcList(results));
    }

    function updateSearchView() {
      const inputEl = document.getElementById("mcs-search-input");
      const clearEl = document.getElementById("mcs-search-clear");
      const keyword = inputEl.value || "";
      const normalizedKeyword = normalizeSearchText(keyword);

      if (normalizedKeyword) {
        clearEl.classList.remove("is-hidden");
        renderSearchResults(keyword);
        return;
      }

      clearEl.classList.add("is-hidden");
      renderPanel(allGroups, currentTab);
    }

    function setupSearch() {
      if (searchInitialized) return;

      const inputEl = document.getElementById("mcs-search-input");
      const clearEl = document.getElementById("mcs-search-clear");

      inputEl.addEventListener("input", updateSearchView);

      clearEl.addEventListener("click", () => {
        inputEl.value = "";
        inputEl.focus();
        updateSearchView();
      });

      searchInitialized = true;
    }

    async function loadMcsJson() {
      const res = await fetch(MCS_JSON_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    async function loadMcsList() {
      const statusEl = document.getElementById("mcs-status");
      statusEl.classList.remove("error");

      try {
        const data = await loadMcsJson();
        console.log("mcs list:", data);

        if (data.error) {
          statusEl.style.display = "block";
          statusEl.textContent = "MC一覧の取得に失敗しました: " + (data.message || "");
          statusEl.classList.add("error");
          return;
        }

        const mcs = Array.isArray(data.mcs) ? sortMcs(data.mcs) : [];
        const groups = {};

        TAB_ORDER.forEach(tab => {
          groups[tab] = [];
        });

        const skipped = [];

        mcs.forEach(mc => {
          const group = getTabGroup(mc);
          if (!group) {
            skipped.push({
              mc_id: mc.mc_id || "",
              mc_name: mc.mc_name || "",
              mc_yomi: mc.mc_yomi || ""
            });
            return;
          }
          groups[group].push(mc);
        });

        if (skipped.length > 0) {
          console.log("mcs skipped because group was not found:", skipped);
        }

        allMcs = mcs;
        allGroups = groups;

        const firstTab = TAB_ORDER.find(tab => groups[tab] && groups[tab].length > 0) || "あ";
        currentTab = firstTab;
        renderPanel(groups, firstTab);
        setupSearch();
        updateSearchView();

        if (mcs.length === 0) {
          statusEl.style.display = "block";
          statusEl.textContent = "表示できるMCがいません";
        } else {
          statusEl.style.display = "none";
          statusEl.textContent = "";
        }
      } catch (err) {
        console.error(err);
        statusEl.style.display = "block";
        statusEl.textContent = "MC一覧の読み込みに失敗しました";
        statusEl.classList.add("error");
      }
    }

    window.addEventListener("pageshow", function () {
      setTimeout(function () {
        if (allMcs.length > 0) {
          updateSearchView();
        }
      }, 0);
    });

    loadMcsList();
  </script>
</body>
</html>
